# .github/dependabot.yml
#
# Aerealith Dependabot security-update policy.
#
# Ownership model:
# - Renovate manages normal dependency version updates.
# - Dependabot manages GitHub-native security update pull requests only.
#
# This avoids duplicate normal dependency PRs while preserving Dependabot alerts
# and security remediation for npm/pnpm workspace dependencies and GitHub Actions.

version: 2

updates:
  # ============================================================================
  # Node.js / pnpm workspace security updates
  # ============================================================================
  #
  # Dependabot uses the npm ecosystem for npm, Yarn, and pnpm manifests.
  # The repository root covers the Nx + pnpm workspace configuration.

  - package-ecosystem: npm
    directory: /

    # Dependabot still requires a schedule declaration, even though normal
    # version updates are disabled below.
    schedule:
      interval: daily
      time: "06:00"
      timezone: America/Boise

    # Renovate owns normal dependency version updates.
    # Dependabot remains available for security update PRs.
    open-pull-requests-limit: 0

    milestone: 21

    labels:
      - automated
      - dependencies
      - "type: security"
      - "priority: high"

    commit-message:
      prefix: "fix(security)"
      include: scope

    pull-request-branch-name:
      separator: "-"

    # Keep security remediation granular.
    #
    # Do not add generic security-update groups here yet. One affected package
    # per PR makes vulnerable dependency changes easier to inspect, test,
    # revert, and merge safely.

  # ============================================================================
  # GitHub Actions security updates
  # ============================================================================
  #
  # Covers actions referenced from .github/workflows and root action metadata.
  - package-ecosystem: github-actions
    directory: /

    schedule:
      interval: daily
      time: "06:30"
      timezone: America/Boise

    # Renovate owns normal GitHub Actions version updates.
    # Dependabot remains available for security update PRs.
    open-pull-requests-limit: 0

    milestone: 21

    labels:
      - automated
      - dependencies
      - "type: security"
      - "priority: high"
      - "area: infrastructure"

    commit-message:
      prefix: "fix(security)"
      include: scope

    pull-request-branch-name:
      separator: "-"

    # Keep action security remediation granular for review and rollback safety.
