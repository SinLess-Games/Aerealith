# .github/labels.yaml
#
# Aerealith AI repository label catalogue.
#
# This file uses the standard GitHub label-sync shape:
# - name: Label name
#   color: Hex color without "#"
#   description: Clear, short label purpose
#
# Keep the active label set below 50 labels so it remains compatible with
# repository automation that limits explicitly allowed labels.

# ==============================================================================
# Type
# ==============================================================================

- name: "type: bug"
  color: "D73A4A"
  description: "Something is not working as intended."

- name: "type: feature"
  color: "1D76DB"
  description: "A new user-facing capability or major system feature."

- name: "type: enhancement"
  color: "84B6EB"
  description: "An improvement to an existing feature or workflow."

- name: "type: documentation"
  color: "0075CA"
  description: "Documentation, guides, comments, or developer reference changes."

- name: "type: refactor"
  color: "BFD4F2"
  description: "Internal code improvement with no intended behavior change."

- name: "type: test"
  color: "5319E7"
  description: "Unit, integration, E2E, regression, or test infrastructure work."

- name: "type: ci"
  color: "0E8A16"
  description: "GitHub Actions, continuous integration, or workflow automation."

- name: "type: build"
  color: "FBCA04"
  description: "Build tooling, packaging, bundling, or release pipeline work."

- name: "type: chore"
  color: "D4C5F9"
  description: "Routine maintenance that does not change product behavior."

- name: "type: security"
  color: "B60205"
  description: "Security hardening, vulnerability remediation, or threat mitigation."

- name: "type: performance"
  color: "FF9F1C"
  description: "Performance, scalability, latency, or resource-use improvement."

- name: "type: accessibility"
  color: "0052CC"
  description: "Accessibility, inclusive design, or assistive technology support."

- name: "type: dependency"
  color: "0366D6"
  description: "Dependency update, package maintenance, or lockfile change."

# ==============================================================================
# Priority
# ==============================================================================

- name: "priority: critical"
  color: "B60205"
  description: "Immediate attention required; blocks production or creates severe risk."

- name: "priority: high"
  color: "D93F0B"
  description: "Important work that should be addressed soon."

- name: "priority: medium"
  color: "FBCA04"
  description: "Normal planned work with meaningful impact."

- name: "priority: low"
  color: "0E8A16"
  description: "Useful but non-urgent work."

# ==============================================================================
# Status
# ==============================================================================

- name: "status: needs-triage"
  color: "EDEDED"
  description: "Needs review, classification, ownership, or prioritization."

- name: "status: needs-info"
  color: "D876E3"
  description: "More information is required before work can continue."

- name: "status: blocked"
  color: "B60205"
  description: "Cannot proceed until a dependency, decision, or external issue is resolved."

- name: "status: in-progress"
  color: "1D76DB"
  description: "Actively being worked on."

- name: "status: ready-for-review"
  color: "0E8A16"
  description: "Implementation is ready for code review."

- name: "status: ready-to-merge"
  color: "2DA44E"
  description: "Approved and ready to merge when checks are green."

- name: "status: on-hold"
  color: "C2E0C6"
  description: "Intentionally paused until a later time or decision."

- name: "status: released"
  color: "5319E7"
  description: "Included in a released or deployed version."

# ==============================================================================
# Area
# ==============================================================================

- name: "area: frontend"
  color: "0366D6"
  description: "Frontend application, routes, pages, client behavior, or Vite configuration."

- name: "area: ui"
  color: "7057FF"
  description: "Reusable UI components, design system, styling, or accessibility primitives."

- name: "area: api"
  color: "0052CC"
  description: "API contracts, endpoints, transports, or service boundaries."

- name: "area: auth"
  color: "B60205"
  description: "Authentication, authorization, sessions, identity, or user access."

- name: "area: core"
  color: "5319E7"
  description: "Core entities, schemas, constants, errors, contracts, or shared domain logic."

- name: "area: database"
  color: "006B75"
  description: "Database schema, migrations, repositories, queries, or persistence."

- name: "area: utils"
  color: "BFDADC"
  description: "Reusable utility functions and low-level shared helpers."

- name: "area: infrastructure"
  color: "24292F"
  description: "Infrastructure, deployment architecture, environment configuration, or operations."

- name: "area: cloudflare"
  color: "F38020"
  description: "Cloudflare Workers, Pages, D1, R2, KV, Queues, or platform deployment."

- name: "area: discord"
  color: "5865F2"
  description: "Discord bot, server integrations, commands, events, or moderation modules."

- name: "area: devportal"
  color: "0969DA"
  description: "Developer portal, API documentation, SDKs, or integration tooling."

- name: "area: observability"
  color: "F05A28"
  description: "Logging, metrics, tracing, alerts, dashboards, or operational visibility."

- name: "area: tooling"
  color: "8250DF"
  description: "Nx, pnpm, TypeScript, ESLint, Prettier, testing, or local development tooling."

# ==============================================================================
# Workflow and Community
# ==============================================================================

- name: "dependencies"
  color: "0366D6"
  description: "Dependency update, package maintenance, or lockfile change."

- name: "automated"
  color: "EDEDED"
  description: "Created or updated by automation, bots, or repository workflows."

- name: "breaking-change"
  color: "B60205"
  description: "Introduces a behavior, API, schema, or configuration breaking change."

- name: "needs-design"
  color: "D4C5F9"
  description: "Requires product, UX, architecture, or implementation design before coding."

- name: "good first issue"
  color: "7057FF"
  description: "Approachable contribution suitable for a first-time contributor."

- name: "help wanted"
  color: "008672"
  description: "Additional contributor help would be valuable."

- name: "question"
  color: "D876E3"
  description: "Requests clarification, discussion, or an answer."

- name: "duplicate"
  color: "CFD3D7"
  description: "Duplicates an existing issue or pull request."

- name: "invalid"
  color: "E4E669"
  description: "Does not contain an actionable issue or does not apply to this repository."

- name: "wontfix"
  color: "FFFFFF"
  description: "Will not be addressed as currently proposed."
