# .github/workflows/26-ghcr-cleanup.yaml
#
# Cleans old GitHub Container Registry versions after the trusted Aerealith
# GHCR publishing workflow completes successfully.
#
# Retention policy:
# - Keeps the 20 newest active versions of every managed image.
# - Deletes active versions older than the newest 20.
# - Old untagged and superseded versions are therefore removed naturally.
# - Never deletes images outside the configured package-name prefix.
#
# Managed GHCR image names:
# - ghcr.io/sinless-games/aerealith-*
#
# Security design:
# - workflow_run is intentional because package deletion must occur only after
#   the separate GHCR publishing workflow has finished.
# - The validation job has no token permissions and never checks out source,
#   downloads artifacts, or executes content from the triggering workflow.
# - The write-capable cleanup job runs only after a completed, successful,
#   same-repository release publication from the expected workflow.
# - Manual deletion is restricted to protected repository branches.
#
# Automatic trigger:
# - Runs after "19 · Publish GHCR Images" completes successfully from a trusted
#   release reference in this repository.
#
# Manual trigger:
# - Defaults to a dry run.
# - Set dry_run to false to perform deletion manually from master, staging, or
#   production.
#
# Required GitHub permissions:
# - packages: write
#
# Important:
# - GHCR packages must remain linked to this repository or grant this
#   repository's GitHub Actions token admin access.
# - Deleted package versions can generally be restored from GitHub Packages
#   for a limited retention period, but do not rely on cleanup as a backup.

name: 26 · GHCR Cleanup

on:
  workflow_run:
    workflows:
      - "19 · Publish GHCR Images"
    types:
      - completed

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview deletions without removing package versions."
        required: true
        default: true
        type: boolean

permissions: {}

concurrency:
  group: ghcr-cleanup
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  PACKAGE_TYPE: "container"
  PACKAGE_NAME_PREFIX: "aerealith-"
  KEEP_VERSION_COUNT: "20"

jobs:
  validate-trigger:
    name: Validate cleanup trigger
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions: {}

    outputs:
      should_cleanup: ${{ steps.validate.outputs.should_cleanup }}
      dry_run: ${{ steps.validate.outputs.dry_run }}
      source_workflow_name: ${{ steps.validate.outputs.source_workflow_name }}
      source_workflow_run_id: ${{ steps.validate.outputs.source_workflow_run_id }}
      source_workflow_run_url: ${{ steps.validate.outputs.source_workflow_run_url }}
      source_ref: ${{ steps.validate.outputs.source_ref }}

    steps:
      - name: Validate trusted cleanup source
        id: validate
        env:
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_DRY_RUN: ${{ inputs.dry_run }}
          MANUAL_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          expected_workflow_name='19 · Publish GHCR Images'
          expected_workflow_path='.github/workflows/19-ghcr-publish.yaml'
          expected_repository="$GITHUB_REPOSITORY"
          expected_run_url_prefix="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/"

          should_cleanup='false'
          dry_run='false'
          source_workflow_name=''
          source_workflow_run_id=''
          source_workflow_run_url=''
          source_ref=''
          skip_reason=''

          is_trusted_branch() {
            case "$1" in
              master | staging | production)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          is_release_tag() {
            local ref="${1#refs/tags/}"

            [[ "$ref" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]
          }

          if [[ "$EVENT_NAME" == 'workflow_dispatch' ]]; then
            dry_run="${MANUAL_DRY_RUN:-true}"

            if [[ "$dry_run" != 'true' && "$dry_run" != 'false' ]]; then
              skip_reason='Manual dry_run input must be true or false.'
            elif ! is_trusted_branch "${MANUAL_REF_NAME:-}"; then
              skip_reason='Manual cleanup is restricted to master, staging, or production.'
            else
              should_cleanup='true'
              source_workflow_name='Manual workflow dispatch'
              source_ref="$MANUAL_REF_NAME"
            fi
          elif [[ "$EVENT_NAME" == 'workflow_run' ]]; then
            raw_source_action="$(jq -r '.action // empty' "$GITHUB_EVENT_PATH")"
            raw_source_workflow_name="$(
              jq -r '.workflow_run.name // empty' "$GITHUB_EVENT_PATH"
            )"
            raw_source_workflow_path="$(
              jq -r '.workflow_run.path // empty' "$GITHUB_EVENT_PATH"
            )"
            raw_source_workflow_status="$(
              jq -r '.workflow_run.status // empty' "$GITHUB_EVENT_PATH"
            )"
            raw_source_workflow_conclusion="$(
              jq -r '.workflow_run.conclusion // empty' "$GITHUB_EVENT_PATH"
            )"
            raw_source_workflow_event="$(
              jq -r '.workflow_run.event // empty' "$GITHUB_EVENT_PATH"
            )"
            raw_source_workflow_run_id="$(
              jq -r '.workflow_run.id // empty' "$GITHUB_EVENT_PATH"
            )"
            raw_source_workflow_run_url="$(
              jq -r '.workflow_run.html_url // empty' "$GITHUB_EVENT_PATH"
            )"
            raw_source_repository="$(
              jq -r '.repository.full_name // empty' "$GITHUB_EVENT_PATH"
            )"
            raw_source_head_repository="$(
              jq -r '.workflow_run.head_repository.full_name // empty' \
                "$GITHUB_EVENT_PATH"
            )"
            raw_source_head_sha="$(
              jq -r '.workflow_run.head_sha // empty' "$GITHUB_EVENT_PATH"
            )"
            raw_source_ref="$(
              jq -r '.workflow_run.head_branch // empty' "$GITHUB_EVENT_PATH"
            )"

            if [[ "$raw_source_action" != 'completed' ]]; then
              skip_reason='The upstream workflow_run event was not completed.'
            elif [[ "$raw_source_workflow_name" != "$expected_workflow_name" ]]; then
              skip_reason='The upstream workflow name is not approved for GHCR cleanup.'
            elif [[ "$raw_source_workflow_path" != "${expected_workflow_path}@"* ]]; then
              skip_reason='The upstream workflow path is not the approved GHCR publishing workflow.'
            elif [[ "$raw_source_workflow_status" != 'completed' ]]; then
              skip_reason='The upstream workflow status is not completed.'
            elif [[ "$raw_source_workflow_conclusion" != 'success' ]]; then
              skip_reason='The upstream GHCR publishing workflow did not succeed.'
            elif [[ "$raw_source_workflow_event" != 'release' ]]; then
              skip_reason='The upstream workflow was not triggered by a release event.'
            elif [[ "$raw_source_repository" != "$expected_repository" ]] ||
              [[ "$raw_source_head_repository" != "$expected_repository" ]]; then
              skip_reason='The upstream workflow did not originate from this repository.'
            elif ! [[ "$raw_source_workflow_run_id" =~ ^[1-9][0-9]*$ ]]; then
              skip_reason='The upstream workflow run ID is invalid.'
            elif ! [[ "$raw_source_head_sha" =~ ^[0-9a-fA-F]{40}$ ]]; then
              skip_reason='The upstream workflow commit SHA is invalid.'
            elif [[ "$raw_source_workflow_run_url" != \
              "${expected_run_url_prefix}${raw_source_workflow_run_id}" ]]; then
              skip_reason='The upstream workflow URL is invalid.'
            elif is_trusted_branch "$raw_source_ref"; then
              should_cleanup='true'
            elif is_release_tag "$raw_source_ref"; then
              should_cleanup='true'
            else
              skip_reason='The upstream workflow did not run from an approved branch or release tag.'
            fi

            if [[ "$should_cleanup" == 'true' ]]; then
              source_workflow_name="$raw_source_workflow_name"
              source_workflow_run_id="$raw_source_workflow_run_id"
              source_workflow_run_url="$raw_source_workflow_run_url"
              source_ref="$raw_source_ref"
            fi
          else
            skip_reason='Unsupported event type for GHCR cleanup.'
          fi

          {
            echo "should_cleanup=$should_cleanup"
            echo "dry_run=$dry_run"
            echo "source_workflow_name=$source_workflow_name"
            echo "source_workflow_run_id=$source_workflow_run_id"
            echo "source_workflow_run_url=$source_workflow_run_url"
            echo "source_ref=$source_ref"
          } >> "$GITHUB_OUTPUT"

          {
            echo '## GHCR Cleanup Trigger Validation'
            echo
            echo '| Check | Result |'
            echo '| --- | --- |'
            echo "| Event | $EVENT_NAME |"
            echo "| Approved source workflow | $expected_workflow_name |"
            echo "| Source workflow | ${source_workflow_name:-not-applicable} |"
            echo "| Source ref | ${source_ref:-not-applicable} |"
            echo "| Source run ID | ${source_workflow_run_id:-not-applicable} |"
            echo "| Cleanup authorized | $should_cleanup |"
            echo "| Dry run | $dry_run |"
            echo "| Decision | ${skip_reason:-trusted source accepted} |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "$should_cleanup" != 'true' ]]; then
            echo "::notice::GHCR cleanup was skipped: $skip_reason"
          fi

  cleanup:
    name: Retain newest GHCR image versions
    needs: validate-trigger
    if: needs.validate-trigger.outputs.should_cleanup == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      packages: write

    env:
      GH_TOKEN: ${{ github.token }}

      PACKAGE_OWNER: ${{ github.repository_owner }}

      DRY_RUN: ${{ needs.validate-trigger.outputs.dry_run }}

      SOURCE_WORKFLOW_NAME: ${{ needs.validate-trigger.outputs.source_workflow_name }}
      SOURCE_WORKFLOW_RUN_ID: ${{ needs.validate-trigger.outputs.source_workflow_run_id }}
      SOURCE_WORKFLOW_RUN_URL: ${{ needs.validate-trigger.outputs.source_workflow_run_url }}
      SOURCE_REF: ${{ needs.validate-trigger.outputs.source_ref }}

    steps:
      - name: Validate cleanup configuration
        run: |
          set -euo pipefail

          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo '::error::GitHub token is unavailable.'
            exit 1
          fi

          if [[ -z "${PACKAGE_OWNER:-}" ]]; then
            echo '::error::Package owner is unavailable.'
            exit 1
          fi

          if [[ ! "$KEEP_VERSION_COUNT" =~ ^[1-9][0-9]*$ ]]; then
            echo "::error::KEEP_VERSION_COUNT must be a positive integer. Received: $KEEP_VERSION_COUNT"
            exit 1
          fi

          if [[ -z "${PACKAGE_NAME_PREFIX:-}" ]]; then
            echo '::error::PACKAGE_NAME_PREFIX cannot be empty.'
            exit 1
          fi

          if [[ "$DRY_RUN" != 'true' && "$DRY_RUN" != 'false' ]]; then
            echo "::error::DRY_RUN must be true or false. Received: $DRY_RUN"
            exit 1
          fi

          owner_type="$(
            gh api "/users/$PACKAGE_OWNER" \
              --jq '.type'
          )"

          case "$owner_type" in
            Organization)
              packages_endpoint="/orgs/$PACKAGE_OWNER/packages"
              ;;
            User)
              packages_endpoint="/users/$PACKAGE_OWNER/packages"
              ;;
            *)
              echo "::error::Unsupported GitHub package owner type: $owner_type"
              exit 1
              ;;
          esac

          {
            echo "OWNER_TYPE=$owner_type"
            echo "PACKAGES_ENDPOINT=$packages_endpoint"
          } >> "$GITHUB_ENV"

          {
            echo '## GHCR Cleanup Preflight'
            echo
            echo '| Setting | Value |'
            echo '| --- | --- |'
            echo "| Package owner | $PACKAGE_OWNER |"
            echo "| Owner type | $owner_type |"
            echo "| Package type | $PACKAGE_TYPE |"
            echo "| Managed image prefix | \`$PACKAGE_NAME_PREFIX\` |"
            echo "| Versions retained per image | $KEEP_VERSION_COUNT |"
            echo "| Dry run | $DRY_RUN |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "${SOURCE_WORKFLOW_RUN_URL:-}" == https://* ]]; then
            {
              echo "| Triggering workflow | [$SOURCE_WORKFLOW_NAME]($SOURCE_WORKFLOW_RUN_URL) |"
              echo "| Validated source ref | $SOURCE_REF |"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Discover managed GHCR container packages
        run: |
          set -euo pipefail

          package_pages_file="$RUNNER_TEMP/ghcr-package-pages.json"
          package_names_file="$RUNNER_TEMP/ghcr-managed-packages.txt"

          rm -f "$package_pages_file" "$package_names_file"

          gh api \
            --paginate \
            --slurp \
            "${PACKAGES_ENDPOINT}?package_type=${PACKAGE_TYPE}&per_page=100" \
            > "$package_pages_file"

          jq -r \
            --arg prefix "$PACKAGE_NAME_PREFIX" \
            '
              [
                .[][]?
                | select(.name | startswith($prefix))
                | .name
              ]
              | unique
              | .[]
            ' \
            "$package_pages_file" \
            > "$package_names_file"

          managed_package_count="$(
            wc -l < "$package_names_file" | tr -d ' '
          )"

          {
            echo "PACKAGE_NAMES_FILE=$package_names_file"
            echo "MANAGED_PACKAGE_COUNT=$managed_package_count"
          } >> "$GITHUB_ENV"

          {
            echo '## Managed GHCR Packages'
            echo
            echo '| Metric | Result |'
            echo '| --- | --- |'
            echo "| Matching packages | $managed_package_count |"
            echo "| Package prefix | \`$PACKAGE_NAME_PREFIX\` |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "$managed_package_count" -eq 0 ]]; then
            {
              echo
              echo 'No managed GHCR container packages were found. Nothing needs cleanup.'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Retain newest package versions and remove old versions
        id: cleanup
        run: |
          set -euo pipefail

          total_packages=0
          total_versions=0
          total_versions_kept=0
          total_versions_deleted=0
          total_untagged_deleted=0
          total_delete_failures=0

          cleanup_summary_file="$RUNNER_TEMP/ghcr-cleanup-summary.md"

          {
            echo '## GHCR Cleanup Results'
            echo
            echo '| Container package | Active versions | Versions retained | Versions removed | Untagged removed | Result |'
            echo '| --- | ---: | ---: | ---: | ---: | --- |'
          } > "$cleanup_summary_file"

          if [[ ! -s "$PACKAGE_NAMES_FILE" ]]; then
            {
              echo "| _No matching packages_ | 0 | 0 | 0 | 0 | No action |"
            } >> "$cleanup_summary_file"
          fi

          while IFS= read -r package_name; do
            [[ -z "$package_name" ]] && continue

            total_packages=$((total_packages + 1))

            package_name_uri="$(
              jq -nr \
                --arg package_name "$package_name" \
                '$package_name | @uri'
            )"

            safe_package_name="$(
              printf '%s' "$package_name" \
                | tr '/:' '--' \
                | tr -cd '[:alnum:]._-'
            )"

            version_pages_file="$RUNNER_TEMP/${safe_package_name}-version-pages.json"
            versions_file="$RUNNER_TEMP/${safe_package_name}-versions.json"
            cleanup_plan_file="$RUNNER_TEMP/${safe_package_name}-cleanup-plan.json"

            rm -f \
              "$version_pages_file" \
              "$versions_file" \
              "$cleanup_plan_file"

            gh api \
              --paginate \
              --slurp \
              "${PACKAGES_ENDPOINT}/${PACKAGE_TYPE}/${package_name_uri}/versions?state=active&per_page=100" \
              > "$version_pages_file"

            jq '
              [
                .[][]?
                | select(
                    (.id | type) == "number" and
                    (.created_at | type) == "string"
                  )
              ]
              | sort_by(.created_at)
              | reverse
            ' "$version_pages_file" > "$versions_file"

            active_version_count="$(
              jq 'length' "$versions_file"
            )"

            total_versions=$((total_versions + active_version_count))

            jq \
              --argjson keep_count "$KEEP_VERSION_COUNT" \
              '
                {
                  keep: .[:$keep_count],
                  delete: .[$keep_count:]
                }
              ' \
              "$versions_file" \
              > "$cleanup_plan_file"

            retained_version_count="$(
              jq '.keep | length' "$cleanup_plan_file"
            )"

            delete_version_count="$(
              jq '.delete | length' "$cleanup_plan_file"
            )"

            untagged_delete_count="$(
              jq '
                [
                  .delete[]
                  | select(
                      (.metadata.container.tags // [])
                      | length == 0
                    )
                ]
                | length
              ' "$cleanup_plan_file"
            )"

            package_deleted_count=0
            package_delete_failures=0

            while IFS=$'\t' read -r version_id created_at tags; do
              [[ -z "$version_id" ]] && continue

              if [[ "$DRY_RUN" == 'true' ]]; then
                echo "::notice::Dry run: would delete package '$package_name' version '$version_id' created '$created_at' with tags '${tags:-<untagged>}'"
                package_deleted_count=$((package_deleted_count + 1))
                continue
              fi

              delete_endpoint="${PACKAGES_ENDPOINT}/${PACKAGE_TYPE}/${package_name_uri}/versions/${version_id}"

              if gh api \
                --method DELETE \
                "$delete_endpoint" \
                >/dev/null; then
                echo "::notice::Deleted package '$package_name' version '$version_id' created '$created_at' with tags '${tags:-<untagged>}'"
                package_deleted_count=$((package_deleted_count + 1))
              else
                echo "::error::Failed to delete package '$package_name' version '$version_id'."
                package_delete_failures=$((package_delete_failures + 1))
              fi
            done < <(
              jq -r '
                .delete[]
                | [
                    (.id | tostring),
                    .created_at,
                    ((.metadata.container.tags // []) | join(","))
                  ]
                | @tsv
              ' "$cleanup_plan_file"
            )

            total_versions_kept=$((total_versions_kept + retained_version_count))
            total_versions_deleted=$((total_versions_deleted + package_deleted_count))
            total_untagged_deleted=$((total_untagged_deleted + untagged_delete_count))
            total_delete_failures=$((total_delete_failures + package_delete_failures))

            package_result='No cleanup needed'

            if [[ "$delete_version_count" -gt 0 && "$DRY_RUN" == 'true' ]]; then
              package_result='Dry run complete'
            elif [[ "$delete_version_count" -gt 0 && "$package_delete_failures" -eq 0 ]]; then
              package_result='Cleanup complete'
            elif [[ "$package_delete_failures" -gt 0 ]]; then
              package_result='Cleanup failed'
            fi

            {
              echo "| \`$package_name\` | $active_version_count | $retained_version_count | $package_deleted_count | $untagged_delete_count | $package_result |"
            } >> "$cleanup_summary_file"
          done < "$PACKAGE_NAMES_FILE"

          {
            echo "total_packages=$total_packages"
            echo "total_versions=$total_versions"
            echo "total_versions_kept=$total_versions_kept"
            echo "total_versions_deleted=$total_versions_deleted"
            echo "total_untagged_deleted=$total_untagged_deleted"
            echo "total_delete_failures=$total_delete_failures"
          } >> "$GITHUB_OUTPUT"

          {
            echo
            echo '### Totals'
            echo
            echo '| Metric | Result |'
            echo '| --- | ---: |'
            echo "| Managed packages | $total_packages |"
            echo "| Active versions scanned | $total_versions |"
            echo "| Versions retained | $total_versions_kept |"
            echo "| Versions removed | $total_versions_deleted |"
            echo "| Untagged versions removed | $total_untagged_deleted |"
            echo "| Delete failures | $total_delete_failures |"
            echo "| Dry run | $DRY_RUN |"
          } >> "$cleanup_summary_file"

          cat "$cleanup_summary_file" >> "$GITHUB_STEP_SUMMARY"

          if [[ "$total_delete_failures" -gt 0 ]]; then
            echo "::error::One or more GHCR package versions could not be deleted."
            exit 1
          fi

      - name: Publish cleanup result
        env:
          TOTAL_PACKAGES: ${{ steps.cleanup.outputs.total_packages }}
          TOTAL_VERSIONS: ${{ steps.cleanup.outputs.total_versions }}
          TOTAL_KEPT: ${{ steps.cleanup.outputs.total_versions_kept }}
          TOTAL_DELETED: ${{ steps.cleanup.outputs.total_versions_deleted }}
          TOTAL_UNTAGGED_DELETED: ${{ steps.cleanup.outputs.total_untagged_deleted }}
          DELETE_FAILURES: ${{ steps.cleanup.outputs.total_delete_failures }}
        run: |
          set -euo pipefail

          if [[ "$DRY_RUN" == 'true' ]]; then
            echo "::notice title=GHCR cleanup dry run complete::Would remove ${TOTAL_DELETED:-0} old package versions while retaining ${KEEP_VERSION_COUNT} newest versions per image."
          else
            echo "::notice title=GHCR cleanup complete::Removed ${TOTAL_DELETED:-0} old package versions while retaining ${KEEP_VERSION_COUNT} newest versions per image."
          fi

          {
            echo
            echo '## GHCR Cleanup Workflow Result'
            echo
            echo '| Check | Result |'
            echo '| --- | --- |'
            echo "| Package owner | $PACKAGE_OWNER |"
            echo "| Managed image prefix | \`$PACKAGE_NAME_PREFIX\` |"
            echo "| Retention policy | keep newest $KEEP_VERSION_COUNT versions per image |"
            echo "| Managed packages | ${TOTAL_PACKAGES:-0} |"
            echo "| Active versions scanned | ${TOTAL_VERSIONS:-0} |"
            echo "| Versions retained | ${TOTAL_KEPT:-0} |"
            echo "| Versions removed | ${TOTAL_DELETED:-0} |"
            echo "| Untagged versions removed | ${TOTAL_UNTAGGED_DELETED:-0} |"
            echo "| Delete failures | ${DELETE_FAILURES:-0} |"
            echo "| Dry run | $DRY_RUN |"
          } >> "$GITHUB_STEP_SUMMARY"
