# .github/workflows/07-gitleaks.yaml
#
# Detects committed secrets, tokens, passwords, credentials, and private keys.
#
# Security design:
# - Pull requests use pull_request, never pull_request_target.
# - External fork pull requests never receive repository or organization secrets.
# - Trusted repository branches and internal pull requests use the licensed
#   Gitleaks Action.
# - External fork pull requests fail closed instead of receiving a false-green
#   security result without the required organization license.
# - The workflow never installs project dependencies or executes repository code.
# - Pull request comments are disabled to keep permissions read-only.
#
# Required repository or organization secret:
# - GITLEAKS_LICENSE
#
# Optional configuration files:
# - gitleaks.toml
# - .gitleaksignore

name: 07 · Gitleaks

on:
  pull_request:
    branches:
      - master
      - staging
      - production
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

  push:
    branches:
      - master
      - staging
      - production

  schedule:
    # Every Sunday at 03:15 UTC.
    # A recurring scan helps catch secrets that may already exist in history.
    - cron: "15 3 * * 0"

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: >-
    gitleaks-${{
      github.event.pull_request.number ||
      github.ref ||
      github.run_id
    }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  scan-trusted-source:
    name: Scan trusted source for exposed secrets
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Scan repository with Gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          # GitHub provides this token automatically. The workflow permissions
          # remain read-only, and pull-request comments stay disabled.
          GITHUB_TOKEN: ${{ github.token }}

          # Required by Gitleaks Action for organization-owned repositories.
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

          # Keep this workflow read-only. Findings remain visible in the job log
          # and Gitleaks job summary instead of creating PR comments.
          GITLEAKS_ENABLE_COMMENTS: "false"

          # Gitleaks produces its own useful job summary.
          GITLEAKS_ENABLE_SUMMARY: "true"

          # Do not upload a SARIF artifact containing secret-match metadata.
          # A real detection should be handled by rotating the secret and
          # removing it from repository history where appropriate.
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

      - name: Write security guidance
        if: failure()
        run: |
          {
            echo '## Gitleaks Detected a Potential Secret'
            echo
            echo 'Treat this as a credential-exposure incident until proven otherwise:'
            echo
            echo '1. Revoke or rotate the exposed credential immediately.'
            echo '2. Remove the credential from current source files.'
            echo '3. Remove it from Git history when practical and approved.'
            echo '4. Replace it with an environment variable, GitHub Actions secret, or managed secret-store reference.'
            echo '5. Add an allowlist entry only after confirming the value is not a real credential.'
          } >> "$GITHUB_STEP_SUMMARY"

  external-fork-requires-maintainer-scan:
    name: External fork requires secretless review
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Block unlicensed external-fork scan
        run: |
          set -euo pipefail

          {
            echo '## External Fork Secret-Scan Review Required'
            echo
            echo 'This pull request originates from an external fork.'
            echo
            echo 'The repository GITLEAKS_LICENSE is intentionally not exposed to forked pull requests.'
            echo 'Running a privileged pull_request_target workflow against fork code would create a secret-exposure risk.'
            echo
            echo 'A maintainer must complete a secretless review or run an approved isolated scan before merging this pull request.'
          } >> "$GITHUB_STEP_SUMMARY"

          echo '::error::External fork pull requests cannot use the licensed Gitleaks Action because repository secrets are intentionally unavailable.'
          exit 1
