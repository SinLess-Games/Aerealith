# .github/workflows/codeball.yaml
#
# Advisory AI review only.
# - Posts Codeball feedback as a PR review comment.
# - Cannot approve PRs.
# - Cannot add labels.
# - Cannot fail CI or block merging.
#
# Keep this workflow non-required in branch protection / rulesets.

name: 17 · Codeball Review

on:
  pull_request:
    types:
      - opened
      - reopened
      - ready_for_review
      - synchronize

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: codeball-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  codeball:
    name: Advisory AI Review
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Do not spend AI-review runs on work-in-progress pull requests.
    if: ${{ !github.event.pull_request.draft }}

    steps:
      - name: Run Codeball in comment-only mode
        uses: sturdy-dev/codeball-action@102067b9f537482cee112577655c85fda56d8926 # v2.6.0
        with:
          # Creates a COMMENT review rather than an APPROVE review.
          approvePullRequests: "false"

          # Do not let AI classification modify PR labels.
          labelPullRequestsWhenApproved: "false"
          labelPullRequestsWhenReviewNeeded: "false"
          labelPullRequestsWhenCarefulReviewNeeded: "false"

          # AI feedback is advisory only; it must never block CI.
          failJobsWhenReviewNeeded: "false"

          # Do not turn human PR comments into automated code suggestions.
          codeSuggestionsFromComments: "false"
