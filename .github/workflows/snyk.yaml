# .github/workflows/snyk.yaml
#
# Scans Aerealith dependencies and production source code with the Snyk CLI.
#
# Coverage:
# - Snyk Open Source scans all pnpm workspace dependency projects.
# - Snyk Code scans production source code.
# - .snyk excludes test directories and .spec/.e2e test files from Snyk Code.
# - Snyk Open Source excludes package manifests found inside test directories.
# - SARIF findings are uploaded to GitHub Code Scanning for trusted runs.
#
# Why this workflow invokes Snyk directly:
# - snyk/actions/node passes its args input as one Docker argument.
# - --all-projects requires several independently parsed CLI arguments.
# - snyk/actions/setup installs the official Snyk CLI so shell steps can pass
#   every argument correctly.

name: Snyk

on:
  pull_request:
    branches:
      - master
      - staging
      - production
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

  push:
    branches:
      - master
      - staging
      - production

  schedule:
    # Weekly dependency and production-code scan.
    - cron: "0 5 * * 0"

  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: >-
    snyk-${{
      github.event.pull_request.number ||
      github.ref ||
      github.run_id
    }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  CI: "true"
  FORCE_COLOR: "1"
  NODE_VERSION: "25.9.0"
  PNPM_VERSION: "11.5.2"
  SNYK_VERSION: latest
  SNYK_SEVERITY_THRESHOLD: high
  SNYK_POLICY_FILE: .snyk

  # Snyk Open Source --exclude accepts comma-separated exact directory or file
  # names. It does not accept globs here.
  SNYK_OPEN_SOURCE_EXCLUDES: >-
    test,tests,spec,specs,e2e,e2e-tests,integration,integration-tests,__tests__,__mocks__,__fixtures__,fixtures

jobs:
  preflight:
    name: Detect Snyk scan targets
    runs-on: ubuntu-latest
    timeout-minutes: 10

    outputs:
      package_manifest_count: ${{ steps.detect.outputs.package_manifest_count }}
      lockfile_count: ${{ steps.detect.outputs.lockfile_count }}
      snyk_token_available: ${{ steps.detect.outputs.snyk_token_available }}
      snyk_policy_available: ${{ steps.detect.outputs.snyk_policy_available }}
      is_internal_pull_request: ${{ steps.detect.outputs.is_internal_pull_request }}
      open_source_enabled: ${{ steps.detect.outputs.open_source_enabled }}
      code_enabled: ${{ steps.detect.outputs.code_enabled }}
      open_source_reason: ${{ steps.detect.outputs.open_source_reason }}
      code_reason: ${{ steps.detect.outputs.code_reason }}

    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Detect scan targets and eligibility
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          PULL_REQUEST_HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
          CURRENT_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          package_manifest_count=0
          lockfile_count=0
          snyk_token_available='false'
          snyk_policy_available='false'
          is_internal_pull_request='true'
          open_source_enabled='false'
          code_enabled='false'
          open_source_reason=''
          code_reason=''

          while IFS= read -r -d '' file; do
            case "$file" in
              package.json|*/package.json)
                package_manifest_count=$((package_manifest_count + 1))
                ;;
            esac

            case "$file" in
              pnpm-lock.yaml|package-lock.json|npm-shrinkwrap.json|yarn.lock)
                lockfile_count=$((lockfile_count + 1))
                ;;
            esac
          done < <(git ls-files -z)

          if [[ -n "${SNYK_TOKEN:-}" ]]; then
            snyk_token_available='true'
          fi

          if [[ -f "$SNYK_POLICY_FILE" ]] && [[ -s "$SNYK_POLICY_FILE" ]]; then
            snyk_policy_available='true'
          fi

          if [[ "$EVENT_NAME" == 'pull_request' ]] &&
            [[ "$PULL_REQUEST_HEAD_REPOSITORY" != "$CURRENT_REPOSITORY" ]]; then
            is_internal_pull_request='false'
          fi

          if [[ "$snyk_token_available" != 'true' ]]; then
            open_source_reason='SNYK_TOKEN is not configured.'
            code_reason='SNYK_TOKEN is not configured.'
          elif [[ "$is_internal_pull_request" != 'true' ]]; then
            open_source_reason='External fork pull requests do not receive repository secrets.'
            code_reason='External fork pull requests do not receive repository secrets.'
          else
            if [[ "$package_manifest_count" -eq 0 ]]; then
              open_source_reason='No tracked package.json files were found.'
            elif [[ "$lockfile_count" -eq 0 ]]; then
              open_source_reason='No supported Node.js lockfile was found.'
            else
              open_source_enabled='true'
              open_source_reason='Ready to scan pnpm workspace dependencies.'
            fi

            if [[ "$snyk_policy_available" != 'true' ]]; then
              code_reason='.snyk is missing or empty, so test-file exclusions cannot be enforced.'
            else
              code_enabled='true'
              code_reason='Ready to scan production source code.'
            fi
          fi

          {
            echo "package_manifest_count=$package_manifest_count"
            echo "lockfile_count=$lockfile_count"
            echo "snyk_token_available=$snyk_token_available"
            echo "snyk_policy_available=$snyk_policy_available"
            echo "is_internal_pull_request=$is_internal_pull_request"
            echo "open_source_enabled=$open_source_enabled"
            echo "code_enabled=$code_enabled"
            echo "open_source_reason=$open_source_reason"
            echo "code_reason=$code_reason"
          } >> "$GITHUB_OUTPUT"

          {
            echo '## Snyk Preflight'
            echo
            echo '| Setting | Value |'
            echo '| --- | --- |'
            echo "| Package manifests | $package_manifest_count |"
            echo "| Supported lockfiles | $lockfile_count |"
            echo "| SNYK_TOKEN available | $snyk_token_available |"
            echo "| .snyk policy available | $snyk_policy_available |"
            echo "| Internal pull request | $is_internal_pull_request |"
            echo "| Open Source scan enabled | $open_source_enabled |"
            echo "| Snyk Code scan enabled | $code_enabled |"
            echo "| Open Source status | $open_source_reason |"
            echo "| Snyk Code status | $code_reason |"
          } >> "$GITHUB_STEP_SUMMARY"

  open-source:
    name: Scan open-source dependencies
    needs: preflight
    if: needs.preflight.outputs.open_source_enabled == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    outputs:
      result: ${{ steps.snyk_test.outcome }}

    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Verify pnpm workspace
        run: |
          set -euo pipefail

          if [[ ! -f 'package.json' ]]; then
            echo '::error::package.json was not found in the repository root.'
            exit 1
          fi

          if [[ ! -f 'pnpm-lock.yaml' ]]; then
            echo '::error::pnpm-lock.yaml was not found in the repository root.'
            exit 1
          fi

          if [[ ! -f 'pnpm-workspace.yaml' ]]; then
            echo '::error::pnpm-workspace.yaml was not found in the repository root.'
            exit 1
          fi

          printf 'Node.js: %s\n' "$(node --version)"
          printf 'pnpm: %s\n' "$(pnpm --version)"

      - name: Install workspace dependencies
        run: |
          set -euo pipefail

          pnpm install --frozen-lockfile --ignore-scripts

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@v1.0.0
        with:
          snyk-version: ${{ env.SNYK_VERSION }}

      - name: Verify Snyk authentication
        run: |
          set -euo pipefail

          snyk version
          snyk whoami

      - name: Prepare Snyk reports directory
        run: |
          set -euo pipefail

          mkdir -p snyk-reports

      - name: Scan pnpm workspace dependencies
        id: snyk_test
        continue-on-error: true
        run: |
          set -o pipefail

          snyk test \
            --all-projects \
            --exclude="$SNYK_OPEN_SOURCE_EXCLUDES" \
            --detection-depth=6 \
            --strict-out-of-sync=false \
            --severity-threshold="$SNYK_SEVERITY_THRESHOLD" \
            --policy-path="$SNYK_POLICY_FILE" \
            --sarif-file-output=snyk-reports/open-source.sarif \
            --json-file-output=snyk-reports/open-source.json

      - name: Upload Open Source findings to GitHub Code Scanning
        if: always() && hashFiles('snyk-reports/open-source.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk-reports/open-source.sarif
          category: snyk-open-source

      - name: Upload Open Source reports
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: snyk-open-source-${{ github.run_id }}
          path: |
            snyk-reports/open-source.sarif
            snyk-reports/open-source.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Write Open Source scan summary
        if: always()
        env:
          SCAN_RESULT: ${{ steps.snyk_test.outcome }}
        run: |
          set -euo pipefail

          {
            echo '## Snyk Open Source Scan'
            echo
            echo '| Setting | Value |'
            echo '| --- | --- |'
            echo '| Scan scope | pnpm workspace dependency manifests |'
            echo "| Test manifest exclusions | $SNYK_OPEN_SOURCE_EXCLUDES |"
            echo "| Severity threshold | $SNYK_SEVERITY_THRESHOLD |"
            echo "| Scan result | ${SCAN_RESULT:-skipped} |"
            echo '| SARIF report | snyk-reports/open-source.sarif |'
            echo '| JSON report | snyk-reports/open-source.json |'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail when dependency vulnerabilities are found
        if: always() && steps.snyk_test.outcome == 'failure'
        run: |
          echo '::error::Snyk found dependency vulnerabilities at or above the configured severity threshold.'
          exit 1

  code:
    name: Scan production source code
    needs: preflight
    if: needs.preflight.outputs.code_enabled == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    outputs:
      result: ${{ steps.snyk_code.outcome }}

    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Verify Snyk Code exclusion policy
        run: |
          set -euo pipefail

          if [[ ! -s "$SNYK_POLICY_FILE" ]]; then
            echo "::error::Snyk policy file is missing or empty: $SNYK_POLICY_FILE"
            exit 1
          fi

          echo 'Snyk Code uses .snyk to exclude test directories and test files.'

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@v1.0.0
        with:
          snyk-version: ${{ env.SNYK_VERSION }}

      - name: Verify Snyk authentication
        run: |
          set -euo pipefail

          snyk version
          snyk whoami

      - name: Prepare Snyk reports directory
        run: |
          set -euo pipefail

          mkdir -p snyk-reports

      - name: Scan production source code
        id: snyk_code
        continue-on-error: true
        run: |
          set -o pipefail

          snyk code test \
            --severity-threshold="$SNYK_SEVERITY_THRESHOLD" \
            --sarif-file-output=snyk-reports/code.sarif \
            --json-file-output=snyk-reports/code.json

      - name: Upload Snyk Code findings to GitHub Code Scanning
        if: always() && hashFiles('snyk-reports/code.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk-reports/code.sarif
          category: snyk-code

      - name: Upload Snyk Code reports
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: snyk-code-${{ github.run_id }}
          path: |
            snyk-reports/code.sarif
            snyk-reports/code.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Write Snyk Code scan summary
        if: always()
        env:
          SCAN_RESULT: ${{ steps.snyk_code.outcome }}
        run: |
          set -euo pipefail

          {
            echo '## Snyk Code Scan'
            echo
            echo '| Setting | Value |'
            echo '| --- | --- |'
            echo '| Scope | production source code |'
            echo "| Policy file | $SNYK_POLICY_FILE |"
            echo '| Excluded source | tests, specs, E2E files, fixtures, and mocks |'
            echo "| Severity threshold | $SNYK_SEVERITY_THRESHOLD |"
            echo "| Scan result | ${SCAN_RESULT:-skipped} |"
            echo '| SARIF report | snyk-reports/code.sarif |'
            echo '| JSON report | snyk-reports/code.json |'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail when production source vulnerabilities are found
        if: always() && steps.snyk_code.outcome == 'failure'
        run: |
          echo '::error::Snyk found production source-code vulnerabilities at or above the configured severity threshold.'
          exit 1

  summary:
    name: Publish Snyk result
    needs:
      - preflight
      - open-source
      - code
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Write workflow summary
        env:
          PACKAGE_MANIFEST_COUNT: ${{ needs.preflight.outputs.package_manifest_count }}
          LOCKFILE_COUNT: ${{ needs.preflight.outputs.lockfile_count }}
          SNYK_TOKEN_AVAILABLE: ${{ needs.preflight.outputs.snyk_token_available }}
          SNYK_POLICY_AVAILABLE: ${{ needs.preflight.outputs.snyk_policy_available }}
          OPEN_SOURCE_ENABLED: ${{ needs.preflight.outputs.open_source_enabled }}
          CODE_ENABLED: ${{ needs.preflight.outputs.code_enabled }}
          OPEN_SOURCE_REASON: ${{ needs.preflight.outputs.open_source_reason }}
          CODE_REASON: ${{ needs.preflight.outputs.code_reason }}
          OPEN_SOURCE_RESULT: ${{ needs.open-source.result }}
          CODE_RESULT: ${{ needs.code.result }}
        run: |
          set -euo pipefail

          {
            echo '## Snyk Result'
            echo
            echo '| Check | Result |'
            echo '| --- | --- |'
            echo "| Package manifests | ${PACKAGE_MANIFEST_COUNT:-0} |"
            echo "| Supported lockfiles | ${LOCKFILE_COUNT:-0} |"
            echo "| SNYK_TOKEN available | ${SNYK_TOKEN_AVAILABLE:-false} |"
            echo "| .snyk policy available | ${SNYK_POLICY_AVAILABLE:-false} |"
            echo "| Open Source scan enabled | ${OPEN_SOURCE_ENABLED:-false} |"
            echo "| Snyk Code scan enabled | ${CODE_ENABLED:-false} |"
            echo "| Open Source result | ${OPEN_SOURCE_RESULT:-skipped} |"
            echo "| Snyk Code result | ${CODE_RESULT:-skipped} |"
            echo "| Open Source status | ${OPEN_SOURCE_REASON:-unknown} |"
            echo "| Snyk Code status | ${CODE_REASON:-unknown} |"
          } >> "$GITHUB_STEP_SUMMARY"
