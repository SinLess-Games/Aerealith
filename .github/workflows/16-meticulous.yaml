# .github/workflows/16-meticulous.yaml
#
# Builds the static Aerealith frontend and runs Meticulous visual regression
# tests against the built assets.
#
# Required repository secret:
#   METICULOUS_API_TOKEN
#
# Prerequisites outside this workflow:
# - The Always Meticulous GitHub App is installed for SinLess-Games/Aerealith.
# - At least one browser session has been recorded for the Aerealith project.
# - The frontend recorder configuration remains in the Vite config.

name: 16 · Meticulous

on:
  # Meticulous needs a successful run on the default branch before it can
  # compare a pull request against that branch.
  push:
    branches:
      - master

  pull_request: {}

  # Required so Meticulous can request a run for a missing base commit.
  workflow_dispatch: {}

# These are the permissions Meticulous requires to create/update its status
# check and, when enabled in Meticulous, its pull request feedback comment.
permissions:
  actions: write
  contents: read
  issues: write
  pull-requests: write
  statuses: read

concurrency:
  group: meticulous-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  meticulous:
    name: Meticulous Visual Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.11.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 25.9.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend for Meticulous
        run: pnpm nx run frontend:build
        env:
          NODE_ENV: production
          METICULOUS_BUILD: "true"

      - name: Verify static frontend build
        run: |
          set -euo pipefail

          test -d dist/apps/frontend
          test -f dist/apps/frontend/index.html

      - name: Upload frontend assets and run Meticulous tests
        uses: alwaysmeticulous/report-diffs-action/upload-assets@b3c2a025ca3fc594f73c9ebac4a151a7175c1153 # v1.73.0
        with:
          api-token: ${{ secrets.METICULOUS_API_TOKEN }}
          github-token: ${{ github.token }}
          app-directory: dist/apps/frontend
          rewrites: |
            [
              {
                "source": "/(.*)",
                "destination": "/index.html"
              }
            ]
