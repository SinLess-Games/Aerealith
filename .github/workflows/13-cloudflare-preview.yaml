# .github/workflows/13-cloudflare-preview.yaml
#
# Deploys an isolated Cloudflare Workers preview for each internal pull request.
#
# Required GitHub repository secrets:
# - CLOUDFLARE_API_TOKEN
# - CLOUDFLARE_ACCOUNT_ID
#
# Optional GitHub repository variable:
# - CLOUDFLARE_WRANGLER_CONFIG_PATH
#
# Supported Wrangler configuration files discovered automatically:
# - apps/frontend/wrangler.jsonc
# - apps/frontend/wrangler.json
# - apps/frontend/wrangler.toml
#
# If more than one standard configuration file exists, set
# CLOUDFLARE_WRANGLER_CONFIG_PATH to the intended repository-relative path.
#
# Preview Worker name pattern:
# - aerealith-preview-pr-<pull-request-number>
#
# This workflow intentionally does not:
# - deploy to production routes
# - change DNS records
# - upload runtime Worker secrets
# - deploy pull requests from external forks

name: 13 · Cloudflare Preview

on:
  pull_request:
    branches:
      - master
      - staging
      - production
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

  workflow_dispatch:
    inputs:
      pull_request_number:
        description: "Pull request number used to name the preview Worker."
        required: true
        type: string

      wrangler_config_path:
        description: "Optional repository-relative Wrangler config path override."
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: >-
    cloudflare-preview-${{
      github.event.pull_request.number ||
      inputs.pull_request_number ||
      github.run_id
    }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  CI: "true"
  FORCE_COLOR: "1"
  HUSKY: "0"

  NODE_VERSION: "25.9.0"
  PNPM_VERSION: "11.5.2"
  WRANGLER_VERSION: "4"

  FRONTEND_PROJECT: "frontend"
  FRONTEND_DIRECTORY: "apps/frontend"
  PREVIEW_ENVIRONMENT: "preview"
  PREVIEW_WORKER_PREFIX: "aerealith-preview-pr"

jobs:
  preflight:
    name: Validate preview deployment requirements
    runs-on: ubuntu-latest
    timeout-minutes: 10

    outputs:
      deploy_enabled: ${{ steps.validate.outputs.deploy_enabled }}
      preview_worker_name: ${{ steps.validate.outputs.preview_worker_name }}
      wrangler_config_path: ${{ steps.validate.outputs.wrangler_config_path }}
      wrangler_config_format: ${{ steps.validate.outputs.wrangler_config_format }}
      configuration_source: ${{ steps.validate.outputs.configuration_source }}
      skip_reason: ${{ steps.validate.outputs.skip_reason }}

    env:
      EVENT_NAME: ${{ github.event_name }}
      PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number || inputs.pull_request_number }}
      PULL_REQUEST_DRAFT: ${{ github.event.pull_request.draft }}
      PULL_REQUEST_HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
      CURRENT_REPOSITORY: ${{ github.repository }}

      WRANGLER_CONFIG_PATH_OVERRIDE: ${{ inputs.wrangler_config_path || vars.CLOUDFLARE_WRANGLER_CONFIG_PATH }}

      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Validate preview deployment requirements
        id: validate
        run: |
          set -euo pipefail

          deploy_enabled='false'
          skip_reason=''
          preview_worker_name=''
          wrangler_config_path=''
          wrangler_config_format=''
          configuration_source=''
          internal_pull_request='true'
          discovered_configurations='none'

          resolve_config_path() {
            local requested_path="$1"
            local absolute_path=''
            local relative_path=''

            if [[ -z "$requested_path" ]]; then
              echo '::error::Wrangler configuration path cannot be empty.'
              exit 1
            fi

            if [[ "$requested_path" == /* ]]; then
              absolute_path="$(realpath -m "$requested_path")"
            else
              absolute_path="$(realpath -m "$GITHUB_WORKSPACE/$requested_path")"
            fi

            case "$absolute_path" in
              "$GITHUB_WORKSPACE"/*)
                ;;
              *)
                echo "::error::Wrangler configuration must be inside the repository workspace: $requested_path"
                exit 1
                ;;
            esac

            if [[ ! -f "$absolute_path" ]]; then
              echo "::error::Wrangler configuration file was not found: $requested_path"
              exit 1
            fi

            relative_path="${absolute_path#"$GITHUB_WORKSPACE"/}"

            case "$relative_path" in
              *.jsonc | *.json | *.toml)
                ;;
              *)
                echo "::error::Unsupported Wrangler configuration extension: $relative_path"
                echo '::error::Supported extensions are .jsonc, .json, and .toml.'
                exit 1
                ;;
            esac

            if [[ "$relative_path" == *[[:space:]]* ]]; then
              echo "::error::Wrangler configuration paths containing whitespace are not supported by this workflow: $relative_path"
              exit 1
            fi

            printf '%s\n' "$relative_path"
          }

          if [[ "$EVENT_NAME" == 'pull_request' ]] &&
            [[ "$PULL_REQUEST_HEAD_REPOSITORY" != "$CURRENT_REPOSITORY" ]]; then
            internal_pull_request='false'
          fi

          if [[ "$EVENT_NAME" == 'pull_request' ]] &&
            [[ "${PULL_REQUEST_DRAFT:-false}" == 'true' ]]; then
            skip_reason='Draft pull requests do not receive Cloudflare preview deployments.'
          elif [[ "$internal_pull_request" != 'true' ]]; then
            skip_reason='External fork pull requests do not receive deployment secrets.'
          elif [[ ! "$PULL_REQUEST_NUMBER" =~ ^[1-9][0-9]*$ ]]; then
            echo '::error::A valid pull request number is required to create an isolated preview Worker.'
            exit 1
          elif [[ -z "${CLOUDFLARE_API_TOKEN:-}" ]]; then
            echo '::error::CLOUDFLARE_API_TOKEN is not configured as a repository secret.'
            exit 1
          elif [[ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]]; then
            echo '::error::CLOUDFLARE_ACCOUNT_ID is not configured as a repository secret.'
            exit 1
          else
            preview_worker_name="${PREVIEW_WORKER_PREFIX}-${PULL_REQUEST_NUMBER}"

            if [[ "${#preview_worker_name}" -gt 63 ]]; then
              echo "::error::Preview Worker name exceeds Cloudflare's 63-character workers.dev limit: $preview_worker_name"
              exit 1
            fi

            if [[ ! "$preview_worker_name" =~ ^[a-z0-9][a-z0-9-]*[a-z0-9]$ ]]; then
              echo "::error::Preview Worker name is invalid for workers.dev: $preview_worker_name"
              exit 1
            fi

            if [[ -n "${WRANGLER_CONFIG_PATH_OVERRIDE:-}" ]]; then
              wrangler_config_path="$(
                resolve_config_path "$WRANGLER_CONFIG_PATH_OVERRIDE"
              )"
              configuration_source='explicit override'
            else
              config_candidates=(
                "$FRONTEND_DIRECTORY/wrangler.jsonc"
                "$FRONTEND_DIRECTORY/wrangler.json"
                "$FRONTEND_DIRECTORY/wrangler.toml"
              )

              found_configurations=()

              for candidate in "${config_candidates[@]}"; do
                if [[ -f "$candidate" ]]; then
                  found_configurations+=(
                    "$(resolve_config_path "$candidate")"
                  )
                fi
              done

              if [[ "${#found_configurations[@]}" -eq 0 ]]; then
                echo '::error::No supported Wrangler configuration file was found for the frontend.'
                echo "::error::Checked: ${config_candidates[*]}"
                echo '::error::Create one supported config file or set CLOUDFLARE_WRANGLER_CONFIG_PATH.'
                exit 1
              fi

              if [[ "${#found_configurations[@]}" -gt 1 ]]; then
                printf '::error::Multiple Wrangler configuration files were found:\n' >&2

                for configuration in "${found_configurations[@]}"; do
                  printf '::error:: - %s\n' "$configuration" >&2
                done

                echo '::error::Keep one config file or set CLOUDFLARE_WRANGLER_CONFIG_PATH to select the intended file.'
                exit 1
              fi

              wrangler_config_path="${found_configurations[0]}"
              configuration_source='automatic discovery'
            fi

            wrangler_config_format="${wrangler_config_path##*.}"
            discovered_configurations="$wrangler_config_path"

            deploy_enabled='true'
            skip_reason='Ready to build and deploy the Cloudflare preview.'
          fi

          {
            echo "deploy_enabled=$deploy_enabled"
            echo "preview_worker_name=$preview_worker_name"
            echo "wrangler_config_path=$wrangler_config_path"
            echo "wrangler_config_format=$wrangler_config_format"
            echo "configuration_source=$configuration_source"
            echo "skip_reason=$skip_reason"
          } >> "$GITHUB_OUTPUT"

          {
            echo '## Cloudflare Preview Preflight'
            echo
            echo '| Setting | Value |'
            echo '| --- | --- |'
            echo "| Internal pull request | $internal_pull_request |"
            echo "| Pull request draft | ${PULL_REQUEST_DRAFT:-false} |"
            echo "| Cloudflare API token available | $([[ -n "${CLOUDFLARE_API_TOKEN:-}" ]] && echo true || echo false) |"
            echo "| Cloudflare account ID available | $([[ -n "${CLOUDFLARE_ACCOUNT_ID:-}" ]] && echo true || echo false) |"
            echo "| Wrangler configuration | ${wrangler_config_path:-not-selected} |"
            echo "| Wrangler configuration format | ${wrangler_config_format:-not-selected} |"
            echo "| Configuration selection | ${configuration_source:-not-selected} |"
            echo "| Preview Worker | ${preview_worker_name:-not-created} |"
            echo "| Deployment enabled | $deploy_enabled |"
            echo "| Status | $skip_reason |"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    name: Build and deploy preview
    needs: preflight
    if: needs.preflight.outputs.deploy_enabled == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    outputs:
      deployment_url: ${{ steps.publish.outputs.deployment_url }}
      deployment_mode: ${{ steps.deployment_config.outputs.deployment_mode }}

    env:
      PREVIEW_WORKER_NAME: ${{ needs.preflight.outputs.preview_worker_name }}
      WRANGLER_CONFIG_PATH: ${{ needs.preflight.outputs.wrangler_config_path }}

      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Check out pull request
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Verify preview deployment files
        run: |
          set -euo pipefail

          required_files=(
            package.json
            pnpm-lock.yaml
            pnpm-workspace.yaml
            "$WRANGLER_CONFIG_PATH"
          )

          for required_file in "${required_files[@]}"; do
            if [[ ! -f "$required_file" ]]; then
              echo "::error::Required preview deployment file was not found: $required_file"
              exit 1
            fi
          done

          case "$WRANGLER_CONFIG_PATH" in
            *.jsonc | *.json | *.toml)
              ;;
            *)
              echo "::error::Unsupported Wrangler configuration file: $WRANGLER_CONFIG_PATH"
              exit 1
              ;;
          esac

          printf 'Node.js: %s\n' "$(node --version)"
          printf 'pnpm: %s\n' "$(pnpm --version)"
          printf 'Preview Worker: %s\n' "$PREVIEW_WORKER_NAME"
          printf 'Wrangler config: %s\n' "$WRANGLER_CONFIG_PATH"

      - name: Install workspace dependencies
        run: |
          set -euo pipefail

          pnpm install --frozen-lockfile --ignore-scripts

      - name: Verify frontend build target
        run: |
          set -euo pipefail

          project_json="$(pnpm nx show project "$FRONTEND_PROJECT" --json)"

          if ! jq -e '.targets.build != null' <<< "$project_json" >/dev/null; then
            echo "::error::The Nx project '$FRONTEND_PROJECT' does not define a build target."
            echo '::error::Create the frontend build target before enabling Cloudflare preview deployments.'
            exit 1
          fi

      - name: Build frontend preview
        env:
          CLOUDFLARE_ENV: ${{ env.PREVIEW_ENVIRONMENT }}
        run: |
          set -euo pipefail

          pnpm nx run "${FRONTEND_PROJECT}:build"

      - name: Resolve deployment configuration
        id: deployment_config
        run: |
          set -euo pipefail

          generated_config_candidates=(
            "$FRONTEND_DIRECTORY/.wrangler/deploy/config.json"
            ".wrangler/deploy/config.json"
          )

          generated_configurations=()

          for candidate in "${generated_config_candidates[@]}"; do
            if [[ -f "$candidate" ]]; then
              generated_configurations+=("$candidate")
            fi
          done

          if [[ "${#generated_configurations[@]}" -gt 1 ]]; then
            echo '::error::Multiple generated Wrangler deployment redirects were found.'

            for configuration in "${generated_configurations[@]}"; do
              echo "::error:: - $configuration"
            done

            echo '::error::Ensure only the frontend build creates .wrangler/deploy/config.json.'
            exit 1
          fi

          deployment_mode='source-config'
          working_directory='.'
          deploy_command=''
          generated_config_path=''

          if [[ "${#generated_configurations[@]}" -eq 1 ]]; then
            generated_config_path="${generated_configurations[0]}"
            deployment_mode='generated-config'

            if [[ "$generated_config_path" == '.wrangler/deploy/config.json' ]]; then
              working_directory='.'
            else
              working_directory="${generated_config_path%/.wrangler/deploy/config.json}"
            fi

            deploy_command="deploy --name $PREVIEW_WORKER_NAME --workers-dev"
          else
            deploy_command="deploy --config $WRANGLER_CONFIG_PATH --env $PREVIEW_ENVIRONMENT --name $PREVIEW_WORKER_NAME --workers-dev"
          fi

          {
            echo "deployment_mode=$deployment_mode"
            echo "working_directory=$working_directory"
            echo "generated_config_path=$generated_config_path"
            echo "deploy_command=$deploy_command"
          } >> "$GITHUB_OUTPUT"

          {
            echo '## Cloudflare Preview Deployment Configuration'
            echo
            echo '| Setting | Value |'
            echo '| --- | --- |'
            echo "| Deployment mode | $deployment_mode |"
            echo "| Source Wrangler config | $WRANGLER_CONFIG_PATH |"
            echo "| Generated deployment redirect | ${generated_config_path:-not-generated} |"
            echo "| Wrangler working directory | $working_directory |"
            echo "| Preview environment | $PREVIEW_ENVIRONMENT |"
            echo "| Preview Worker | $PREVIEW_WORKER_NAME |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Validate Cloudflare preview deployment
        env:
          DEPLOYMENT_MODE: ${{ steps.deployment_config.outputs.deployment_mode }}
          WORKING_DIRECTORY: ${{ steps.deployment_config.outputs.working_directory }}
        run: |
          set -euo pipefail

          case "$DEPLOYMENT_MODE" in
            generated-config)
              (
                cd "$WORKING_DIRECTORY"

                pnpm exec wrangler deploy \
                  --name "$PREVIEW_WORKER_NAME" \
                  --workers-dev \
                  --dry-run
              )
              ;;
            source-config)
              pnpm exec wrangler deploy \
                --config "$WRANGLER_CONFIG_PATH" \
                --env "$PREVIEW_ENVIRONMENT" \
                --name "$PREVIEW_WORKER_NAME" \
                --workers-dev \
                --dry-run
              ;;
            *)
              echo "::error::Unknown Cloudflare deployment mode: $DEPLOYMENT_MODE"
              exit 1
              ;;
          esac

      - name: Deploy Cloudflare preview Worker
        id: deploy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: ${{ env.WRANGLER_VERSION }}
          packageManager: pnpm
          workingDirectory: ${{ steps.deployment_config.outputs.working_directory }}
          preCommands: wrangler whoami
          command: ${{ steps.deployment_config.outputs.deploy_command }}

      - name: Verify deployed preview
        id: publish
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
        run: |
          set -euo pipefail

          deployment_url="$(printf '%s' "$DEPLOYMENT_URL" | tr -d '\r\n')"

          if [[ "$deployment_url" != https://* ]]; then
            echo '::error::Cloudflare did not return a valid deployment URL.'
            exit 1
          fi

          curl \
            --fail \
            --silent \
            --show-error \
            --location \
            --retry 3 \
            --retry-delay 3 \
            --connect-timeout 15 \
            --max-time 60 \
            --output /dev/null \
            "$deployment_url"

          {
            echo "deployment_url=$deployment_url"
          } >> "$GITHUB_OUTPUT"

          {
            echo '## Cloudflare Preview Deployment'
            echo
            echo '| Setting | Value |'
            echo '| --- | --- |'
            echo "| Preview Worker | $PREVIEW_WORKER_NAME |"
            echo "| Deployment URL | [$deployment_url]($deployment_url) |"
            echo '| Deployment validation | passed |'
            echo
            echo '> Preview deployment for this pull request is live.'
          } >> "$GITHUB_STEP_SUMMARY"

          echo "::notice title=Cloudflare preview deployed::$deployment_url"

  summary:
    name: Publish preview result
    needs:
      - preflight
      - deploy
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Write preview deployment summary
        env:
          DEPLOY_ENABLED: ${{ needs.preflight.outputs.deploy_enabled }}
          PREVIEW_WORKER_NAME: ${{ needs.preflight.outputs.preview_worker_name }}
          WRANGLER_CONFIG_PATH: ${{ needs.preflight.outputs.wrangler_config_path }}
          WRANGLER_CONFIG_FORMAT: ${{ needs.preflight.outputs.wrangler_config_format }}
          CONFIGURATION_SOURCE: ${{ needs.preflight.outputs.configuration_source }}
          PREFLIGHT_STATUS: ${{ needs.preflight.outputs.skip_reason }}
          DEPLOYMENT_URL: ${{ needs.deploy.outputs.deployment_url }}
          DEPLOYMENT_MODE: ${{ needs.deploy.outputs.deployment_mode }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
        run: |
          set -euo pipefail

          {
            echo '## Cloudflare Preview Workflow Result'
            echo
            echo '| Check | Result |'
            echo '| --- | --- |'
            echo "| Preview deployment enabled | ${DEPLOY_ENABLED:-false} |"
            echo "| Preview Worker | ${PREVIEW_WORKER_NAME:-not-created} |"
            echo "| Wrangler configuration | ${WRANGLER_CONFIG_PATH:-not-selected} |"
            echo "| Wrangler configuration format | ${WRANGLER_CONFIG_FORMAT:-not-selected} |"
            echo "| Configuration selection | ${CONFIGURATION_SOURCE:-not-selected} |"
            echo "| Deployment mode | ${DEPLOYMENT_MODE:-not-run} |"
            echo "| Deploy job result | ${DEPLOY_RESULT:-skipped} |"
            echo "| Preflight status | ${PREFLIGHT_STATUS:-unknown} |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "${DEPLOYMENT_URL:-}" == https://* ]]; then
            {
              echo
              echo '### Preview URL'
              echo
              echo "[$DEPLOYMENT_URL]($DEPLOYMENT_URL)"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
