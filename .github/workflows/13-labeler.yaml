# .github/workflows/13-labeler.yaml
#
# Automatically applies repository labels to pull requests using
# .github/labeler.yaml.
#
# This workflow uses pull_request_target so labels can also be applied to pull
# requests opened from forks. It does not check out or execute pull request code.

name: 13 · Labeler

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions: {}

concurrency:
  group: labeler-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  label:
    name: Apply pull request labels
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Apply labels from repository rules
        uses: actions/labeler@b8dd2d9be0f68b860e7dae5dae7d772984eacd6d # v6.2.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yaml

          # Leave manually applied labels alone.
          # Only labels managed by the labeler rules are added automatically.
          sync-labels: false

  assign-milestone:
    name: Assign milestone after labeling
    needs: label
    permissions:
      contents: read
      issues: write
      pull-requests: write
    uses: ./.github/workflows/15-assign-milestones.yaml
    with:
      number: ${{ github.event.pull_request.number }}
