# .github/workflows/20-cloudflare-preview.yaml
#
# Uploads an isolated preview version for each internal pull request.
#
# All preview versions belong to the existing Cloudflare Worker:
# - aerealith
#
# Preview aliases:
# - pr-123-aerealith.<account-subdomain>.workers.dev
#
# Deployment flow:
# 1. Nx and Vite build the frontend into dist/apps/frontend.
# 2. Wrangler bundles apps/frontend/src/worker.ts.
# 3. Wrangler uploads dist/apps/frontend as Cloudflare Static Assets.
# 4. Wrangler uploads a Worker version with a pr-<number> preview alias.
# 5. Wrangler writes structured deployment output that this workflow uses to
#    retrieve the actual aliased preview URL.
#
# Required GitHub repository secrets:
# - CLOUDFLARE_API_TOKEN
# - CLOUDFLARE_ACCOUNT_ID
#
# Optional GitHub repository variable:
# - CLOUDFLARE_WRANGLER_CONFIG_PATH
#
# Automatically discovered Wrangler configuration files:
# - apps/frontend/wrangler.jsonc
# - apps/frontend/wrangler.json
# - apps/frontend/wrangler.toml
#
# This workflow intentionally does not:
# - create a separate Worker service for each pull request
# - promote a preview version to production
# - change DNS records or custom-domain routes
# - upload runtime Worker secrets
# - deploy pull requests from external forks

name: 20 · Cloudflare Preview

on:
  pull_request:
    branches:
      - master
      - staging
      - production
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

  workflow_dispatch:
    inputs:
      pull_request_number:
        description: "Pull request number used to create the preview alias."
        required: true
        type: string

      wrangler_config_path:
        description: "Optional repository-relative Wrangler config path override."
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: >-
    cloudflare-preview-${{
      github.event.pull_request.number ||
      inputs.pull_request_number ||
      github.run_id
    }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  CI: "true"
  FORCE_COLOR: "1"
  HUSKY: "0"

  NODE_VERSION: "25.9.0"
  PNPM_VERSION: "11.12.0"

  FRONTEND_PROJECT: "frontend"
  FRONTEND_DIRECTORY: "apps/frontend"

  WORKER_NAME: "aerealith"
  PREVIEW_ALIAS_PREFIX: "pr"
  HEALTH_PATH: "/__aerealith/health"

jobs:
  preflight:
    name: Validate preview deployment requirements
    runs-on: ubuntu-latest
    timeout-minutes: 10

    outputs:
      deploy_enabled: ${{ steps.validate.outputs.deploy_enabled }}
      preview_alias: ${{ steps.validate.outputs.preview_alias }}
      wrangler_config_path: ${{ steps.validate.outputs.wrangler_config_path }}
      wrangler_config_format: ${{ steps.validate.outputs.wrangler_config_format }}
      configuration_source: ${{ steps.validate.outputs.configuration_source }}
      skip_reason: ${{ steps.validate.outputs.skip_reason }}

    env:
      EVENT_NAME: ${{ github.event_name }}
      PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number || inputs.pull_request_number }}
      PULL_REQUEST_DRAFT: ${{ github.event.pull_request.draft }}
      PULL_REQUEST_HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
      CURRENT_REPOSITORY: ${{ github.repository }}

      WRANGLER_CONFIG_PATH_OVERRIDE: >-
        ${{ inputs.wrangler_config_path || vars.CLOUDFLARE_WRANGLER_CONFIG_PATH }}

      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Validate preview deployment requirements
        id: validate
        run: |
          set -euo pipefail

          deploy_enabled='false'
          preview_alias=''
          wrangler_config_path=''
          wrangler_config_format=''
          configuration_source=''
          skip_reason=''

          internal_pull_request='true'
          token_available='false'
          account_id_available='false'

          if [[ -n "${CLOUDFLARE_API_TOKEN:-}" ]]; then
            token_available='true'
          fi

          if [[ -n "${CLOUDFLARE_ACCOUNT_ID:-}" ]]; then
            account_id_available='true'
          fi

          resolve_config_path() {
            local requested_path="$1"
            local absolute_path=''
            local relative_path=''

            if [[ -z "$requested_path" ]]; then
              echo '::error::Wrangler configuration path cannot be empty.'
              exit 1
            fi

            if [[ "$requested_path" == /* ]]; then
              absolute_path="$(realpath -m "$requested_path")"
            else
              absolute_path="$(realpath -m "$GITHUB_WORKSPACE/$requested_path")"
            fi

            if [[ "$absolute_path" != "$GITHUB_WORKSPACE/"* ]]; then
              echo "::error::Wrangler configuration must be inside the repository workspace: $requested_path"
              exit 1
            fi

            if [[ ! -f "$absolute_path" ]]; then
              echo "::error::Wrangler configuration file was not found: $requested_path"
              exit 1
            fi

            relative_path="${absolute_path#"$GITHUB_WORKSPACE"/}"

            case "$relative_path" in
              *.jsonc | *.json | *.toml)
                ;;
              *)
                echo "::error::Unsupported Wrangler configuration extension: $relative_path"
                echo '::error::Supported extensions are .jsonc, .json, and .toml.'
                exit 1
                ;;
            esac

            printf '%s\n' "$relative_path"
          }

          if [[ "$EVENT_NAME" == 'pull_request' ]] &&
            [[ "$PULL_REQUEST_HEAD_REPOSITORY" != "$CURRENT_REPOSITORY" ]]; then
            internal_pull_request='false'
          fi

          if [[ "$EVENT_NAME" == 'pull_request' ]] &&
            [[ "${PULL_REQUEST_DRAFT:-false}" == 'true' ]]; then
            skip_reason='Draft pull requests do not receive Cloudflare preview deployments.'
          elif [[ "$internal_pull_request" != 'true' ]]; then
            skip_reason='External fork pull requests do not receive deployment secrets.'
          elif [[ ! "${PULL_REQUEST_NUMBER:-}" =~ ^[1-9][0-9]*$ ]]; then
            echo '::error::A valid pull request number is required to create a preview alias.'
            exit 1
          elif [[ "$token_available" != 'true' ]]; then
            echo '::error::CLOUDFLARE_API_TOKEN is not configured as a repository secret.'
            exit 1
          elif [[ "$account_id_available" != 'true' ]]; then
            echo '::error::CLOUDFLARE_ACCOUNT_ID is not configured as a repository secret.'
            exit 1
          else
            preview_alias="${PREVIEW_ALIAS_PREFIX}-${PULL_REQUEST_NUMBER}"

            if [[ ! "$preview_alias" =~ ^[a-z][a-z0-9-]*$ ]]; then
              echo "::error::Preview alias is invalid: $preview_alias"
              exit 1
            fi

            maximum_alias_length=$((63 - 1 - ${#WORKER_NAME}))

            if [[ "${#preview_alias}" -gt "$maximum_alias_length" ]]; then
              echo "::error::Preview alias and Worker name exceed Cloudflare's 63-character DNS label limit."
              echo "::error::Alias: $preview_alias"
              echo "::error::Worker: $WORKER_NAME"
              exit 1
            fi

            if [[ -n "${WRANGLER_CONFIG_PATH_OVERRIDE:-}" ]]; then
              wrangler_config_path="$(
                resolve_config_path "$WRANGLER_CONFIG_PATH_OVERRIDE"
              )"
              configuration_source='explicit override'
            else
              config_candidates=(
                "$FRONTEND_DIRECTORY/wrangler.jsonc"
                "$FRONTEND_DIRECTORY/wrangler.json"
                "$FRONTEND_DIRECTORY/wrangler.toml"
              )

              found_configurations=()

              for candidate in "${config_candidates[@]}"; do
                if [[ -f "$candidate" ]]; then
                  found_configurations+=(
                    "$(resolve_config_path "$candidate")"
                  )
                fi
              done

              if [[ "${#found_configurations[@]}" -eq 0 ]]; then
                skip_reason='Cloudflare preview deployment is not configured for the frontend.'
              elif [[ "${#found_configurations[@]}" -gt 1 ]]; then
                echo '::error::Multiple Wrangler configuration files were found.'

                for configuration in "${found_configurations[@]}"; do
                  echo "::error:: - $configuration"
                done

                echo '::error::Keep one supported config file or set CLOUDFLARE_WRANGLER_CONFIG_PATH.'
                exit 1
              else
                wrangler_config_path="${found_configurations[0]}"
                configuration_source='automatic discovery'
              fi
            fi

            if [[ -n "$wrangler_config_path" ]]; then
              wrangler_config_format="${wrangler_config_path##*.}"
              deploy_enabled='true'
              skip_reason='Ready to build and upload the Cloudflare preview version.'
            fi
          fi

          {
            echo "deploy_enabled=$deploy_enabled"
            echo "preview_alias=$preview_alias"
            echo "wrangler_config_path=$wrangler_config_path"
            echo "wrangler_config_format=$wrangler_config_format"
            echo "configuration_source=$configuration_source"
            echo "skip_reason=$skip_reason"
          } >> "$GITHUB_OUTPUT"

          {
            echo '## Cloudflare Preview Preflight'
            echo
            echo '| Setting | Value |'
            echo '| --- | --- |'
            echo "| Internal pull request | $internal_pull_request |"
            echo "| Pull request draft | ${PULL_REQUEST_DRAFT:-false} |"
            echo "| Cloudflare API token available | $token_available |"
            echo "| Cloudflare account ID available | $account_id_available |"
            echo "| Worker service | $WORKER_NAME |"
            echo "| Preview alias | ${preview_alias:-not-created} |"
            echo "| Wrangler configuration | ${wrangler_config_path:-not-selected} |"
            echo "| Wrangler configuration format | ${wrangler_config_format:-not-selected} |"
            echo "| Configuration selection | ${configuration_source:-not-selected} |"
            echo "| Deployment enabled | $deploy_enabled |"
            echo "| Status | $skip_reason |"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    name: Build and upload preview version
    needs: preflight
    if: needs.preflight.outputs.deploy_enabled == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    outputs:
      preview_url: ${{ steps.upload.outputs.preview_url }}
      version_id: ${{ steps.upload.outputs.version_id }}
      health_url: ${{ steps.verify.outputs.health_url }}

    env:
      PREVIEW_ALIAS: ${{ needs.preflight.outputs.preview_alias }}
      WRANGLER_CONFIG_PATH: ${{ needs.preflight.outputs.wrangler_config_path }}

      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Check out pull request
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Verify deployment files
        run: |
          set -euo pipefail

          required_files=(
            package.json
            pnpm-lock.yaml
            pnpm-workspace.yaml
            "$WRANGLER_CONFIG_PATH"
          )

          for required_file in "${required_files[@]}"; do
            if [[ ! -f "$required_file" ]]; then
              echo "::error::Required deployment file was not found: $required_file"
              exit 1
            fi
          done

          case "$WRANGLER_CONFIG_PATH" in
            *.jsonc | *.json | *.toml)
              ;;
            *)
              echo "::error::Unsupported Wrangler configuration file: $WRANGLER_CONFIG_PATH"
              exit 1
              ;;
          esac

          printf 'Node.js: %s\n' "$(node --version)"
          printf 'pnpm: %s\n' "$(pnpm --version)"
          printf 'Preview alias: %s\n' "$PREVIEW_ALIAS"
          printf 'Wrangler config: %s\n' "$WRANGLER_CONFIG_PATH"

      - name: Install workspace dependencies
        run: |
          set -euo pipefail

          pnpm install --frozen-lockfile

      - name: Verify frontend build target
        run: |
          set -euo pipefail

          project_json="$(
            ./node_modules/.bin/nx show project "$FRONTEND_PROJECT" --json
          )"

          if ! jq -e '.targets.build != null' <<< "$project_json" >/dev/null; then
            echo "::error::The Nx project '$FRONTEND_PROJECT' does not define a build target."
            exit 1
          fi

          echo 'Frontend build target was found.'

      - name: Build frontend preview
        run: |
          set -euo pipefail

          pnpm exec nx run "${FRONTEND_PROJECT}:build:preview"

      - name: Verify frontend asset output
        run: |
          set -euo pipefail

          asset_directory='dist/apps/frontend'
          index_file="$asset_directory/index.html"

          if [[ ! -d "$asset_directory" ]]; then
            echo "::error::Frontend asset directory was not created: $asset_directory"
            exit 1
          fi

          if [[ ! -f "$index_file" ]]; then
            echo "::error::Frontend index file was not created: $index_file"
            exit 1
          fi

          {
            echo '## Frontend Build Output'
            echo
            echo '| Setting | Value |'
            echo '| --- | --- |'
            echo "| Asset directory | $asset_directory |"
            echo "| Entry document | $index_file |"
            echo '| Build validation | passed |'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Validate Cloudflare preview upload configuration
        run: |
          set -euo pipefail

          pnpm exec wrangler deploy \
            --config "$WRANGLER_CONFIG_PATH" \
            --dry-run

      - name: Upload Cloudflare preview version
        id: upload
        run: |
          set -euo pipefail

          output_file="$RUNNER_TEMP/cloudflare-preview-output.json"

          rm -f "$output_file"

          WRANGLER_OUTPUT_FILE_PATH="$output_file" \
            pnpm exec wrangler versions upload \
              --config "$WRANGLER_CONFIG_PATH" \
              --preview-alias "$PREVIEW_ALIAS"

          if [[ ! -s "$output_file" ]]; then
            echo '::error::Wrangler did not write structured deployment output.'
            echo '::error::Cannot safely determine the Cloudflare preview alias URL.'
            exit 1
          fi

          preview_url="$(
            jq -rs '
              map(select(.type == "version-upload"))
              | .[-1].preview_alias_url // empty
            ' "$output_file"
          )"

          version_id="$(
            jq -rs '
              map(select(.type == "version-upload"))
              | .[-1].version_id // empty
            ' "$output_file"
          )"

          if [[ "$preview_url" != https://* ]]; then
            echo '::error::Cloudflare uploaded the Worker version but did not return an aliased preview URL.'
            echo '::error::Confirm preview_urls = true is present in apps/frontend/wrangler.toml.'
            echo '::error::Confirm Preview URLs are enabled for the aerealith Worker in Cloudflare.'
            echo '::group::Wrangler structured output'
            cat "$output_file"
            echo '::endgroup::'
            exit 1
          fi

          if [[ -z "$version_id" ]]; then
            echo '::error::Cloudflare did not return a Worker version ID.'
            echo '::group::Wrangler structured output'
            cat "$output_file"
            echo '::endgroup::'
            exit 1
          fi

          {
            echo "preview_url=$preview_url"
            echo "version_id=$version_id"
          } >> "$GITHUB_OUTPUT"

          {
            echo '## Cloudflare Preview Version Uploaded'
            echo
            echo '| Setting | Value |'
            echo '| --- | --- |'
            echo "| Worker service | $WORKER_NAME |"
            echo "| Worker version ID | $version_id |"
            echo "| Preview alias | $PREVIEW_ALIAS |"
            echo "| Preview URL | [$preview_url]($preview_url) |"
            echo '| Production promotion | not performed |'
          } >> "$GITHUB_STEP_SUMMARY"

          echo "::notice title=Cloudflare preview version uploaded::$preview_url"

      - name: Verify preview health endpoint
        id: verify
        env:
          PREVIEW_URL: ${{ steps.upload.outputs.preview_url }}
        run: |
          set -euo pipefail

          health_url="${PREVIEW_URL%/}${HEALTH_PATH}"

          for attempt in {1..12}; do
            health_response=''

            if health_response="$(
              curl \
                --fail \
                --silent \
                --show-error \
                --location \
                --connect-timeout 15 \
                --max-time 60 \
                "$health_url"
            )"; then
              if jq -e '.status == "ok"' <<< "$health_response" >/dev/null; then
                echo "health_url=$health_url" >> "$GITHUB_OUTPUT"

                {
                  echo
                  echo '### Health Check'
                  echo
                  echo "| Endpoint | [$health_url]($health_url) |"
                  echo "| Expected response | \`{\"status\":\"ok\"}\` |"
                  echo '| Result | passed |'
                } >> "$GITHUB_STEP_SUMMARY"

                exit 0
              fi

              echo 'Preview health endpoint returned an unexpected response.'
              printf '%s\n' "$health_response"
            fi

            echo "Preview URL is not ready yet. Retry ${attempt}/12..."
            sleep 5
          done

          echo "::error::Preview health endpoint did not become reachable: $health_url"
          echo '::error::Confirm preview_urls = true is committed in apps/frontend/wrangler.toml.'
          echo '::error::Confirm Preview URLs are enabled in Cloudflare → Worker → Settings → Domains & Routes.'
          exit 1

  summary:
    name: Publish preview result
    needs:
      - preflight
      - deploy
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Write preview workflow summary
        env:
          DEPLOY_ENABLED: ${{ needs.preflight.outputs.deploy_enabled }}
          PREVIEW_ALIAS: ${{ needs.preflight.outputs.preview_alias }}
          WRANGLER_CONFIG_PATH: ${{ needs.preflight.outputs.wrangler_config_path }}
          WRANGLER_CONFIG_FORMAT: ${{ needs.preflight.outputs.wrangler_config_format }}
          CONFIGURATION_SOURCE: ${{ needs.preflight.outputs.configuration_source }}
          PREFLIGHT_STATUS: ${{ needs.preflight.outputs.skip_reason }}
          PREVIEW_URL: ${{ needs.deploy.outputs.preview_url }}
          VERSION_ID: ${{ needs.deploy.outputs.version_id }}
          HEALTH_URL: ${{ needs.deploy.outputs.health_url }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
        run: |
          set -euo pipefail

          {
            echo '## Cloudflare Preview Workflow Result'
            echo
            echo '| Check | Result |'
            echo '| --- | --- |'
            echo "| Worker service | $WORKER_NAME |"
            echo "| Preview deployment enabled | ${DEPLOY_ENABLED:-false} |"
            echo "| Preview alias | ${PREVIEW_ALIAS:-not-created} |"
            echo "| Worker version ID | ${VERSION_ID:-not-created} |"
            echo "| Wrangler configuration | ${WRANGLER_CONFIG_PATH:-not-selected} |"
            echo "| Wrangler configuration format | ${WRANGLER_CONFIG_FORMAT:-not-selected} |"
            echo "| Configuration selection | ${CONFIGURATION_SOURCE:-not-selected} |"
            echo "| Upload job result | ${DEPLOY_RESULT:-skipped} |"
            echo "| Preflight status | ${PREFLIGHT_STATUS:-unknown} |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "${PREVIEW_URL:-}" == https://* ]]; then
            {
              echo
              echo '### Preview URL'
              echo
              echo "[$PREVIEW_URL]($PREVIEW_URL)"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          if [[ "${HEALTH_URL:-}" == https://* ]]; then
            {
              echo
              echo '### Verified Health Endpoint'
              echo
              echo "[$HEALTH_URL]($HEALTH_URL)"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
