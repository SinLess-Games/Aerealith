# .github/workflows/23-release.yaml
#
# Creates a GitHub release and release tag from a manually selected ref.
#
# The workflow:
# 1. Finds the most recent published release reachable from the selected target.
# 2. Collects every commit and changed file since that release.
# 3. Runs release quality and production dependency audit checks.
# 4. Builds factual release evidence, scan summaries, and scan-status records.
# 5. Uses GitHub Models through COPILOT_GITHUB_TOKEN to draft release notes.
# 6. Uses Gemini through GEMINI_API_KEY to refine the changelog.
# 7. Creates the GitHub release and release tag.
# 8. Uploads scan reports, release facts, audit results, and quality logs.
#
# Required repository secrets:
# - COPILOT_GITHUB_TOKEN
#   Required permissions:
#   - Contents: Read and write
#   - Models: Read
#
# - GEMINI_API_KEY
#
# This workflow intentionally:
# - runs only through workflow_dispatch
# - creates a release tag from the selected target ref
# - fails closed when core validation, dependency audit, Copilot, or Gemini fails
# - does not create a release from an existing tag
# - keeps release facts grounded in Git history and command output
# - never reports an unrun scanner as passed
#
# External tools such as CodeQL, Snyk, Sonar, Datadog, Codeball, Miticulous,
# and Herculese are represented honestly in the release template. Their values
# remain "Not run" until their reports are integrated into this release workflow.

name: 23 · Create Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to create, for example v0.1.0."
        required: true
        type: string

      target_ref:
        description: "Branch, tag, or commit SHA to release."
        required: true
        default: "master"
        type: string

      release_title:
        description: "Optional release title. Defaults to Aerealith <release-tag>."
        required: false
        type: string

      prerelease:
        description: "Mark this release as a prerelease."
        required: true
        default: false
        type: boolean

      draft:
        description: "Create the release as a draft instead of publishing it immediately."
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.release_tag }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  CI: "true"
  FORCE_COLOR: "1"
  HUSKY: "0"

  NODE_VERSION: "25.9.0"
  PNPM_VERSION: "11.5.2"

  CHANGELOG_TEMPLATE_PATH: ".github/templates/CHANGELOG.template.md"

  COPILOT_MODEL: "openai/gpt-4.1"
  GEMINI_MODEL: "gemini-3.5-flash"

  MAX_AI_FACTS_CHARACTERS: "60000"

jobs:
  release:
    name: Build changelog and create release
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      RELEASE_TAG: ${{ inputs.release_tag }}
      TARGET_REF: ${{ inputs.target_ref }}
      RELEASE_TITLE_INPUT: ${{ inputs.release_title }}
      IS_PRERELEASE: ${{ inputs.prerelease }}
      IS_DRAFT: ${{ inputs.draft }}

      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Check out release target
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.target_ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Validate release inputs and credentials
        id: preflight
        run: |
          set -euo pipefail

          if [[ -z "${COPILOT_GITHUB_TOKEN:-}" ]]; then
            echo '::error::COPILOT_GITHUB_TOKEN is not configured as a repository secret.'
            exit 1
          fi

          if [[ -z "${GEMINI_API_KEY:-}" ]]; then
            echo '::error::GEMINI_API_KEY is not configured as a repository secret.'
            exit 1
          fi

          if [[ ! "$RELEASE_TAG" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo '::error::Release tag must resemble semantic versioning, for example v0.1.0.'
            echo "::error::Received: $RELEASE_TAG"
            exit 1
          fi

          if ! git check-ref-format --allow-onelevel "refs/tags/$RELEASE_TAG"; then
            echo "::error::Release tag is not a valid Git tag: $RELEASE_TAG"
            exit 1
          fi

          if [[ "$IS_PRERELEASE" != 'true' && "$IS_PRERELEASE" != 'false' ]]; then
            echo '::error::prerelease must be true or false.'
            exit 1
          fi

          if [[ "$IS_DRAFT" != 'true' && "$IS_DRAFT" != 'false' ]]; then
            echo '::error::draft must be true or false.'
            exit 1
          fi

          if [[ ! -f "$CHANGELOG_TEMPLATE_PATH" ]]; then
            echo "::error::Changelog template was not found: $CHANGELOG_TEMPLATE_PATH"
            exit 1
          fi

          required_template_markers=(
            '{{release_title}}'
            '{{release_tag}}'
            '{{target_sha_short}}'
            '{{previous_release}}'
            '{{release_generated_at}}'
            '{{release_channel}}'
            '{{commit_count}}'
            '{{changed_file_count}}'
            '{{contributor_count}}'
            '{{lines_added}}'
            '{{lines_removed}}'
            '{{release_readiness_status}}'
            '{{ai_changelog}}'
            '{{coverage_status}}'
            '{{coverage_summary}}'
            '{{coverage_evidence}}'
            '{{gitleaks_status}}'
            '{{gitleaks_summary}}'
            '{{gitleaks_evidence}}'
            '{{dependency_review_status}}'
            '{{dependency_review_summary}}'
            '{{dependency_review_evidence}}'
            '{{codeql_status}}'
            '{{codeql_summary}}'
            '{{codeql_evidence}}'
            '{{container_security_status}}'
            '{{container_security_summary}}'
            '{{container_security_evidence}}'
            '{{snyk_status}}'
            '{{snyk_summary}}'
            '{{snyk_evidence}}'
            '{{sonar_status}}'
            '{{sonar_summary}}'
            '{{sonar_evidence}}'
            '{{dependabot_status}}'
            '{{dependabot_summary}}'
            '{{dependabot_evidence}}'
            '{{datadog_status}}'
            '{{datadog_summary}}'
            '{{datadog_evidence}}'
            '{{codeball_status}}'
            '{{codeball_summary}}'
            '{{codeball_evidence}}'
            '{{miticulous_status}}'
            '{{miticulous_summary}}'
            '{{miticulous_evidence}}'
            '{{herculese_status}}'
            '{{herculese_summary}}'
            '{{herculese_evidence}}'
            '{{workspace_checks_status}}'
            '{{workspace_checks_impact}}'
            '{{security_scans_status}}'
            '{{security_scans_impact}}'
            '{{supply_chain_status}}'
            '{{supply_chain_impact}}'
            '{{container_scans_status}}'
            '{{container_scans_impact}}'
            '{{runtime_review_status}}'
            '{{runtime_review_impact}}'
            '{{release_readiness_summary}}'
            '{{security_review_notes}}'
            '{{scan_report}}'
            '{{changed_file_inventory}}'
            '{{complete_commit_list}}'
            '{{compare_url}}'
          )

          for marker in "${required_template_markers[@]}"; do
            if ! grep -Fq "$marker" "$CHANGELOG_TEMPLATE_PATH"; then
              echo "::error::Changelog template is missing required marker: $marker"
              exit 1
            fi
          done

          git fetch origin --tags --force

          target_sha="$(git rev-parse "${TARGET_REF}^{commit}")"
          target_sha_short="${target_sha:0:7}"

          if git rev-parse --verify --quiet "refs/tags/$RELEASE_TAG" >/dev/null; then
            echo "::error::Git tag already exists: $RELEASE_TAG"
            exit 1
          fi

          if GH_TOKEN="$COPILOT_GITHUB_TOKEN" \
            gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "::error::A GitHub release already exists for tag: $RELEASE_TAG"
            exit 1
          fi

          release_title="$RELEASE_TITLE_INPUT"

          if [[ -z "$release_title" ]]; then
            release_title="Aerealith $RELEASE_TAG"
          fi

          release_channel='Stable'

          if [[ "$IS_DRAFT" == 'true' ]]; then
            release_channel='Draft'
          elif [[ "$IS_PRERELEASE" == 'true' ]]; then
            release_channel='Pre-release'
          fi

          release_directory="$RUNNER_TEMP/release-$RELEASE_TAG"

          rm -rf "$release_directory"
          mkdir -p "$release_directory"

          {
            echo "TARGET_SHA=$target_sha"
            echo "TARGET_SHA_SHORT=$target_sha_short"
            echo "RELEASE_TITLE=$release_title"
            echo "RELEASE_CHANNEL=$release_channel"
            echo "RELEASE_DIRECTORY=$release_directory"
          } >> "$GITHUB_ENV"

          {
            echo "target_sha=$target_sha"
            echo "target_sha_short=$target_sha_short"
            echo "release_title=$release_title"
            echo "release_channel=$release_channel"
          } >> "$GITHUB_OUTPUT"

          {
            echo '## Release Preflight'
            echo
            echo '| Setting | Value |'
            echo '| --- | --- |'
            echo "| Release tag | \`$RELEASE_TAG\` |"
            echo "| Release title | $release_title |"
            echo "| Release channel | $release_channel |"
            echo "| Target ref | \`$TARGET_REF\` |"
            echo "| Target commit | \`$target_sha_short\` |"
            echo "| Pre-release | $IS_PRERELEASE |"
            echo "| Draft release | $IS_DRAFT |"
            echo '| COPILOT_GITHUB_TOKEN | configured |'
            echo '| GEMINI_API_KEY | configured |'
            echo '| Status | ready to collect release evidence |'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Collect commits and changes since the last release
        id: evidence
        run: |
          set -euo pipefail

          releases_file="$RELEASE_DIRECTORY/releases.json"

          GH_TOKEN="$COPILOT_GITHUB_TOKEN" \
            gh api \
              --paginate \
              --slurp \
              "/repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
              > "$releases_file"

          previous_release_tag=''

          while IFS= read -r candidate_tag; do
            [[ -z "$candidate_tag" ]] && continue

            if ! git rev-parse --verify --quiet \
              "refs/tags/${candidate_tag}^{commit}" >/dev/null; then
              continue
            fi

            if git merge-base --is-ancestor \
              "${candidate_tag}^{commit}" \
              "$TARGET_SHA"; then
              previous_release_tag="$candidate_tag"
              break
            fi
          done < <(
            jq -r '
              [
                .[][]?
                | select(.draft == false and .published_at != null)
              ]
              | sort_by(.published_at)
              | reverse
              | .[].tag_name
            ' "$releases_file"
          )

          commits_file="$RELEASE_DIRECTORY/commits.tsv"
          changed_files_file="$RELEASE_DIRECTORY/changed-files.tsv"
          changed_paths_file="$RELEASE_DIRECTORY/changed-paths.txt"
          numstat_file="$RELEASE_DIRECTORY/numstat.tsv"
          diff_check_file="$RELEASE_DIRECTORY/diff-check.txt"

          if [[ -n "$previous_release_tag" ]]; then
            release_range="${previous_release_tag}..${TARGET_SHA}"
            previous_release_display="\`${previous_release_tag}\`"

            git log \
              --reverse \
              --date=short \
              --format='%H%x09%h%x09%an%x09%ae%x09%ad%x09%s' \
              "$release_range" \
              > "$commits_file"

            git diff \
              --find-renames \
              --name-status \
              "$previous_release_tag" \
              "$TARGET_SHA" \
              > "$changed_files_file"

            git diff \
              --find-renames \
              --numstat \
              "$previous_release_tag" \
              "$TARGET_SHA" \
              > "$numstat_file"

            if ! git diff \
              --check \
              "$previous_release_tag" \
              "$TARGET_SHA" \
              > "$diff_check_file"; then
              echo '::error::Whitespace errors were found in the release diff.'
              cat "$diff_check_file"
              exit 1
            fi

            compare_url="https://github.com/${GITHUB_REPOSITORY}/compare/${previous_release_tag}...${RELEASE_TAG}"
          else
            release_range="repository-start..${TARGET_SHA}"
            previous_release_display='Initial release'

            git log \
              --reverse \
              --date=short \
              --format='%H%x09%h%x09%an%x09%ae%x09%ad%x09%s' \
              "$TARGET_SHA" \
              > "$commits_file"

            git diff \
              --root \
              --find-renames \
              --name-status \
              "$TARGET_SHA" \
              > "$changed_files_file"

            git diff \
              --root \
              --find-renames \
              --numstat \
              "$TARGET_SHA" \
              > "$numstat_file"

            if ! git diff \
              --check \
              --root \
              "$TARGET_SHA" \
              > "$diff_check_file"; then
              echo '::error::Whitespace errors were found in the initial release diff.'
              cat "$diff_check_file"
              exit 1
            fi

            compare_url="https://github.com/${GITHUB_REPOSITORY}/commits/${TARGET_SHA}"
          fi

          awk -F '\t' '
            $1 ~ /^[RC]/ {
              print $3
              next
            }

            {
              print $2
            }
          ' "$changed_files_file" \
            | sed '/^$/d' \
            | sort -u \
            > "$changed_paths_file"

          commit_count="$(wc -l < "$commits_file" | tr -d ' ')"
          changed_file_count="$(wc -l < "$changed_paths_file" | tr -d ' ')"

          if [[ "$commit_count" -eq 0 ]]; then
            echo '::error::No commits were found between the previous release and the selected target.'
            exit 1
          fi

          lines_added="$(
            awk '
              $1 ~ /^[0-9]+$/ {
                added += $1
              }

              END {
                print added + 0
              }
            ' "$numstat_file"
          )"

          lines_removed="$(
            awk '
              $2 ~ /^[0-9]+$/ {
                removed += $2
              }

              END {
                print removed + 0
              }
            ' "$numstat_file"
          )"

          contributor_count="$(
            cut -f 4 "$commits_file" \
              | sed '/^$/d' \
              | sort -u \
              | wc -l \
              | tr -d ' '
          )"

          count_matching_paths() {
            local pattern="$1"

            grep -Ec "$pattern" "$changed_paths_file" || true
          }

          apps_changed="$(count_matching_paths '^apps/')"
          libs_changed="$(count_matching_paths '^libs/')"
          workflow_changed="$(count_matching_paths '^\.github/workflows/')"
          docker_changed="$(count_matching_paths '(^|/)(Dockerfile|Dockerfile\.|\.Dockerfile$)')"
          dependency_changed="$(count_matching_paths '(^|/)(package\.json|pnpm-lock\.yaml|pnpm-workspace\.yaml|Dockerfile|compose\.ya?ml)$')"
          tests_changed="$(count_matching_paths '(^|/)(__tests__/|tests?/|.*\.(spec|test)\.[^.]+$)')"
          docs_changed="$(count_matching_paths '(^|/)(README\.md|CHANGELOG\.md|docs?/|.*\.md$)')"
          infrastructure_changed="$(count_matching_paths '(^|/)(wrangler\.(toml|json|jsonc)|terraform/|kubernetes/|k8s/|helm/|docker/|\.github/workflows/)')"
          security_surface_changed="$(count_matching_paths '(^|/)(auth|security|permission|secret|crypto|token|session|database|db|migration)')"

          {
            echo "PREVIOUS_RELEASE_TAG=$previous_release_tag"
            echo "PREVIOUS_RELEASE_DISPLAY=$previous_release_display"
            echo "RELEASE_RANGE=$release_range"
            echo "COMPARE_URL=$compare_url"
            echo "COMMIT_COUNT=$commit_count"
            echo "CHANGED_FILE_COUNT=$changed_file_count"
            echo "LINES_ADDED=$lines_added"
            echo "LINES_REMOVED=$lines_removed"
            echo "CONTRIBUTOR_COUNT=$contributor_count"
            echo "APPS_CHANGED=$apps_changed"
            echo "LIBS_CHANGED=$libs_changed"
            echo "WORKFLOW_CHANGED=$workflow_changed"
            echo "DOCKER_CHANGED=$docker_changed"
            echo "DEPENDENCY_CHANGED=$dependency_changed"
            echo "TESTS_CHANGED=$tests_changed"
            echo "DOCS_CHANGED=$docs_changed"
            echo "INFRASTRUCTURE_CHANGED=$infrastructure_changed"
            echo "SECURITY_SURFACE_CHANGED=$security_surface_changed"
          } >> "$GITHUB_ENV"

          {
            echo '## Release Evidence Collected'
            echo
            echo '| Metric | Result |'
            echo '| --- | --- |'
            echo "| Previous release | ${previous_release_tag:-initial release} |"
            echo "| Commit range | \`$release_range\` |"
            echo "| Commits | $commit_count |"
            echo "| Changed files | $changed_file_count |"
            echo "| Contributors | $contributor_count |"
            echo "| Lines added | $lines_added |"
            echo "| Lines removed | $lines_removed |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install workspace dependencies
        run: |
          set -euo pipefail

          pnpm install --frozen-lockfile

      - name: Run release quality checks
        run: |
          set -euo pipefail

          validation_log="$RELEASE_DIRECTORY/pnpm-check.log"

          if ! pnpm check 2>&1 | tee "$validation_log"; then
            echo '::error::pnpm check failed. A release cannot be created from an invalid workspace.'
            exit 1
          fi

          echo "WORKSPACE_CHECK_LOG=$validation_log" >> "$GITHUB_ENV"

      - name: Run production dependency audit
        run: |
          set -euo pipefail

          audit_report="$RELEASE_DIRECTORY/pnpm-audit-production.json"

          if ! pnpm audit \
            --prod \
            --audit-level high \
            --json \
            > "$audit_report"; then
            echo '::error::pnpm audit found high or critical production dependency issues.'
            echo '::group::Production dependency audit'
            cat "$audit_report"
            echo '::endgroup::'
            exit 1
          fi

          echo "PRODUCTION_AUDIT_REPORT=$audit_report" >> "$GITHUB_ENV"

      - name: Build release scan dashboard and factual reports
        run: |
          set -euo pipefail

          release_scan_summary="$RELEASE_DIRECTORY/release-scan-summary.md"
          release_scan_report="$RELEASE_DIRECTORY/release-scan-report.md"
          release_scan_status="$RELEASE_DIRECTORY/release-scan-status.json"
          complete_commit_list="$RELEASE_DIRECTORY/complete-commit-list.md"
          changed_file_inventory="$RELEASE_DIRECTORY/changed-file-inventory.md"
          release_facts="$RELEASE_DIRECTORY/release-facts.md"
          template_values="$RELEASE_DIRECTORY/template-values.json"

          release_generated_at="$(date --utc +'%Y-%m-%dT%H:%M:%SZ')"

          while IFS=$'\t' read -r _full_sha short_sha author _email date subject; do
            printf -- "- \`%s\` %s — %s (%s)\n" \
              "$short_sha" \
              "$subject" \
              "$author" \
              "$date"
          done < "$RELEASE_DIRECTORY/commits.tsv" \
            > "$complete_commit_list"

          {
            echo '```text'
            cat "$RELEASE_DIRECTORY/changed-files.tsv"
            echo '```'
          } > "$changed_file_inventory"

          security_sensitive_paths="$(
            grep -Ei \
              '(^|/)(auth|security|permission|secret|crypto|token|session|database|db|migration)' \
              "$RELEASE_DIRECTORY/changed-paths.txt" \
              || true
          )"

          release_readiness_status='⚠️ Review needed'
          release_readiness_summary='Core release gates passed. External scanner evidence was not collected by this workflow, so a human should review any applicable external dashboards before publishing a stable release.'

          coverage_status='⏭️ Not run'
          coverage_summary='No coverage report was generated by this release workflow.'
          coverage_evidence='Not available'

          gitleaks_status='⏭️ Not run'
          gitleaks_summary='Gitleaks was not executed by this release workflow.'
          gitleaks_evidence='Not available'

          dependency_review_status='ℹ️ Informational'
          dependency_review_summary='Production dependency audit passed. GitHub Dependency Review itself was not run.'
          dependency_review_evidence="Release asset: \`pnpm-audit-production.json\`"

          codeql_status='⏭️ Not run'
          codeql_summary='CodeQL analysis was not executed by this release workflow.'
          codeql_evidence='Not available'

          container_security_status='⏭️ Not run'
          container_security_summary='No container image vulnerability scan was executed before this release.'
          container_security_evidence='Not available'

          snyk_status='⏭️ Not run'
          snyk_summary='Snyk was not executed by this release workflow.'
          snyk_evidence='Not available'

          sonar_status='⏭️ Not run'
          sonar_summary='Sonar analysis was not executed by this release workflow.'
          sonar_evidence='Not available'

          dependabot_status='⏭️ Not run'
          dependabot_summary='Dependabot alert status was not queried by this release workflow.'
          dependabot_evidence='Not available'

          datadog_status='⏭️ Not run'
          datadog_summary='No runtime or deployment health review was collected from Datadog.'
          datadog_evidence='Not available'

          codeball_status='⏭️ Not run'
          codeball_summary='Codeball review results were not collected by this release workflow.'
          codeball_evidence='Not available'

          meticulous_status='⏭️ Not run'
          meticulous_summary='Miticulous results were not collected by this release workflow.'
          meticulous_evidence='Not available'

          herculese_status='⏭️ Not run'
          herculese_summary='Herculese results were not collected by this release workflow.'
          herculese_evidence='Not available'

          workspace_checks_status='✅ Passed'
          workspace_checks_impact="The workspace quality gate completed successfully through \`pnpm check\`."

          security_scans_status='⚠️ Review needed'
          security_scans_impact='Only the production dependency audit ran in this workflow. Dedicated secret, SAST, and vulnerability scanners were not run here.'

          supply_chain_status='⚠️ Review needed'
          supply_chain_impact='Production dependency audit passed, but GitHub Dependency Review and Dependabot alert review were not collected.'

          container_scans_status='⏭️ Not run'
          container_scans_impact='No container image security report was collected before release creation.'

          runtime_review_status='⏭️ Not run'
          runtime_review_impact='No Datadog runtime health or deployment review was collected before release creation.'

          {
            echo '| Scan | Status | Summary | Evidence |'
            echo '| --- | --- | --- | --- |'
            echo "| Test coverage | $coverage_status | $coverage_summary | $coverage_evidence |"
            echo "| Gitleaks | $gitleaks_status | $gitleaks_summary | $gitleaks_evidence |"
            echo "| Dependency Review | $dependency_review_status | $dependency_review_summary | $dependency_review_evidence |"
            echo "| CodeQL | $codeql_status | $codeql_summary | $codeql_evidence |"
            echo "| Container Security | $container_security_status | $container_security_summary | $container_security_evidence |"
            echo "| Snyk | $snyk_status | $snyk_summary | $snyk_evidence |"
            echo "| Sonar | $sonar_status | $sonar_summary | $sonar_evidence |"
            echo "| Dependabot | $dependabot_status | $dependabot_summary | $dependabot_evidence |"
            echo "| Datadog | $datadog_status | $datadog_summary | $datadog_evidence |"
            echo "| Codeball | $codeball_status | $codeball_summary | $codeball_evidence |"
            echo "| Miticulous | $meticulous_status | $meticulous_summary | $meticulous_evidence |"
            echo "| Herculese | $herculese_status | $herculese_summary | $herculese_evidence |"
          } > "$release_scan_summary"

          security_review_notes="$RELEASE_DIRECTORY/security-review-notes.md"

          {
            echo "- ✅ \`git diff --check\` passed."
            echo "- ✅ \`pnpm check\` passed."
            echo "- ✅ \`pnpm audit --prod --audit-level high\` passed."
            echo '- ⚠️ Dedicated secret scanning, SAST, container security, and external scanner evidence were not collected in this release workflow.'
            echo '- ⚠️ The release should receive human review of relevant external security dashboards before stable publication.'
            echo

            if [[ -n "$security_sensitive_paths" ]]; then
              echo '### Security-Sensitive Paths Changed'
              echo
              echo 'The following changed paths matched the release security-review pattern:'
              echo
              echo '```text'
              printf '%s\n' "$security_sensitive_paths"
              echo '```'
            else
              echo '### Security-Sensitive Paths Changed'
              echo
              echo 'No changed paths matched the configured security-sensitive review pattern.'
            fi
          } > "$security_review_notes"

          {
            echo '# Aerealith Release Scan Report'
            echo
            echo '## Release Coverage'
            echo
            echo '| Setting | Value |'
            echo '| --- | --- |'
            echo "| Release tag | \`$RELEASE_TAG\` |"
            echo "| Release channel | $RELEASE_CHANNEL |"
            echo "| Target commit | \`$TARGET_SHA\` |"
            echo "| Previous release | ${PREVIOUS_RELEASE_TAG:-Initial release} |"
            echo "| Commit range | \`$RELEASE_RANGE\` |"
            echo "| Release generated | $release_generated_at |"
            echo "| Commits scanned | $COMMIT_COUNT |"
            echo "| Changed files scanned | $CHANGED_FILE_COUNT |"
            echo "| Contributors scanned | $CONTRIBUTOR_COUNT |"
            echo "| Lines added | $LINES_ADDED |"
