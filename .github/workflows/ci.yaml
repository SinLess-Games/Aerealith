name: CI

on:
  push:
    branches:
      - master
      - staging
      - production

  pull_request:
    branches:
      - master
      - staging
      - production

  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NX_DAEMON: "false"
  NX_TASKS_RUNNER_DYNAMIC_OUTPUT: "false"
  PNPM_STORE_DIR: ${{ github.workspace }}/.pnpm-store

jobs:
  validate:
    name: Validate workspace
    runs-on: ubuntu-latest
    timeout-minutes: 35

    outputs:
      base_sha: ${{ steps.range.outputs.base_sha }}
      head_sha: ${{ steps.range.outputs.head_sha }}
      pnpm_cache: ${{ steps.cache_pnpm.outputs.cache-hit }}
      install: ${{ steps.install.outcome }}
      nx_verify: ${{ steps.nx_verify.outcome }}
      nx_reset: ${{ steps.nx_reset.outcome }}
      range: ${{ steps.range.outcome }}
      affected_validation: ${{ steps.affected_validation.outcome }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.23.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Prepare CI directories
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p \
            "$PNPM_STORE_DIR" \
            "artifacts/ci"

      - name: Restore pnpm store cache
        id: cache_pnpm
        uses: actions/cache@v5
        with:
          path: ${{ env.PNPM_STORE_DIR }}
          key: pnpm-store-${{ runner.os }}-node-24-pnpm-10-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-node-24-pnpm-10-

      - name: Verify Node.js and pnpm
        shell: bash
        run: |
          set -euo pipefail

          node_version="$(node --version)"
          pnpm_version="$(pnpm --version)"

          {
            echo '## Toolchain'
            echo
            echo '| Tool | Version |'
            echo '| --- | --- |'
            echo "| Node.js | \`$node_version\` |"
            echo "| pnpm | \`$pnpm_version\` |"
          } >> "$GITHUB_STEP_SUMMARY"

          printf 'Node.js: %s\n' "$node_version"
          printf 'pnpm: %s\n' "$pnpm_version"

      - name: Install dependencies
        id: install
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail

          pnpm install \
            --frozen-lockfile \
            --store-dir "$PNPM_STORE_DIR" \
            2>&1 | tee artifacts/ci/install.log

      - name: Verify Nx installation
        id: nx_verify
        if: steps.install.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail

          pnpm exec nx report 2>&1 | tee artifacts/ci/nx-report.log

          {
            echo
            echo '## Nx report'
            echo
            echo '```text'
            cat artifacts/ci/nx-report.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Reset local Nx workspace state
        id: nx_reset
        if: steps.install.outcome == 'success' && steps.nx_verify.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail

          # Do not restore .nx/cache between runs while diagnosing project-graph
          # plugin crashes. Nx Cloud remains responsible for remote task caching.
          pnpm exec nx reset 2>&1 | tee artifacts/ci/nx-reset.log

      - name: Resolve Git comparison range
        id: range
        if: steps.install.outcome == 'success' && steps.nx_verify.outcome == 'success' && steps.nx_reset.outcome == 'success'
        continue-on-error: true
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PULL_REQUEST_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PULL_REQUEST_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BASE_SHA: ${{ github.event.before }}
          PUSH_HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == 'pull_request' ]]; then
            base_sha="$PULL_REQUEST_BASE_SHA"
            head_sha="$PULL_REQUEST_HEAD_SHA"
          elif [[ "$EVENT_NAME" == 'push' ]]; then
            base_sha="$PUSH_BASE_SHA"
            head_sha="$PUSH_HEAD_SHA"
          else
            head_sha="$PUSH_HEAD_SHA"
            base_sha="$(git rev-parse "${head_sha}^" 2>/dev/null || printf '%s' "$head_sha")"
          fi

          if [[ -z "$base_sha" || "$base_sha" =~ ^0+$ ]]; then
            base_sha="$(git rev-parse "${head_sha}^" 2>/dev/null || printf '%s' "$head_sha")"
          fi

          git cat-file -e "${base_sha}^{commit}"
          git cat-file -e "${head_sha}^{commit}"

          {
            echo "NX_BASE=$base_sha"
            echo "NX_HEAD=$head_sha"
          } >> "$GITHUB_ENV"

          {
            echo "base_sha=$base_sha"
            echo "head_sha=$head_sha"
          } >> "$GITHUB_OUTPUT"

          {
            echo
            echo '## Nx comparison range'
            echo
            echo "- Base: \`$base_sha\`"
            echo "- Head: \`$head_sha\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Validate affected projects
        id: affected_validation
        if: steps.install.outcome == 'success' && steps.nx_verify.outcome == 'success' && steps.nx_reset.outcome == 'success' && steps.range.outcome == 'success'
        continue-on-error: true
        shell: bash
        env:
          NX_VERBOSE_LOGGING: "true"
        run: |
          set -o pipefail

          pnpm exec nx affected \
            --targets=lint,typecheck,test,build \
            --base="$NX_BASE" \
            --head="$NX_HEAD" \
            --parallel=3 \
            --outputStyle=static \
            2>&1 | tee artifacts/ci/nx-affected-validation.log

      - name: Explain Nx project graph failure
        if: always() && steps.affected_validation.outcome == 'failure'
        shell: bash
        run: |
          {
            echo
            echo '## Nx validation diagnostics'
            echo
            echo 'Nx could not complete affected validation.'
            echo
            echo 'If the log contains `Plugin worker "@nx/vite/plugin" exited unexpectedly` or'
            echo '`Plugin worker "@nx/vitest" exited unexpectedly`, the repository Nx/Vite/Vitest'
            echo 'configuration must be repaired. This CI workflow clears local Nx state before'
            echo 'validation and uploads the complete diagnostic log as an artifact.'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run Nx Cloud self-healing analysis
        if: always() && steps.install.outcome == 'success' && steps.affected_validation.outcome == 'failure'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail

          pnpm exec nx fix-ci 2>&1 | tee artifacts/ci/nx-fix-ci.log

      - name: Write validation summary
        if: always()
        shell: bash
        env:
          PNPM_CACHE: ${{ steps.cache_pnpm.outputs.cache-hit }}
          INSTALL: ${{ steps.install.outcome }}
          NX_VERIFY: ${{ steps.nx_verify.outcome }}
          NX_RESET: ${{ steps.nx_reset.outcome }}
          RANGE: ${{ steps.range.outcome }}
          AFFECTED_VALIDATION: ${{ steps.affected_validation.outcome }}
        run: |
          {
            echo
            echo '## Aerealith CI validation'
            echo
            echo '| Check | Result |'
            echo '| --- | --- |'
            echo "| pnpm store cache | ${PNPM_CACHE:-false} |"
            echo "| Dependency install | ${INSTALL:-unknown} |"
            echo "| Nx installation | ${NX_VERIFY:-unknown} |"
            echo "| Nx workspace reset | ${NX_RESET:-unknown} |"
            echo "| Git comparison range | ${RANGE:-unknown} |"
            echo "| Nx affected lint, typecheck, test, build | ${AFFECTED_VALIDATION:-unknown} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload CI logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ci-logs-${{ github.run_id }}
          path: artifacts/ci/
          if-no-files-found: ignore
          retention-days: 7

      - name: Fail when workspace validation failed
        if: always()
        shell: bash
        env:
          INSTALL: ${{ steps.install.outcome }}
          NX_VERIFY: ${{ steps.nx_verify.outcome }}
          NX_RESET: ${{ steps.nx_reset.outcome }}
          RANGE: ${{ steps.range.outcome }}
          AFFECTED_VALIDATION: ${{ steps.affected_validation.outcome }}
        run: |
          set -euo pipefail

          failed=false

          for result in \
            "$INSTALL" \
            "$NX_VERIFY" \
            "$NX_RESET" \
            "$RANGE" \
            "$AFFECTED_VALIDATION"; do
            if [[ "$result" != 'success' ]]; then
              failed=true
            fi
          done

          if [[ "$failed" == 'true' ]]; then
            echo '::error::One or more workspace validation checks failed.'
            exit 1
          fi

  megalinter:
    name: MegaLinter
    runs-on: ubuntu-latest
    timeout-minutes: 30

    outputs:
      result: ${{ steps.megalinter.outcome }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Run MegaLinter
        id: megalinter
        continue-on-error: true
        uses: oxsecurity/megalinter@v9.5.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLY_FIXES: none
          DEFAULT_WORKSPACE: ${{ github.workspace }}
          SHOW_ELAPSED_TIME: true
          VALIDATE_ALL_CODEBASE: false

      - name: Upload MegaLinter report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: megalinter-report-${{ github.run_id }}
          path: megalinter-reports/
          if-no-files-found: ignore
          retention-days: 7

      - name: Fail when MegaLinter failed
        if: always() && steps.megalinter.outcome != 'success'
        shell: bash
        run: |
          echo '::error::MegaLinter reported one or more validation failures.'
          exit 1

  report:
    name: Publish CI result
    needs:
      - validate
      - megalinter
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Update pull request CI summary
        if: github.event.pull_request.head.repo.full_name == github.repository
        continue-on-error: true
        uses: actions/github-script@v8
        env:
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          BASE_SHA: ${{ needs.validate.outputs.base_sha }}
          HEAD_SHA: ${{ needs.validate.outputs.head_sha }}
          PNPM_CACHE: ${{ needs.validate.outputs.pnpm_cache }}
          INSTALL: ${{ needs.validate.outputs.install }}
          NX_VERIFY: ${{ needs.validate.outputs.nx_verify }}
          NX_RESET: ${{ needs.validate.outputs.nx_reset }}
          RANGE: ${{ needs.validate.outputs.range }}
          AFFECTED_VALIDATION: ${{ needs.validate.outputs.affected_validation }}
          MEGALINTER: ${{ needs.megalinter.outputs.result }}
          VALIDATE_JOB: ${{ needs.validate.result }}
          MEGALINTER_JOB: ${{ needs.megalinter.result }}
        with:
          script: |
            const marker = '<!-- aerealith-ci-summary -->';
            const issueNumber = context.payload.pull_request.number;

            const resultLabel = (value) => {
              const results = {
                success: '✅ Passed',
                failure: '❌ Failed',
                skipped: '➖ Skipped',
                cancelled: '⚪ Cancelled!',
              };

              return results[value] ?? '⚠️ Unknown';
            };

            const overall =
              process.env.VALIDATE_JOB === 'success' &&
              process.env.MEGALINTER_JOB === 'success'
                ? '✅ Passed'
                : '❌ Failed';

            const nxDiagnostic =
              process.env.AFFECTED_VALIDATION === 'failure'
                ? [
                    '',
                    '> [!WARNING]',
                    '> Nx affected validation failed. Download the `ci-logs` artifact and inspect `nx-affected-validation.log`.',
                    '> If the project graph reports Vite or Vitest plugin-worker failures, repair the affected Nx/Vite/Vitest configuration before rerunning CI.',
                  ].join('\n')
                : '';

            const body = [
              marker,
              '## Aerealith CI',
              '',
              `**Overall result:** ${overall}`,
              `**Run:** [#${process.env.RUN_NUMBER}](${process.env.RUN_URL})`,
              '',
              '| Check | Result |',
              '| --- | --- |',
              `| Dependency install | ${resultLabel(process.env.INSTALL)} |`,
              `| Nx installation | ${resultLabel(process.env.NX_VERIFY)} |`,
              `| Nx workspace reset | ${resultLabel(process.env.NX_RESET)} |`,
              `| Git comparison range | ${resultLabel(process.env.RANGE)} |`,
              `| Nx affected validation | ${resultLabel(process.env.AFFECTED_VALIDATION)} |`,
              `| MegaLinter | ${resultLabel(process.env.MEGALINTER)} |`,
              '',
              '### Cache',
              '',
              `- pnpm store: \`${process.env.PNPM_CACHE === 'true' ? 'hit' : 'miss'}\``,
              '- Nx task cache: managed by Nx Cloud when configured for this workspace.',
              '',
              '<details>',
              '<summary>Run details</summary>',
              '',
              `- Base SHA: \`${process.env.BASE_SHA || 'unavailable'}\``,
              `- Head SHA: \`${process.env.HEAD_SHA || 'unavailable'}\``,
              '- Validation targets: `lint`, `typecheck`, `test`, `build`',
              '- Logs: download the `ci-logs` artifact from the workflow run.',
              '',
              '</details>',
              nxDiagnostic,
            ].join('\n');

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                per_page: 100,
              },
            );

            const existingComment = comments.find(
              (comment) =>
                comment.user?.type === 'Bot' &&
                comment.body?.includes(marker),
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body,
              });

              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body,
            });
