# .github/workflows/09-container-security.yaml
#
# Scans Aerealith container definitions and built images for security issues.
#
# Coverage:
# - Trivy configuration scan for Dockerfiles, Compose files, and supported
#   infrastructure configuration tracked in the repository.
# - Automatic discovery of every tracked Dockerfile.
# - Root-context Docker builds for every discovered Dockerfile.
# - Trivy image vulnerability scans for each successfully built image.
# - SARIF uploads to GitHub Code Scanning when available.
# - Downloadable SARIF artifacts for every completed scan.
#
# Build-context policy:
# - Every discovered Dockerfile is built with "." as its context.
# - This matches Aerealith workspace Dockerfiles, which may depend on shared
#   libraries, package manifests, pnpm-lock.yaml, and Nx configuration.
#
# Security policy:
# - Shared Trivy policy is loaded from trivy.yaml.
# - .trivyignore.yaml is loaded through trivy.yaml.
# - Image scans fail on policy-defined actionable findings.
# - Container configuration scans fail on policy-defined findings.
# - No images are pushed to a registry.
# - No repository secrets are used.
#
# Required companion files:
# - .dockerignore
# - trivy.yaml
# - .trivyignore.yaml

name: 09 · Container Security

on:
  pull_request:
    branches:
      - master
      - staging
      - production
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

  push:
    branches:
      - master
      - staging
      - production

  schedule:
    # Weekly full scan catches newly disclosed vulnerabilities in base images
    # and dependency layers without requiring a source-code change.
    - cron: "45 3 * * 0"

  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: >-
    container-security-${{
      github.event.pull_request.number ||
      github.ref ||
      github.run_id
    }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  TRIVY_CONFIG: trivy.yaml
  TRIVY_IGNORE_FILE: .trivyignore.yaml

jobs:
  discover:
    name: Discover container definitions
    runs-on: ubuntu-latest
    timeout-minutes: 10

    outputs:
      dockerfiles_found: ${{ steps.discover.outputs.dockerfiles_found }}
      dockerfile_count: ${{ steps.discover.outputs.dockerfile_count }}
      matrix: ${{ steps.discover.outputs.matrix }}

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Discover tracked Dockerfiles
        id: discover
        run: |
          set -euo pipefail

          matrix_file="$RUNNER_TEMP/container-security-matrix.jsonl"
          : > "$matrix_file"

          while IFS= read -r -d '' file; do
            case "$file" in
              Dockerfile|*/Dockerfile)
                ;;
              *)
                continue
                ;;
            esac

            slug="$(
              printf '%s' "$file" |
                sed \
                  -e 's#^\./##' \
                  -e 's#/Dockerfile$##' \
                  -e 's#^Dockerfile$#root#' \
                  -e 's#[/._ ]\+#-#g' \
                  -e 's#[^[:alnum:]-]##g' \
                  -e 'y/ABCDEFGHIJKLMNOPQRSTUVWXYZ/abcdefghijklmnopqrstuvwxyz/'
            )"

            if [[ -z "$slug" ]]; then
              slug='root'
            fi

            image="aerealith-ci/${slug}:${GITHUB_SHA}"

            jq --null-input \
              --arg dockerfile "$file" \
              --arg slug "$slug" \
              --arg image "$image" \
              '{
                dockerfile: $dockerfile,
                slug: $slug,
                image: $image
              }' \
              >> "$matrix_file"
          done < <(git ls-files -z)

          dockerfile_count="$(wc -l < "$matrix_file" | tr -d '[:space:]')"

          if [[ "$dockerfile_count" == '0' ]]; then
            matrix='{"include":[]}'
            dockerfiles_found='false'
          else
            matrix="$(jq --slurp '{include: .}' "$matrix_file")"
            dockerfiles_found='true'
          fi

          {
            echo "dockerfiles_found=$dockerfiles_found"
            echo "dockerfile_count=$dockerfile_count"
            echo 'matrix<<EOF'
            echo "$matrix"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

          {
            echo '## Container Security Discovery'
            echo
            echo '| Setting | Value |'
            echo '| --- | --- |'
            echo "| Tracked Dockerfiles found | $dockerfile_count |"
            echo '| Root build context | . |'
            echo

            if [[ "$dockerfiles_found" == 'true' ]]; then
              echo '### Dockerfiles to Build and Scan'
              echo
              echo '| Dockerfile | Image Tag |'
              echo '| --- | --- |'

              jq --raw-output \
                '.include[] | "| \(.dockerfile) | \(.image) |"' \
                <<< "$matrix"
            else
              echo '> No tracked Dockerfiles were found. The configuration scan will still run.'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  configuration:
    name: Scan container configuration
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Verify Trivy policy files
        run: |
          set -euo pipefail

          for policy_file in "$TRIVY_CONFIG" "$TRIVY_IGNORE_FILE"; do
            if [[ ! -f "$policy_file" ]]; then
              echo "::error::Required Trivy policy file was not found: $policy_file"
              exit 1
            fi

            if [[ ! -s "$policy_file" ]]; then
              echo "::error::Trivy policy file is empty: $policy_file"
              exit 1
            fi
          done

          printf 'Using Trivy configuration: %s\n' "$TRIVY_CONFIG"
          printf 'Using Trivy exceptions: %s\n' "$TRIVY_IGNORE_FILE"

      - name: Prepare Trivy reports directory
        run: |
          set -euo pipefail

          mkdir -p trivy-reports

      - name: Scan container configuration with Trivy
        id: trivy_config
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: v0.72.0
          scan-type: config
          scan-ref: .
          trivy-config: ${{ env.TRIVY_CONFIG }}
          format: sarif
          output: trivy-reports/container-configuration.sarif
          limit-severities-for-sarif: true
          exit-code: "1"
          hide-progress: true

      - name: Upload configuration findings to GitHub Code Scanning
        if: >-
          always() &&
          hashFiles('trivy-reports/container-configuration.sarif') != '' &&
          (
            github.event_name != 'pull_request' ||
            github.event.pull_request.head.repo.full_name == github.repository
          )
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: trivy-reports/container-configuration.sarif
          category: trivy-container-configuration

      - name: Upload container configuration report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-container-configuration-${{ github.run_id }}
          path: trivy-reports/container-configuration.sarif
          if-no-files-found: ignore
          retention-days: 14

      - name: Write configuration scan summary
        if: always()
        env:
          SCAN_RESULT: ${{ steps.trivy_config.outcome }}
        run: |
          set -euo pipefail

          {
            echo '## Container Configuration Security'
            echo
            echo '| Setting | Value |'
            echo '| --- | --- |'
            echo "| Trivy configuration | $TRIVY_CONFIG |"
            echo "| Trivy exceptions | $TRIVY_IGNORE_FILE |"
            echo "| Scan result | ${SCAN_RESULT:-skipped} |"
            echo '| Report format | SARIF |'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail when container configuration scan failed
        if: always() && steps.trivy_config.outcome != 'success'
        run: |
          echo '::error::Trivy detected one or more policy-violating container configuration findings.'
          exit 1

  images:
    name: Scan ${{ matrix.slug }} image
    needs: discover
    if: needs.discover.outputs.dockerfiles_found == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 35

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover.outputs.matrix) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Verify Trivy policy files
        run: |
          set -euo pipefail

          for policy_file in "$TRIVY_CONFIG" "$TRIVY_IGNORE_FILE"; do
            if [[ ! -f "$policy_file" ]]; then
              echo "::error::Required Trivy policy file was not found: $policy_file"
              exit 1
            fi

            if [[ ! -s "$policy_file" ]]; then
              echo "::error::Trivy policy file is empty: $policy_file"
              exit 1
            fi
          done

          printf 'Using Trivy configuration: %s\n' "$TRIVY_CONFIG"
          printf 'Using Trivy exceptions: %s\n' "$TRIVY_IGNORE_FILE"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Prepare Trivy reports directory
        run: |
          set -euo pipefail

          mkdir -p trivy-reports

      - name: Build container image
        id: build
        continue-on-error: true
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          tags: ${{ matrix.image }}
          load: true
          push: false

          # This image exists only on the CI runner for Trivy analysis.
          provenance: false
          sbom: false

      - name: Scan built image with Trivy
        id: trivy_image
        if: steps.build.outcome == 'success'
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: v0.72.0
          scan-type: image
          image-ref: ${{ matrix.image }}
          trivy-config: ${{ env.TRIVY_CONFIG }}
          format: sarif
          output: trivy-reports/${{ matrix.slug }}-image.sarif
          limit-severities-for-sarif: true
          exit-code: "1"
          hide-progress: true

      - name: Upload image findings to GitHub Code Scanning
        if: >-
          always() &&
          hashFiles(format('trivy-reports/{0}-image.sarif', matrix.slug)) != '' &&
          (
            github.event_name != 'pull_request' ||
            github.event.pull_request.head.repo.full_name == github.repository
          )
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: trivy-reports/${{ matrix.slug }}-image.sarif
          category: trivy-container-image-${{ matrix.slug }}

      - name: Upload image scan report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-image-${{ matrix.slug }}-${{ github.run_id }}
          path: trivy-reports/${{ matrix.slug }}-image.sarif
          if-no-files-found: ignore
          retention-days: 14

      - name: Write image scan summary
        if: always()
        env:
          DOCKERFILE: ${{ matrix.dockerfile }}
          IMAGE: ${{ matrix.image }}
          BUILD_RESULT: ${{ steps.build.outcome }}
          SCAN_RESULT: ${{ steps.trivy_image.outcome }}
        run: |
          set -euo pipefail

          {
            echo '## Container Image Security'
            echo
            echo '| Setting | Value |'
            echo '| --- | --- |'
            echo "| Dockerfile | $DOCKERFILE |"
            echo "| Image | $IMAGE |"
            echo "| Build result | ${BUILD_RESULT:-skipped} |"
            echo "| Trivy result | ${SCAN_RESULT:-skipped} |"
            echo "| Trivy configuration | $TRIVY_CONFIG |"
            echo "| Trivy exceptions | $TRIVY_IGNORE_FILE |"
            echo '| Report format | SARIF |'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail when the image build or security scan failed
        if: always()
        env:
          BUILD_RESULT: ${{ steps.build.outcome }}
          SCAN_RESULT: ${{ steps.trivy_image.outcome }}
          DOCKERFILE: ${{ matrix.dockerfile }}
        run: |
          set -euo pipefail

          if [[ "$BUILD_RESULT" != 'success' ]]; then
            echo "::error::Container build failed for $DOCKERFILE."
            exit 1
          fi

          if [[ "$SCAN_RESULT" != 'success' ]]; then
            echo '::error::Trivy detected one or more policy-violating image vulnerabilities.'
            exit 1
          fi
