# .github/workflows/05-repository-quality.yaml
#
# Runs repository-wide quality checks through MegaLinter.
#
# Scan policy:
# - Pull requests: changed files only for fast feedback.
# - Pushes to protected branches: full repository validation.
# - Weekly schedule: full repository validation.
# - Manual runs: choose changed-files or full-repository validation.
#
# MegaLinter configuration:
# - This workflow explicitly uses .mega-linter.yaml.
# - Keep all enabled linters, exclusions, formatter behavior, and custom
#   linter settings inside that repository-level configuration file.
#
# Security:
# - Uses pull_request, not pull_request_target.
# - Does not grant write access to repository contents.
# - Does not apply or commit automatic fixes.

name: 05 · Repository Quality

on:
  pull_request:
    branches:
      - master
      - staging
      - production
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

  push:
    branches:
      - master
      - staging
      - production

  schedule:
    # Weekly full-repository quality scan every Sunday at 04:00 UTC.
    - cron: "0 4 * * 0"

  workflow_dispatch:
    inputs:
      validate_all_codebase:
        description: "Validate the entire repository instead of only changed files."
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  pull-requests: read
  statuses: write

concurrency:
  group: >-
    repository-quality-${{
      github.event.pull_request.number ||
      github.ref ||
      github.run_id
    }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  CI: "true"
  FORCE_COLOR: "1"
  NX_DAEMON: "false"
  NODE_VERSION: "25.9.0"
  PNPM_VERSION: "11.11.0"

jobs:
  quality:
    name: MegaLinter Quality Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      # The existing Aerealith configuration uses this filename.
      # MegaLinter defaults to .mega-linter.yml, so this explicit override is
      # required while the repository uses .mega-linter.yaml.
      MEGALINTER_CONFIG: .mega-linter.yaml

      # Keep reports in a predictable location for artifact upload.
      REPORT_OUTPUT_FOLDER: megalinter-reports

      # Never apply, commit, or push automatic formatting changes from CI.
      APPLY_FIXES: none

      # Prevent stale report files from a prior run from appearing in artifacts.
      CLEAR_REPORT_FOLDER: "true"

      # Better visibility in logs and generated reports.
      SHOW_ELAPSED_TIME: "true"
      SHOW_SKIPPED_LINTERS: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history lets MegaLinter accurately determine PR diffs and
          # perform complete repository scans on protected branches.
          fetch-depth: 0
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Verify toolchain
        run: |
          set -euo pipefail

          printf 'Node.js: %s\n' "$(node --version)"
          printf 'pnpm: %s\n' "$(pnpm --version)"

          if [[ ! -f 'package.json' ]]; then
            echo '::error::package.json was not found in the repository root.'
            exit 1
          fi

          if [[ ! -f 'pnpm-lock.yaml' ]]; then
            echo '::error::pnpm-lock.yaml was not found in the repository root.'
            exit 1
          fi

      - name: Install dependencies
        run: |
          set -euo pipefail

          pnpm install --frozen-lockfile

      - name: Verify MegaLinter configuration
        run: |
          set -euo pipefail

          if [[ ! -f "$MEGALINTER_CONFIG" ]]; then
            echo "::error::MegaLinter configuration was not found: $MEGALINTER_CONFIG"
            exit 1
          fi

          if [[ ! -s "$MEGALINTER_CONFIG" ]]; then
            echo "::error::MegaLinter configuration is empty: $MEGALINTER_CONFIG"
            exit 1
          fi

          printf 'Using MegaLinter configuration: %s\n' "$MEGALINTER_CONFIG"

      - name: Run MegaLinter
        id: megalinter
        uses: oxsecurity/megalinter@ef3e84b8b836d76db562d0f3ed7da61e8fd538bc # v9.6.0
        env:
          # Enables individual linter status checks when GitHub permits them.
          GITHUB_TOKEN: ${{ github.token }}

          # Pull requests receive focused changed-file validation.
          # Pushes, scheduled runs, and manual full runs validate all source.
          VALIDATE_ALL_CODEBASE: >-
            ${{
              github.event_name != 'pull_request' &&
              (
                github.event_name != 'workflow_dispatch' ||
                inputs.validate_all_codebase
              )
            }}

      - name: Upload MegaLinter reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: megalinter-reports-${{ github.run_id }}
          path: |
            megalinter-reports/**
            mega-linter.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Write workflow summary
        if: always()
        env:
          EVENT_NAME: ${{ github.event_name }}
          VALIDATE_ALL_CODEBASE: >-
            ${{
              github.event_name != 'pull_request' &&
              (
                github.event_name != 'workflow_dispatch' ||
                inputs.validate_all_codebase
              )
            }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail

          markdown_tick=$'\x60'
          node_version="$(node --version)"
          pnpm_version="$(pnpm --version)"

          {
            echo '## Repository Quality'
            echo
            echo '| Setting | Value |'
            echo '| --- | --- |'
            printf '| Trigger | %s%s%s |\n' \
              "$markdown_tick" \
              "$EVENT_NAME" \
              "$markdown_tick"
            printf '| Configuration | %s%s%s |\n' \
              "$markdown_tick" \
              "$MEGALINTER_CONFIG" \
              "$markdown_tick"
            printf '| Node.js | %s%s%s |\n' \
              "$markdown_tick" \
              "$node_version" \
              "$markdown_tick"
            printf '| pnpm | %s%s%s |\n' \
              "$markdown_tick" \
              "$pnpm_version" \
              "$markdown_tick"
            printf '| Full repository scan | %s%s%s |\n' \
              "$markdown_tick" \
              "$VALIDATE_ALL_CODEBASE" \
              "$markdown_tick"
            printf '| Dependency install | %spnpm install --frozen-lockfile%s |\n' \
              "$markdown_tick" \
              "$markdown_tick"
            printf '| Automatic fixes | %sdisabled%s |\n' \
              "$markdown_tick" \
              "$markdown_tick"
            printf '| Job result | %s%s%s |\n' \
              "$markdown_tick" \
              "$JOB_STATUS" \
              "$markdown_tick"
            echo
            echo 'MegaLinter reports are attached to this workflow run when generated.'
          } >> "$GITHUB_STEP_SUMMARY"
