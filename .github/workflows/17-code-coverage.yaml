# .github/workflows/17-code-coverage.yaml
#
# Publishes Vitest coverage to GitHub Code Quality using one combined
# Cobertura XML report for the Nx workspace.
#
# Prerequisites:
# - GitHub Code Quality is enabled for this repository.
# - The repository is on GitHub Team or GitHub Enterprise Cloud.
# - @vitest/coverage-v8 is installed in the workspace.
#
# This workflow intentionally uses pull_request, not pull_request_target:
# coverage must be generated from the pull request's actual code, and no
# repository secrets are required.

name: 17 · Code Coverage

on:
  # GitHub Code Quality compares pull requests against the default branch.
  push:
    branches:
      - master

  pull_request:
    branches:
      - master
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

  workflow_dispatch:

# Every job must declare only the permissions it needs.
permissions: {}

concurrency:
  group: code-coverage-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  CI: "true"
  NX_DAEMON: "false"
  NODE_VERSION: "25.9.0"
  PNPM_VERSION: "11.5.2"
  COVERAGE_DIRECTORY: coverage/code-quality
  COBERTURA_REPORT: coverage/code-quality/cobertura.xml

jobs:
  coverage:
    name: Vitest Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read

    outputs:
      cobertura_available: ${{ steps.cobertura.outputs.available }}

    steps:
      - name: Check out pull request head
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Coverage must map to the PR head, not GitHub's temporary merge commit.
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Discover Nx test projects
        id: projects
        run: |
          set -euo pipefail

          nx_bin="$GITHUB_WORKSPACE/node_modules/.bin/nx"
          projects_file="$RUNNER_TEMP/coverage-projects.txt"
          projects_json="$RUNNER_TEMP/coverage-projects.json"

          if [[ ! -x "$nx_bin" ]]; then
            echo "::error::Nx executable was not found at $nx_bin."
            exit 1
          fi

          # Nx 23 emits a JSON array. Request that format explicitly and keep
          # ANSI sequences out of the machine-readable output.
          FORCE_COLOR=0 "$nx_bin" show projects --withTarget=test --json \
            > "$projects_json"

          if ! jq -e \
            'type == "array" and all(.[]; type == "string")' \
            "$projects_json" >/dev/null; then
            echo '::error::Nx did not return a valid JSON array of test projects.'
            exit 1
          fi

          jq -r '.[] | select(test("<%.*%>") | not)' "$projects_json" |
            sort -u > "$projects_file"

          if [[ ! -s "$projects_file" ]]; then
            echo '::error::No Nx projects expose a test target.'
            exit 1
          fi

          echo 'Projects with test targets:'
          cat "$projects_file"

          echo "file=$projects_file" >> "$GITHUB_OUTPUT"

      - name: Run Vitest coverage for every Nx test project
        id: vitest
        env:
          PROJECTS_FILE: ${{ steps.projects.outputs.file }}
        run: |
          set -euo pipefail

          nx_bin="$GITHUB_WORKSPACE/node_modules/.bin/nx"
          reports_root="$GITHUB_WORKSPACE/$COVERAGE_DIRECTORY"
          failures=0

          rm -rf "$reports_root"
          mkdir -p "$reports_root"

          while IFS= read -r project; do
            [[ -n "$project" ]] || continue

            project_file_name="$(printf '%s' "$project" | tr '/:@' '---')"
            reports_directory="$reports_root/$project_file_name"

            echo "::group::Vitest coverage — $project"

            if ! "$nx_bin" run "$project:test" \
              --skip-nx-cache \
              --output-style=stream \
              -- \
              --run \
              --coverage.enabled=true \
              --coverage.reportOnFailure=true \
              --coverage.reportsDirectory="$reports_directory" \
              --coverage.reporter=text-summary \
              --coverage.reporter=cobertura \
              </dev/null; then
              failures=1
              echo "::error::Vitest failed for project: $project"
            fi

            echo '::endgroup::'
          done < "$PROJECTS_FILE"

          if [[ "$failures" -eq 0 ]]; then
            echo 'tests_passed=true' >> "$GITHUB_OUTPUT"
          else
            echo 'tests_passed=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Combine Cobertura reports
        id: cobertura
        if: always()
        run: |
          set -euo pipefail

          node <<'NODE'
          import fs from 'node:fs';
          import path from 'node:path';

          const coverageDirectory = path.resolve(process.env.COVERAGE_DIRECTORY);
          const outputPath = path.resolve(process.env.COBERTURA_REPORT);

          function walk(directory) {
            const entries = fs.readdirSync(directory, {
              withFileTypes: true,
            });

            return entries.flatMap((entry) => {
              const entryPath = path.join(directory, entry.name);

              return entry.isDirectory() ? walk(entryPath) : [entryPath];
            });
          }

          function attributeNumber(xml, attribute) {
            const match = xml.match(
              new RegExp(`\\b${attribute}=["'](\\d+)["']`, 'i'),
            );

            return match ? Number(match[1]) : 0;
          }

          function extract(xml, expression, description) {
            const match = xml.match(expression);

            if (!match) {
              throw new Error(
                `Cobertura report is missing ${description}.`,
              );
            }

            return match[1];
          }

          if (!fs.existsSync(coverageDirectory)) {
            throw new Error(
              `Coverage directory was not generated: ${coverageDirectory}`,
            );
          }

          const reportFiles = walk(coverageDirectory)
            .filter(
              (filePath) =>
                path.basename(filePath) === 'cobertura-coverage.xml',
            )
            .sort();

          if (reportFiles.length === 0) {
            throw new Error('No Vitest Cobertura reports were found.');
          }

          const totals = {
            linesCovered: 0,
            linesValid: 0,
            branchesCovered: 0,
            branchesValid: 0,
          };

          const sources = new Set();
          const packages = [];

          for (const reportFile of reportFiles) {
            const xml = fs.readFileSync(reportFile, 'utf8');

            totals.linesCovered += attributeNumber(xml, 'lines-covered');
            totals.linesValid += attributeNumber(xml, 'lines-valid');
            totals.branchesCovered += attributeNumber(
              xml,
              'branches-covered',
            );
            totals.branchesValid += attributeNumber(
              xml,
              'branches-valid',
            );

            const sourcesContent = extract(
              xml,
              /<sources>([\s\S]*?)<\/sources>/i,
              '<sources>',
            );

            const packagesContent = extract(
              xml,
              /<packages>([\s\S]*?)<\/packages>/i,
              '<packages>',
            );

            for (
              const source of sourcesContent.matchAll(
                /<source>([\s\S]*?)<\/source>/gi,
              )
            ) {
              sources.add(source[1]);
            }

            packages.push(packagesContent.trim());
          }

          const lineRate =
            totals.linesValid === 0
              ? 1
              : totals.linesCovered / totals.linesValid;

          const branchRate =
            totals.branchesValid === 0
              ? 1
              : totals.branchesCovered / totals.branchesValid;

          const timestamp = Math.floor(Date.now() / 1000);

          const output = [
            '<?xml version="1.0" encoding="UTF-8"?>',
            '<!DOCTYPE coverage SYSTEM "http://cobertura.sourceforge.net/xml/coverage-04.dtd">',
            `<coverage line-rate="${lineRate}" branch-rate="${branchRate}" lines-covered="${totals.linesCovered}" lines-valid="${totals.linesValid}" branches-covered="${totals.branchesCovered}" branches-valid="${totals.branchesValid}" complexity="0" version="Aerealith Vitest" timestamp="${timestamp}">`,
            '  <sources>',
            ...[...sources]
              .sort()
              .map((source) => `    <source>${source}</source>`),
            '  </sources>',
            '  <packages>',
            ...packages.map((content) =>
              content
                .split('\n')
                .map((line) => `    ${line}`)
                .join('\n'),
            ),
            '  </packages>',
            '</coverage>',
            '',
          ].join('\n');

          fs.mkdirSync(path.dirname(outputPath), {
            recursive: true,
          });

          fs.writeFileSync(outputPath, output);

          console.log(
            `Combined ${reportFiles.length} Cobertura report(s).`,
          );
          console.log(
            `Lines: ${totals.linesCovered}/${totals.linesValid}`,
          );
          console.log(
            `Branches: ${totals.branchesCovered}/${totals.branchesValid}`,
          );
          NODE

          echo 'available=true' >> "$GITHUB_OUTPUT"
          echo "file=$COBERTURA_REPORT" >> "$GITHUB_OUTPUT"

          {
            echo '## Code Coverage'
            echo
            echo '| Setting | Value |'
            echo '| --- | --- |'
            echo '| Test framework | Vitest |'
            echo '| Report format | Cobertura XML |'
            echo "| Combined report | \`$COBERTURA_REPORT\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: code-coverage-${{ github.run_id }}
          path: ${{ env.COVERAGE_DIRECTORY }}
          if-no-files-found: warn
          retention-days: 30
          compression-level: 6

      - name: Fail when Vitest failed
        if: always() && steps.vitest.outputs.tests_passed != 'true'
        run: |
          echo '::error::One or more Vitest projects failed. Review the grouped Vitest output above.'
          exit 1

  upload-code-quality:
    name: Upload Code Quality Coverage
    needs: coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10

    if: >-
      always() &&
      !cancelled() &&
      needs.coverage.outputs.cobertura_available == 'true' &&
      (
        github.event_name != 'pull_request' ||
        github.event.pull_request.head.repo.full_name == github.repository
      )

    permissions:
      contents: read
      pull-requests: read
      code-quality: write

    steps:
      - name: Download combined coverage artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: code-coverage-${{ github.run_id }}
          path: ${{ env.COVERAGE_DIRECTORY }}

      - name: Upload coverage to GitHub Code Quality
        uses: actions/upload-code-coverage@b51da2c3c1b23e04d2d6477cfc34350b1f5cd3e9 # v1.2.0
        with:
          file: ${{ env.COBERTURA_REPORT }}
          language: TypeScript
          label: code-coverage/vitest
