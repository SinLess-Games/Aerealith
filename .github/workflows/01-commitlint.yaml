# .github/workflows/01-commitlint.yaml
#
# Validates Conventional Commit messages for pull requests and protected-branch
# pushes. It also blocks WIP-style commit messages from being merged.

name: 01 · Commitlint

on:
  pull_request:
    branches:
      - master
      - staging
      - production
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

  push:
    branches:
      - master
      - staging
      - production

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: commitlint-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  CI: true
  NODE_VERSION: 25.9.0
  PNPM_VERSION: 11.5.2

jobs:
  commitlint:
    name: Validate commit messages
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository history
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          fetch-tags: false
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace dependencies
        run: |
          set -euo pipefail

          pnpm install --frozen-lockfile --ignore-scripts

      - name: Determine commit range
        id: commits
        env:
          EVENT_NAME: ${{ github.event_name }}
          PULL_REQUEST_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PULL_REQUEST_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
          BASE_BRANCH: ${{ github.base_ref }}
          CURRENT_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          zero_sha='0000000000000000000000000000000000000000'
          initial_push='false'

          case "$EVENT_NAME" in
            pull_request)
              from="$PULL_REQUEST_BASE_SHA"
              to="$PULL_REQUEST_HEAD_SHA"
              branch="$BASE_BRANCH"
              ;;
            push)
              from="$PUSH_BEFORE_SHA"
              to="$CURRENT_SHA"
              branch="$CURRENT_BRANCH"
              ;;
            workflow_dispatch)
              to="$CURRENT_SHA"
              branch="$CURRENT_BRANCH"
              from="$(git rev-parse "${to}^" 2>/dev/null || printf '%s' "$to")"
              ;;
            *)
              echo "::error::Unsupported event: $EVENT_NAME"
              exit 1
              ;;
          esac

          if [[ -z "$to" ]]; then
            echo '::error::Unable to determine the target commit SHA.'
            exit 1
          fi

          git cat-file -e "${to}^{commit}"

          if [[ "$from" == "$zero_sha" || -z "$from" ]]; then
            initial_push='true'
            from="$(git rev-list --max-parents=0 "$to" | tail -n 1)"
          else
            git cat-file -e "${from}^{commit}"

            if ! git merge-base --is-ancestor "$from" "$to"; then
              from="$(git merge-base "$from" "$to")"
            fi
          fi

          if [[ -z "$from" ]]; then
            echo '::error::Unable to determine the starting commit SHA.'
            exit 1
          fi

          {
            echo "from=$from"
            echo "to=$to"
            echo "branch=$branch"
            echo "initial_push=$initial_push"
          } >> "$GITHUB_OUTPUT"

          printf 'Target branch: %s\n' "$branch"
          printf 'Commit range: %s..%s\n' "$from" "$to"

          if [[ "$initial_push" == 'true' ]]; then
            echo 'Initial push detected; validating every reachable commit.'
            git log --oneline --reverse "$to"
          else
            git log --oneline "$from..$to"
          fi

      - name: Validate commit messages
        id: validate
        env:
          FROM: ${{ steps.commits.outputs.from }}
          TO: ${{ steps.commits.outputs.to }}
          INITIAL_PUSH: ${{ steps.commits.outputs.initial_push }}
        run: |
          set -euo pipefail

          if [[ "$INITIAL_PUSH" == 'true' ]]; then
            while IFS= read -r sha; do
              printf 'Validating commit: %s\n' "$sha"
              git show -s --format=%B "$sha" |
                pnpm exec commitlint --verbose
            done < <(git rev-list --reverse "$TO")
          else
            pnpm exec commitlint \
              --from "$FROM" \
              --to "$TO" \
              --verbose
          fi

      - name: Reject WIP commits on protected branches
        id: reject_wip
        env:
          FROM: ${{ steps.commits.outputs.from }}
          TO: ${{ steps.commits.outputs.to }}
          BRANCH: ${{ steps.commits.outputs.branch }}
          INITIAL_PUSH: ${{ steps.commits.outputs.initial_push }}
        run: |
          set -euo pipefail

          wip_pattern='^(wip|work[- ]?in[- ]?progress)(\([^)]*\))?!?:|\[(wip|work[- ]?in[- ]?progress)\]'

          if [[ "$INITIAL_PUSH" == 'true' ]]; then
            offending_commits="$(
              git log --format='%h %s' "$TO" |
                grep -Eia "$wip_pattern" ||
                true
            )"
          else
            offending_commits="$(
              git log --format='%h %s' "$FROM..$TO" |
                grep -Eia "$wip_pattern" ||
                true
            )"
          fi

          if [[ -n "$offending_commits" ]]; then
            {
              printf '%s\n' \
                "::error::WIP commits are not allowed in changes targeting protected branch '$BRANCH'."
              printf '%s\n' "$offending_commits"
            } >&2

            exit 1
          fi

          echo 'No WIP commit messages were found.'

      - name: Write workflow summary
        if: always()
        env:
          FROM: ${{ steps.commits.outputs.from }}
          TO: ${{ steps.commits.outputs.to }}
          BRANCH: ${{ steps.commits.outputs.branch }}
          INITIAL_PUSH: ${{ steps.commits.outputs.initial_push }}
          VALIDATION_RESULT: ${{ steps.validate.outcome }}
          WIP_RESULT: ${{ steps.reject_wip.outcome }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail

          {
            echo '## Commitlint Validation'
            echo
            echo '| Check | Result |'
            echo '| --- | --- |'
            echo "| Commit range | \`${FROM:-unavailable}..${TO:-unavailable}\` |"
            echo "| Target branch | \`${BRANCH:-unavailable}\` |"
            echo "| Initial push | \`${INITIAL_PUSH:-false}\` |"
            echo "| Commit message validation | \`${VALIDATION_RESULT:-unknown}\` |"
            echo "| WIP commit check | \`${WIP_RESULT:-unknown}\` |"
            echo "| Workflow result | \`${JOB_STATUS:-unknown}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
