# .github/workflows/06-dependency-review.yaml
#
# Reviews dependency changes introduced by pull requests.
#
# The workflow:
# - Fails when a new dependency introduces a High or Critical vulnerability.
# - Reviews both runtime and development dependency scopes.
# - Uses GitHub's dependency review API rather than running repository code.
# - Posts the dependency review summary on the pull request.
#
# To make this a merge requirement:
# Repository Settings -> Rules -> Branch ruleset / Branch protection
# -> Require status checks -> require "Dependency Review".

name: 06 · Dependency Review

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: dependency-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out pull request
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Review dependency changes
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          # Fail on new High or Critical dependency vulnerabilities.
          fail-on-severity: high

          # Review vulnerabilities introduced in both shipped code and
          # development tooling such as Vite, Vitest, Nx, ESLint, and Playwright.
          fail-on-scopes: runtime,development,unknown

          # Keep both vulnerability and license checks enabled explicitly.
          vulnerability-check: true
          license-check: true

          # Create or update the dependency review comment on the pull request.
          comment-summary-in-pr: always
