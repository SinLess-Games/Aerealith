# .github/workflows/11-sonar.yaml
#
# SonarQube Cloud analysis for the Aerealith Nx monorepo.
#
# Required GitHub configuration:
#
# Repository secret:
# - SONAR_TOKEN
#
# Repository variables:
# - SONAR_PROJECT_KEY
# - SONAR_ORGANIZATION
#
# This workflow:
# - Runs Vitest coverage for every Nx project with a test target.
# - Sends every LCOV report to SonarQube Cloud.
# - Excludes test, spec, E2E, integration, fixture, mock, story, generated,
#   declaration, dependency, and build-output files from source analysis.
# - Uploads analysis without failing immediately on a red quality gate.
# - Polls SonarQube Cloud after upload completes.
# - Writes exact failed gate conditions, actual metric values, thresholds,
#   duplication hotspots, Compute Engine errors, and open Sonar issues into
#   the GitHub summary.
# - Fails only after the diagnostic summary and artifact are published.

name: 11 · SonarQube Cloud

on:
  pull_request:
    branches:
      - master
      - staging
      - production
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

  push:
    branches:
      - master
      - staging
      - production

  schedule:
    - cron: "0 6 * * 0"

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: >-
    sonar-${{
      github.event.pull_request.number ||
      github.ref ||
      github.run_id
    }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  CI: "true"
  FORCE_COLOR: "1"
  HUSKY: "0"

  NODE_VERSION: "25.9.0"
  PNPM_VERSION: "11.5.2"

  SONAR_API_URL: "https://sonarcloud.io"
  SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
  SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}

  SONAR_REPORT_DIRECTORY: "sonar-reports"
  SONAR_ANALYSIS_TIMEOUT_SECONDS: "300"
  SONAR_ANALYSIS_POLL_SECONDS: "5"
  SONAR_SUMMARY_MAX_ISSUES: "50"
  SONAR_DUPLICATION_SUMMARY_MAX_FILES: "50"

jobs:
  preflight:
    name: Validate SonarQube Cloud configuration
    runs-on: ubuntu-latest
    timeout-minutes: 10

    outputs:
      scan_enabled: ${{ steps.detect.outputs.scan_enabled }}
      skip_reason: ${{ steps.detect.outputs.skip_reason }}

    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Validate SonarQube Cloud configuration
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          PULL_REQUEST_HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
          CURRENT_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          scan_enabled='false'
          skip_reason=''
          is_internal_pull_request='true'

          if [[ "$EVENT_NAME" == 'pull_request' ]] &&
            [[ "$PULL_REQUEST_HEAD_REPOSITORY" != "$CURRENT_REPOSITORY" ]]; then
            is_internal_pull_request='false'
          fi

          if [[ -z "${SONAR_TOKEN:-}" ]]; then
            skip_reason='SONAR_TOKEN is not configured.'
          elif [[ "$is_internal_pull_request" != 'true' ]]; then
            skip_reason='External fork pull requests do not receive repository secrets.'
          elif [[ -z "${SONAR_PROJECT_KEY:-}" ]]; then
            skip_reason='SONAR_PROJECT_KEY repository variable is not configured.'
          elif [[ -z "${SONAR_ORGANIZATION:-}" ]]; then
            skip_reason='SONAR_ORGANIZATION repository variable is not configured.'
          else
            scan_enabled='true'
            skip_reason='Ready to scan with SonarQube Cloud.'
          fi

          {
            echo "scan_enabled=$scan_enabled"
            echo "skip_reason=$skip_reason"
          } >> "$GITHUB_OUTPUT"

          {
            echo '## SonarQube Cloud Preflight'
            echo
            echo '| Setting | Value |'
            echo '| --- | --- |'
            echo '| Platform | SonarQube Cloud |'
            echo "| SONAR_TOKEN available | $([[ -n "${SONAR_TOKEN:-}" ]] && echo true || echo false) |"
            echo "| SONAR_PROJECT_KEY available | $([[ -n "${SONAR_PROJECT_KEY:-}" ]] && echo true || echo false) |"
            echo "| SONAR_ORGANIZATION available | $([[ -n "${SONAR_ORGANIZATION:-}" ]] && echo true || echo false) |"
            echo "| Internal pull request | $is_internal_pull_request |"
            echo "| Scan enabled | $scan_enabled |"
            echo "| Status | $skip_reason |"
          } >> "$GITHUB_STEP_SUMMARY"

  analyze:
    name: Test, cover, analyze, and diagnose
    needs: preflight
    if: needs.preflight.outputs.scan_enabled == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 50

    outputs:
      coverage_status: ${{ steps.coverage.outputs.coverage_status }}
      test_project_count: ${{ steps.coverage.outputs.test_project_count }}
      lcov_count: ${{ steps.coverage.outputs.lcov_count }}
      scanner_outcome: ${{ steps.sonar_scan.outcome }}
      analysis_task_status: ${{ steps.sonar_diagnosis.outputs.analysis_task_status }}
      quality_gate_status: ${{ steps.sonar_diagnosis.outputs.quality_gate_status }}
      failed_condition_count: ${{ steps.sonar_diagnosis.outputs.failed_condition_count }}
      duplication_hotspot_count: ${{ steps.sonar_diagnosis.outputs.duplication_hotspot_count }}
      issue_count: ${{ steps.sonar_diagnosis.outputs.issue_count }}
      diagnosis_status: ${{ steps.sonar_diagnosis.outputs.diagnosis_status }}
      dashboard_url: ${{ steps.sonar_diagnosis.outputs.dashboard_url }}

    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Verify workspace requirements
        run: |
          set -euo pipefail

          required_files=(
            package.json
            pnpm-lock.yaml
            pnpm-workspace.yaml
          )

          for required_file in "${required_files[@]}"; do
            if [[ ! -f "$required_file" ]]; then
              echo "::error::Required workspace file was not found: $required_file"
              exit 1
            fi
          done

          printf 'Node.js: %s\n' "$(node --version)"
          printf 'pnpm: %s\n' "$(pnpm --version)"

      - name: Install workspace dependencies
        run: |
          set -euo pipefail

          pnpm install --frozen-lockfile --ignore-scripts

      - name: Run Vitest coverage for every Nx test project
        id: coverage
        run: |
          set -euo pipefail

          nx_bin="$GITHUB_WORKSPACE/node_modules/.bin/nx"
          vitest_bin="$GITHUB_WORKSPACE/node_modules/.bin/vitest"
          projects_file="$RUNNER_TEMP/sonar-test-projects.txt"
          projects_json="$RUNNER_TEMP/sonar-test-projects.json"

          if [[ ! -x "$nx_bin" ]] || [[ ! -x "$vitest_bin" ]]; then
            echo "::error::Required test binaries were not found. Nx: $nx_bin; Vitest: $vitest_bin"
            exit 1
          fi

          # FORCE_COLOR is enabled globally for readable task logs, but ANSI
          # sequences make Nx's JSON output invalid. Disable color only for
          # this machine-readable command and request JSON explicitly.
          FORCE_COLOR=0 "$nx_bin" show projects --withTarget=test --json \
            > "$projects_json"

          if ! jq -e \
            'type == "array" and all(.[]; type == "string")' \
            "$projects_json" >/dev/null; then
            echo '::error::Nx did not return a valid JSON array of test projects.'
            exit 1
          fi

          # Generator templates contain placeholder project.json files that
          # Nx discovers as literal projects (for example,
          # "<%= projectName %>"). They are source templates, not runnable
          # workspace projects, so exclude them from the coverage matrix.
          jq -r '.[] | select(test("<%.*%>") | not)' "$projects_json" |
            sort -u > "$projects_file"

          test_project_count="$(wc -l < "$projects_file" | tr -d ' ')"
          coverage_status='not-run'

          {
            echo '## Sonar Coverage Generation'
            echo
            echo '| Setting | Value |'
            echo '| --- | --- |'
            echo "| Nx test projects discovered | $test_project_count |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "$test_project_count" -eq 0 ]]; then
            {
              echo 'coverage_status=not-run'
              echo 'test_project_count=0'
              echo 'lcov_count=0'
              echo 'lcov_reports='
            } >> "$GITHUB_OUTPUT"

            echo '> No Nx projects expose a test target. Sonar analysis will continue without LCOV coverage.' >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          coverage_status='passed'

          while IFS= read -r project; do
            [[ -n "$project" ]] || continue

            project_configuration="$(
              FORCE_COLOR=0 "$nx_bin" show project "$project" --json
            )"
            project_root="$(
              jq -er '.root | strings | select(length > 0)' \
                <<< "$project_configuration"
            )"
            test_executor="$(
              jq -r '.targets.test.executor // ""' \
                <<< "$project_configuration"
            )"
            coverage_directory="$GITHUB_WORKSPACE/coverage/$project_root"
            expected_lcov="$coverage_directory/lcov.info"

            echo "::group::Vitest coverage: $project"

            if [[ "$test_executor" == '@nx/vitest:test' ]]; then
              # Nx's deprecated explicit Vitest executor drops coverage output
              # path overrides. Invoke Vitest directly for these projects so
              # the report is guaranteed to remain inside the workspace.
              "$vitest_bin" run \
                --config "$GITHUB_WORKSPACE/$project_root/vitest.config.mts" \
                --coverage.enabled=true \
                --coverage.reportsDirectory="$coverage_directory" \
                --coverage.reporter=lcov \
                --coverage.reporter=json-summary \
                </dev/null
            else
              "$nx_bin" run "$project:test" \
                --skip-nx-cache \
                --output-style=stream \
                -- \
                --coverage.enabled=true \
                --coverage.reportsDirectory="$coverage_directory" \
                --coverage.reporter=lcov \
                --coverage.reporter=json-summary \
                </dev/null
            fi

            if [[ ! -s "$expected_lcov" ]]; then
              echo "::error::Coverage for $project was not written to $expected_lcov."
              exit 1
            fi

            echo "::endgroup::"
          done < "$projects_file"

          mapfile -t lcov_files < <(
            find coverage \
              -type f \
              -name lcov.info \
              -print \
              2>/dev/null |
              sort
          )

          lcov_count="${#lcov_files[@]}"
          lcov_reports=''

          if [[ "$lcov_count" -gt 0 ]]; then
            lcov_reports="$(IFS=,; echo "${lcov_files[*]}")"
          fi

          {
            echo "coverage_status=$coverage_status"
            echo "test_project_count=$test_project_count"
            echo "lcov_count=$lcov_count"
            echo "lcov_reports=$lcov_reports"
          } >> "$GITHUB_OUTPUT"

          {
            echo "| Coverage execution status | $coverage_status |"
            echo "| LCOV reports found | $lcov_count |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Prepare Sonar report directory
        run: |
          set -euo pipefail

          mkdir -p "$SONAR_REPORT_DIRECTORY"

      - name: Create temporary SonarQube Cloud configuration
        id: sonar_config
        env:
          LCOV_REPORTS: ${{ steps.coverage.outputs.lcov_reports }}
        run: |
          set -euo pipefail

          config_path="$GITHUB_WORKSPACE/sonar-project.properties"
          backup_path="$RUNNER_TEMP/sonar-project.properties.backup"
          config_existed='false'

          if [[ -f "$config_path" ]]; then
            cp "$config_path" "$backup_path"
            config_existed='true'
          fi

          {
            echo "sonar.projectKey=$SONAR_PROJECT_KEY"
            echo "sonar.organization=$SONAR_ORGANIZATION"
            echo 'sonar.sourceEncoding=UTF-8'

            echo 'sonar.sources=apps,libs,tools'

            # Restrict program discovery to real workspace projects. Template
            # tsconfigs become valid only after the generator renders them.
            echo 'sonar.typescript.tsconfigPaths=apps/frontend/tsconfig.app.json,libs/core/tsconfig.lib.json,libs/db/tsconfig.lib.json,libs/ui/tsconfig.lib.json,libs/utils/tsconfig.lib.json,tools/generators/service/tsconfig.lib.json'

            echo 'sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/.nx/**,**/.vite/**,**/out-tsc/**,**/storybook-static/**,**/public/**,**/templates/**,**/*.d.ts,**/*.test.*,**/*.spec.*,**/*.e2e.*,**/*.integration.*,**/*.stories.*,**/test/**,**/tests/**,**/spec/**,**/specs/**,**/e2e/**,**/e2e-tests/**,**/integration/**,**/integration-tests/**,**/__tests__/**,**/__mocks__/**,**/__fixtures__/**'

            echo 'sonar.coverage.exclusions=**/*.test.*,**/*.spec.*,**/*.e2e.*,**/*.integration.*,**/*.stories.*,**/test/**,**/tests/**,**/spec/**,**/specs/**,**/e2e/**,**/e2e-tests/**,**/integration/**,**/integration-tests/**,**/__tests__/**,**/__mocks__/**,**/__fixtures__/**,**/*.d.ts'

            if [[ -n "${LCOV_REPORTS:-}" ]]; then
              echo "sonar.javascript.lcov.reportPaths=$LCOV_REPORTS"
            fi

            # The workflow polls SonarQube Cloud after upload and prints exact
            # failed conditions before it decides whether to fail the workflow.
            echo 'sonar.qualitygate.wait=false'
          } > "$config_path"

          {
            echo "config_path=$config_path"
            echo "backup_path=$backup_path"
            echo "config_existed=$config_existed"
          } >> "$GITHUB_OUTPUT"

          {
            echo '## Sonar Scanner Configuration'
            echo
            echo '| Setting | Value |'
            echo '| --- | --- |'
            echo '| Platform | SonarQube Cloud |'
            echo '| Source roots | apps, libs, tools |'
            echo '| Test and E2E source excluded | true |'
            echo "| LCOV reports configured | $([[ -n "${LCOV_REPORTS:-}" ]] && echo true || echo false) |"
            echo '| Scanner quality-gate wait | false |'
            echo '| Detailed quality-gate diagnosis | enabled |'
            echo '| Duplication hotspot reporting | enabled |'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run SonarQube Cloud analysis
        id: sonar_scan
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      - name: Fetch exact SonarQube Cloud diagnosis
        id: sonar_diagnosis
        if: always()
        env:
          SCANNER_OUTCOME: ${{ steps.sonar_scan.outcome }}
          EVENT_NAME: ${{ github.event_name }}
          PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          report_task_path="$GITHUB_WORKSPACE/.scannerwork/report-task.txt"
          task_file="$SONAR_REPORT_DIRECTORY/compute-engine-task.json"
          gate_file="$SONAR_REPORT_DIRECTORY/quality-gate.json"
          issues_file="$SONAR_REPORT_DIRECTORY/issues.json"
          duplication_file="$SONAR_REPORT_DIRECTORY/duplication-hotspots.json"
          errors_file="$SONAR_REPORT_DIRECTORY/diagnostic-errors.txt"

          mkdir -p "$SONAR_REPORT_DIRECTORY"

          printf '{}\n' > "$task_file"
          printf '{}\n' > "$gate_file"
          printf '{}\n' > "$issues_file"
          printf '{"components":[]}\n' > "$duplication_file"
          : > "$errors_file"

          sonar_curl() {
            curl \
              --fail-with-body \
              --silent \
              --show-error \
              --retry 2 \
              --retry-delay 2 \
              --header "Authorization: Bearer $SONAR_TOKEN" \
              "$@"
          }

          report_task_found='false'
          ce_task_url=''
          dashboard_url=''
          analysis_id=''
          analysis_task_status='not-available'
          quality_gate_status='not-available'

          if [[ -s "$report_task_path" ]]; then
            report_task_found='true'
            cp "$report_task_path" "$SONAR_REPORT_DIRECTORY/report-task.txt"

            ce_task_url="$(
              awk -F= '
                $1 == "ceTaskUrl" {
                  sub(/^[^=]*=/, "");
                  print;
                  exit;
                }
              ' "$report_task_path"
            )"

            dashboard_url="$(
              awk -F= '
                $1 == "dashboardUrl" {
                  sub(/^[^=]*=/, "");
                  print;
                  exit;
                }
              ' "$report_task_path"
            )"
          else
            {
              echo 'Sonar scanner did not create .scannerwork/report-task.txt.'
              echo "Scanner action outcome: ${SCANNER_OUTCOME:-unknown}"
              echo 'The scanner likely failed before SonarQube Cloud accepted the analysis.'
            } >> "$errors_file"
          fi

          if [[ -n "$ce_task_url" ]]; then
            max_attempts=$((SONAR_ANALYSIS_TIMEOUT_SECONDS / SONAR_ANALYSIS_POLL_SECONDS))

            if [[ "$max_attempts" -lt 1 ]]; then
              max_attempts=1
            fi

            for ((attempt = 1; attempt <= max_attempts; attempt++)); do
              if sonar_curl \
                --output "$task_file" \
                "$ce_task_url" \
                2>>"$errors_file"; then
                analysis_task_status="$(
                  jq -r '.task.status // "unknown"' "$task_file"
                )"

                analysis_id="$(
                  jq -r '.task.analysisId // empty' "$task_file"
                )"

                case "$analysis_task_status" in
                  SUCCESS | FAILED | CANCELED)
                    break
                    ;;
                  *)
                    sleep "$SONAR_ANALYSIS_POLL_SECONDS"
                    ;;
                esac
              else
                sleep "$SONAR_ANALYSIS_POLL_SECONDS"
              fi
            done
          fi

          if [[ "$analysis_task_status" == 'SUCCESS' ]] &&
            [[ -n "$analysis_id" ]]; then
            if sonar_curl \
              --get \
              "$SONAR_API_URL/api/qualitygates/project_status" \
              --data-urlencode "analysisId=$analysis_id" \
              --output "$gate_file" \
              2>>"$errors_file"; then
              quality_gate_status="$(
                jq -r '.projectStatus.status // "unknown"' "$gate_file"
              )"
            else
              echo 'Unable to retrieve SonarQube Cloud quality-gate data.' >> "$errors_file"
            fi
          elif [[ "$analysis_task_status" == 'FAILED' ]]; then
            echo 'SonarQube Cloud rejected the uploaded analysis during Compute Engine processing.' >> "$errors_file"
          elif [[ "$analysis_task_status" == 'CANCELED' ]]; then
            echo 'SonarQube Cloud canceled the uploaded analysis during Compute Engine processing.' >> "$errors_file"
          elif [[ "$report_task_found" == 'true' ]]; then
            echo 'Timed out while waiting for SonarQube Cloud to process the analysis.' >> "$errors_file"
          fi

          duplication_arguments=(
            --get
            "$SONAR_API_URL/api/measures/component_tree"
            --data-urlencode "component=$SONAR_PROJECT_KEY"
            --data-urlencode 'metricKeys=new_duplicated_lines,new_duplicated_lines_density'
            --data-urlencode 'qualifiers=FIL'
            --data-urlencode 'strategy=leaves'
            --data-urlencode 'ps=500'
          )

          if [[ "$EVENT_NAME" == 'pull_request' ]] &&
            [[ -n "${PULL_REQUEST_NUMBER:-}" ]]; then
            duplication_arguments+=(
              --data-urlencode
              "pullRequest=$PULL_REQUEST_NUMBER"
            )
          elif [[ -n "${BRANCH_NAME:-}" ]]; then
            duplication_arguments+=(
              --data-urlencode
              "branch=$BRANCH_NAME"
            )
          fi

          if [[ "$analysis_task_status" == 'SUCCESS' ]]; then
            sonar_curl \
              "${duplication_arguments[@]}" \
              --output "$duplication_file" \
              2>>"$errors_file" \
              || echo 'Unable to retrieve SonarQube Cloud duplication hotspot details.' >> "$errors_file"
          fi

          issue_arguments=(
            --get
            "$SONAR_API_URL/api/issues/search"
            --data-urlencode "componentKeys=$SONAR_PROJECT_KEY"
            --data-urlencode 'resolved=false'
            --data-urlencode 'ps=100'
          )

          if [[ "$EVENT_NAME" == 'pull_request' ]] &&
            [[ -n "${PULL_REQUEST_NUMBER:-}" ]]; then
            issue_arguments+=(
              --data-urlencode
              "pullRequest=$PULL_REQUEST_NUMBER"
            )
          elif [[ -n "${BRANCH_NAME:-}" ]]; then
            issue_arguments+=(
              --data-urlencode
              "branch=$BRANCH_NAME"
            )
          fi

          if [[ "$analysis_task_status" == 'SUCCESS' ]]; then
            sonar_curl \
              "${issue_arguments[@]}" \
              --output "$issues_file" \
              2>>"$errors_file" \
              || echo 'Unable to retrieve SonarQube Cloud issue details.' >> "$errors_file"
          fi

          failed_condition_count="$(
            jq '[.projectStatus.conditions[]? | select(.status != "OK" and .status != "NO_VALUE")] | length' \
              "$gate_file"
          )"

          duplication_hotspot_count="$(
            jq '
              [
                .components[]?
                | {
                    path: (.path // .name // "unknown"),
                    duplicated_lines: (
                      [
                        .measures[]?
                        | select(.metric == "new_duplicated_lines")
                        | .value
                      ][0] // "0"
                    ),
                    density: (
                      [
                        .measures[]?
                        | select(.metric == "new_duplicated_lines_density")
                        | .value
                      ][0] // "0"
                    )
                  }
                | select(((.density | tonumber?) // 0) > 0)
              ]
              | length
            ' "$duplication_file"
          )"

          issue_count="$(
            jq -r '.total // 0' "$issues_file"
          )"

          if [[ "$analysis_task_status" == 'FAILED' ]]; then
            diagnosis_status='analysis-task-failed'
          elif [[ "$analysis_task_status" == 'CANCELED' ]]; then
            diagnosis_status='analysis-task-canceled'
          elif [[ "$quality_gate_status" == 'ERROR' ]]; then
            diagnosis_status='quality-gate-failed'
          elif [[ "$quality_gate_status" == 'OK' ]]; then
            diagnosis_status='quality-gate-passed'
          elif [[ "$SCANNER_OUTCOME" == 'failure' ]]; then
            diagnosis_status='scanner-failed'
          else
            diagnosis_status='diagnosis-incomplete'
          fi

          {
            echo '## SonarQube Cloud Exact Diagnosis'
            echo
            echo '| Check | Result |'
            echo '| --- | --- |'
            echo "| Scanner action outcome | ${SCANNER_OUTCOME:-unknown} |"
            echo "| Compute Engine task status | $analysis_task_status |"
            echo "| Quality gate status | $quality_gate_status |"
            echo "| Failed quality-gate conditions | $failed_condition_count |"
            echo "| New-code duplication hotspots | $duplication_hotspot_count |"
            echo "| Open Sonar issues | $issue_count |"
            echo "| Diagnostic state | $diagnosis_status |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "$dashboard_url" == https://* ]]; then
            {
              echo
              echo "[Open the SonarQube Cloud dashboard]($dashboard_url)"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          if [[ "$analysis_task_status" == 'FAILED' ]]; then
            task_error="$(
              jq -r '.task.errorMessage // "No Compute Engine error message was returned."' \
                "$task_file"
            )"

            {
              echo
              echo '### Analysis Processing Failure'
              echo
              printf '%s\n' "$task_error"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          if [[ "$failed_condition_count" -gt 0 ]]; then
            {
              echo
              echo '### Failed Quality-Gate Conditions'
              echo
              echo '| Metric | Actual value | Required condition | Status |'
              echo '| --- | --- | --- | --- |'
            } >> "$GITHUB_STEP_SUMMARY"

            jq -r '
              def clean:
                tostring
                | gsub("[\r\n]+"; " ")
                | gsub("[|]"; "&#124;");

              .projectStatus.conditions[]?
              | select(.status != "OK" and .status != "NO_VALUE")
              | .metricKey as $metric
              | (
                  if .comparator == "GT" then
                    "must be less than or equal to"
                  elif .comparator == "LT" then
                    "must be greater than or equal to"
                  elif .comparator == "EQ" then
                    "must not equal"
                  elif .comparator == "NE" then
                    "must equal"
                  elif .comparator == "LE" then
                    "must be greater than"
                  elif .comparator == "GE" then
                    "must be less than"
                  else
                    (.comparator // "unknown comparator")
                  end
                ) as $requirement
              | "| \($metric | clean) | \((.actualValue // "not measured") | clean) | \($requirement | clean) \((.errorThreshold // "not configured") | clean) | \((.status // "unknown") | clean) |"
            ' "$gate_file" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [[ "$duplication_hotspot_count" -gt 0 ]]; then
            {
              echo
              echo '### New-Code Duplication Hotspots'
              echo
              echo '| File | Duplicated lines | New-code duplication density |'
              echo '| --- | ---: | ---: |'
            } >> "$GITHUB_STEP_SUMMARY"

            jq -r \
              --argjson maximum "$SONAR_DUPLICATION_SUMMARY_MAX_FILES" '
                def clean:
                  tostring
                  | gsub("[\r\n]+"; " ")
                  | gsub("[|]"; "&#124;");

                def measure_value($metric):
                  [
                    .measures[]?
                    | select(.metric == $metric)
                    | .value
                  ][0] // "0";

                [
                  .components[]?
                  | {
                      path: (.path // .name // "unknown"),
                      duplicated_lines: measure_value("new_duplicated_lines"),
                      density: measure_value("new_duplicated_lines_density")
                    }
                  | select(((.density | tonumber?) // 0) > 0)
                ]
                | sort_by(.density | tonumber)
                | reverse
                | .[0:$maximum][]
                | "| \(.path | clean) | \(.duplicated_lines | clean) | \(.density | clean)% |"
              ' "$duplication_file" >> "$GITHUB_STEP_SUMMARY"

            if [[ "$duplication_hotspot_count" -gt "$SONAR_DUPLICATION_SUMMARY_MAX_FILES" ]]; then
              {
                echo
                echo "> Sonar found $duplication_hotspot_count files with new-code duplication. This summary displays the first $SONAR_DUPLICATION_SUMMARY_MAX_FILES."
              } >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

          if [[ "$issue_count" -gt 0 ]]; then
            {
              echo
              echo '### Open Sonar Issue Totals'
              echo
              echo '| Category | Count |'
              echo '| --- | --- |'

              jq -r '
                .issues
                | group_by(.severity)
                | .[]
                | "| Severity: \(.[0].severity // "UNKNOWN") | \(length) |"
              ' "$issues_file"

              jq -r '
                .issues
                | group_by(.type)
                | .[]
                | "| Type: \(.[0].type // "UNKNOWN") | \(length) |"
              ' "$issues_file"

              echo
              echo '### Open Sonar Issues'
              echo
              echo '| Type | Severity | Rule | Location | Message |'
              echo '| --- | --- | --- | --- | --- |'

              jq -r \
                --argjson maximum "$SONAR_SUMMARY_MAX_ISSUES" '
                  def clean:
                    tostring
                    | gsub("[\r\n]+"; " ")
                    | gsub("[|]"; "&#124;");

                  .issues[0:$maximum][]
                  | (.component // "unknown") as $component
                  | (
                      if .line then
                        "\($component):\(.line)"
                      else
                        $component
                      end
                    ) as $location
                  | "| \((.type // "unknown") | clean) | \((.severity // "unknown") | clean) | \((.rule // "unknown") | clean) | \($location | clean) | \((.message // "unknown") | clean) |"
                ' "$issues_file"

              if [[ "$issue_count" -gt "$SONAR_SUMMARY_MAX_ISSUES" ]]; then
                echo
                echo "> Sonar reported $issue_count open issues. This summary displays the first $SONAR_SUMMARY_MAX_ISSUES."
              fi
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          if [[ -s "$errors_file" ]]; then
            {
              echo
              echo '### Diagnostic Retrieval Notes'
              echo
              echo '```text'
              sed -n '1,120p' "$errors_file"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          {
            echo

            case "$diagnosis_status" in
              quality-gate-passed)
                echo '> SonarQube Cloud analysis completed and the quality gate passed.'
                ;;
              quality-gate-failed)
                echo '> The quality gate failed. The exact failed conditions and duplication hotspots are listed above.'
                ;;
              *)
                echo '> SonarQube Cloud did not complete a clean quality-gate evaluation. Review the processing failure or diagnostic notes above.'
                ;;
            esac
          } >> "$GITHUB_STEP_SUMMARY"

          {
            echo "analysis_task_status=$analysis_task_status"
            echo "quality_gate_status=$quality_gate_status"
            echo "failed_condition_count=$failed_condition_count"
            echo "duplication_hotspot_count=$duplication_hotspot_count"
            echo "issue_count=$issue_count"
            echo "diagnosis_status=$diagnosis_status"
            echo "dashboard_url=$dashboard_url"
          } >> "$GITHUB_OUTPUT"

      - name: Restore repository Sonar configuration
        if: always()
        env:
          CONFIG_PATH: ${{ steps.sonar_config.outputs.config_path }}
          BACKUP_PATH: ${{ steps.sonar_config.outputs.backup_path }}
          CONFIG_EXISTED: ${{ steps.sonar_config.outputs.config_existed }}
        run: |
          set -euo pipefail

          if [[ "$CONFIG_EXISTED" == 'true' ]]; then
            cp "$BACKUP_PATH" "$CONFIG_PATH"
          else
            rm -f "$CONFIG_PATH"
          fi

      - name: Upload Sonar diagnostics and coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sonar-diagnostics-${{ github.run_id }}
          path: |
            sonar-reports/**
            coverage/**/lcov.info
            coverage/**/coverage-summary.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Fail after publishing exact Sonar diagnosis
        if: always()
        env:
          SCANNER_OUTCOME: ${{ steps.sonar_scan.outcome }}
          ANALYSIS_TASK_STATUS: ${{ steps.sonar_diagnosis.outputs.analysis_task_status }}
          QUALITY_GATE_STATUS: ${{ steps.sonar_diagnosis.outputs.quality_gate_status }}
          FAILED_CONDITION_COUNT: ${{ steps.sonar_diagnosis.outputs.failed_condition_count }}
          DUPLICATION_HOTSPOT_COUNT: ${{ steps.sonar_diagnosis.outputs.duplication_hotspot_count }}
          DIAGNOSIS_STATUS: ${{ steps.sonar_diagnosis.outputs.diagnosis_status }}
        run: |
          set -euo pipefail

          if [[ "$SCANNER_OUTCOME" == 'skipped' ]]; then
            echo '::error::The Sonar scanner was skipped because an earlier setup, test, coverage, or configuration step failed. Review the first failed step in this job.'
            exit 1
          fi

          if [[ "$SCANNER_OUTCOME" == 'failure' ]]; then
            echo '::error::The Sonar scanner failed. Review the SonarQube Cloud Exact Diagnosis summary.'
            exit 1
          fi

          if [[ "$ANALYSIS_TASK_STATUS" == 'FAILED' ]] ||
            [[ "$ANALYSIS_TASK_STATUS" == 'CANCELED' ]]; then
            echo '::error::SonarQube Cloud rejected or canceled the analysis task. Review the diagnostic summary.'
            exit 1
          fi

          if [[ "$QUALITY_GATE_STATUS" != 'OK' ]]; then
            echo "::error::SonarQube Cloud quality gate failed or could not be verified. Failed conditions: ${FAILED_CONDITION_COUNT:-unknown}. Duplication hotspots: ${DUPLICATION_HOTSPOT_COUNT:-unknown}. Diagnostic state: ${DIAGNOSIS_STATUS:-unknown}."
            exit 1
          fi

          echo 'SonarQube Cloud scanner, analysis task, and quality gate all passed.'

  summary:
    name: Publish SonarQube Cloud result
    needs:
      - preflight
      - analyze
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Write workflow summary
        env:
          SCAN_ENABLED: ${{ needs.preflight.outputs.scan_enabled }}
          PREFLIGHT_STATUS: ${{ needs.preflight.outputs.skip_reason }}
          COVERAGE_STATUS: ${{ needs.analyze.outputs.coverage_status }}
          TEST_PROJECT_COUNT: ${{ needs.analyze.outputs.test_project_count }}
          LCOV_COUNT: ${{ needs.analyze.outputs.lcov_count }}
          SCANNER_OUTCOME: ${{ needs.analyze.outputs.scanner_outcome }}
          ANALYSIS_TASK_STATUS: ${{ needs.analyze.outputs.analysis_task_status }}
          QUALITY_GATE_STATUS: ${{ needs.analyze.outputs.quality_gate_status }}
          FAILED_CONDITION_COUNT: ${{ needs.analyze.outputs.failed_condition_count }}
          DUPLICATION_HOTSPOT_COUNT: ${{ needs.analyze.outputs.duplication_hotspot_count }}
          ISSUE_COUNT: ${{ needs.analyze.outputs.issue_count }}
          DIAGNOSIS_STATUS: ${{ needs.analyze.outputs.diagnosis_status }}
          DASHBOARD_URL: ${{ needs.analyze.outputs.dashboard_url }}
          ANALYZE_RESULT: ${{ needs.analyze.result }}
        run: |
          set -euo pipefail

          {
            echo '## SonarQube Cloud Workflow Result'
            echo
            echo '| Check | Result |'
            echo '| --- | --- |'
            echo "| Scan enabled | ${SCAN_ENABLED:-false} |"
            echo "| Vitest coverage status | ${COVERAGE_STATUS:-not-run} |"
            echo "| Nx test projects | ${TEST_PROJECT_COUNT:-0} |"
            echo "| LCOV reports | ${LCOV_COUNT:-0} |"
            echo "| Scanner action outcome | ${SCANNER_OUTCOME:-skipped} |"
            echo "| Compute Engine task | ${ANALYSIS_TASK_STATUS:-not-available} |"
            echo "| Quality gate | ${QUALITY_GATE_STATUS:-not-available} |"
            echo "| Failed quality-gate conditions | ${FAILED_CONDITION_COUNT:-0} |"
            echo "| New-code duplication hotspots | ${DUPLICATION_HOTSPOT_COUNT:-0} |"
            echo "| Open Sonar issues | ${ISSUE_COUNT:-0} |"
            echo "| Diagnostic state | ${DIAGNOSIS_STATUS:-unknown} |"
            echo "| Workflow result | ${ANALYZE_RESULT:-skipped} |"
            echo "| Preflight status | ${PREFLIGHT_STATUS:-unknown} |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "${DASHBOARD_URL:-}" == https://* ]]; then
            {
              echo
              echo "[Open the SonarQube Cloud dashboard]($DASHBOARD_URL)"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          {
            echo
            echo 'The detailed SonarQube Cloud Exact Diagnosis section is in the Test, cover, analyze, and diagnose job summary.'
            echo 'The sonar-diagnostics artifact contains raw task, quality-gate, duplication, issue, and coverage reports.'
          } >> "$GITHUB_STEP_SUMMARY"
