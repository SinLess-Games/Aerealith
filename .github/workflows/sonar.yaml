# .github/workflows/sonar.yaml
#
# Runs SonarQube analysis for the Aerealith Nx monorepo.
#
# Supported modes:
# - SonarQube Cloud:
#   - SONAR_TOKEN secret
#   - SONAR_PROJECT_KEY repository variable
#   - SONAR_ORGANIZATION repository variable
#
# - Self-hosted SonarQube Server:
#   - SONAR_TOKEN secret
#   - SONAR_PROJECT_KEY repository variable
#   - SONAR_HOST_URL repository variable
#
# Notes:
# - Test, spec, E2E, integration, fixture, and mock files are excluded from
#   production source analysis.
# - Vitest coverage is generated before scanning and passed to Sonar as LCOV.
# - The workflow safely skips external fork pull requests because repository
#   secrets are unavailable to them.
# - The scanner waits for the Sonar quality gate and fails when it is red.

name: SonarQube

on:
  pull_request:
    branches:
      - master
      - staging
      - production
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

  push:
    branches:
      - master
      - staging
      - production

  schedule:
    # Weekly full quality scan.
    - cron: "0 6 * * 0"

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: >-
    sonar-${{
      github.event.pull_request.number ||
      github.ref ||
      github.run_id
    }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  CI: "true"
  FORCE_COLOR: "1"
  HUSKY: "0"

  NODE_VERSION: "25.9.0"
  PNPM_VERSION: "11.5.2"

  SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
  SONAR_PROJECT_NAME: ${{ vars.SONAR_PROJECT_NAME }}
  SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
  SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

  SONAR_QUALITY_GATE_TIMEOUT: "300"

jobs:
  preflight:
    name: Validate Sonar configuration
    runs-on: ubuntu-latest
    timeout-minutes: 10

    outputs:
      scan_enabled: ${{ steps.detect.outputs.scan_enabled }}
      platform: ${{ steps.detect.outputs.platform }}
      skip_reason: ${{ steps.detect.outputs.skip_reason }}

    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Detect Sonar configuration
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          PULL_REQUEST_HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
          CURRENT_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          scan_enabled='false'
          platform='unknown'
          skip_reason=''

          is_internal_pull_request='true'

          if [[ "$EVENT_NAME" == 'pull_request' ]] &&
            [[ "$PULL_REQUEST_HEAD_REPOSITORY" != "$CURRENT_REPOSITORY" ]]; then
            is_internal_pull_request='false'
          fi

          if [[ -z "${SONAR_TOKEN:-}" ]]; then
            skip_reason='SONAR_TOKEN is not configured.'
          elif [[ "$is_internal_pull_request" != 'true' ]]; then
            skip_reason='External fork pull requests do not receive repository secrets.'
          elif [[ -z "${SONAR_PROJECT_KEY:-}" ]]; then
            skip_reason='SONAR_PROJECT_KEY repository variable is not configured.'
          elif [[ -n "${SONAR_HOST_URL:-}" ]]; then
            scan_enabled='true'
            platform='server'
            skip_reason='Ready to scan with self-hosted SonarQube Server.'
          elif [[ -n "${SONAR_ORGANIZATION:-}" ]]; then
            scan_enabled='true'
            platform='cloud'
            skip_reason='Ready to scan with SonarQube Cloud.'
          else
            skip_reason='Configure SONAR_ORGANIZATION for SonarQube Cloud or SONAR_HOST_URL for SonarQube Server.'
          fi

          {
            echo "scan_enabled=$scan_enabled"
            echo "platform=$platform"
            echo "skip_reason=$skip_reason"
          } >> "$GITHUB_OUTPUT"

          {
            echo '## SonarQube Preflight'
            echo
            echo '| Setting | Value |'
            echo '| --- | --- |'
            echo "| Sonar platform | $platform |"
            echo "| SONAR_TOKEN available | $([[ -n "${SONAR_TOKEN:-}" ]] && echo true || echo false) |"
            echo "| SONAR_PROJECT_KEY available | $([[ -n "${SONAR_PROJECT_KEY:-}" ]] && echo true || echo false) |"
            echo "| SONAR_ORGANIZATION available | $([[ -n "${SONAR_ORGANIZATION:-}" ]] && echo true || echo false) |"
            echo "| SONAR_HOST_URL available | $([[ -n "${SONAR_HOST_URL:-}" ]] && echo true || echo false) |"
            echo "| Internal pull request | $is_internal_pull_request |"
            echo "| Scan enabled | $scan_enabled |"
            echo "| Status | $skip_reason |"
          } >> "$GITHUB_STEP_SUMMARY"

  analyze:
    name: Test, cover, and analyze
    needs: preflight
    if: needs.preflight.outputs.scan_enabled == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    outputs:
      coverage_status: ${{ steps.coverage.outputs.coverage_status }}
      test_project_count: ${{ steps.coverage.outputs.test_project_count }}
      lcov_count: ${{ steps.coverage.outputs.lcov_count }}
      scan_result: ${{ steps.sonar_scan.outcome }}

    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_ROOT_CERT: ${{ secrets.SONAR_ROOT_CERT }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          # Sonar needs complete history for accurate blame information and
          # pull-request reporting.
          fetch-depth: 0
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Verify workspace requirements
        run: |
          set -euo pipefail

          required_files=(
            package.json
            pnpm-lock.yaml
            pnpm-workspace.yaml
          )

          for required_file in "${required_files[@]}"; do
            if [[ ! -f "$required_file" ]]; then
              echo "::error::Required workspace file was not found: $required_file"
              exit 1
            fi
          done

          printf 'Node.js: %s\n' "$(node --version)"
          printf 'pnpm: %s\n' "$(pnpm --version)"

      - name: Install workspace dependencies
        run: |
          set -euo pipefail

          pnpm install --frozen-lockfile --ignore-scripts

      - name: Run Vitest coverage for every Nx test project
        id: coverage
        run: |
          set -euo pipefail

          nx_bin="$GITHUB_WORKSPACE/node_modules/.bin/nx"
          projects_file="$RUNNER_TEMP/sonar-test-projects.txt"

          if [[ ! -x "$nx_bin" ]]; then
            echo "::error::Nx binary was not found: $nx_bin"
            exit 1
          fi

          "$nx_bin" show projects --withTarget=test |
            awk 'NF { print }' |
            sort -u > "$projects_file"

          test_project_count="$(wc -l < "$projects_file" | tr -d ' ')"
          coverage_status='not-run'

          {
            echo '## Sonar Coverage Generation'
            echo
            echo "| Nx test projects discovered | $test_project_count |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "$test_project_count" -eq 0 ]]; then
            echo 'No Nx projects expose a test target. Sonar will continue without coverage reports.'

            {
              echo 'coverage_status=not-run'
              echo 'test_project_count=0'
              echo 'lcov_count=0'
              echo 'lcov_reports='
            } >> "$GITHUB_OUTPUT"

            exit 0
          fi

          coverage_status='passed'

          while IFS= read -r project; do
            [[ -n "$project" ]] || continue

            echo "::group::Vitest coverage: $project"

            "$nx_bin" run "$project:test" \
              --skip-nx-cache \
              --output-style=stream \
              -- \
              --coverage.enabled=true \
              --coverage.reporter=lcov \
              --coverage.reporter=json-summary

            echo "::endgroup::"
          done < "$projects_file"

          mapfile -t lcov_files < <(
            find coverage \
              -type f \
              -name lcov.info \
              -print \
              2>/dev/null |
              sort
          )

          lcov_count="${#lcov_files[@]}"
          lcov_reports=''

          if [[ "$lcov_count" -gt 0 ]]; then
            lcov_reports="$(IFS=,; echo "${lcov_files[*]}")"
          fi

          {
            echo "coverage_status=$coverage_status"
            echo "test_project_count=$test_project_count"
            echo "lcov_count=$lcov_count"
            echo "lcov_reports=$lcov_reports"
          } >> "$GITHUB_OUTPUT"

          {
            echo
            echo "| Coverage execution status | $coverage_status |"
            echo "| LCOV reports found | $lcov_count |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create temporary Sonar project configuration
        id: sonar_config
        env:
          LCOV_REPORTS: ${{ steps.coverage.outputs.lcov_reports }}
          SONAR_PLATFORM: ${{ needs.preflight.outputs.platform }}
        run: |
          set -euo pipefail

          config_path="$GITHUB_WORKSPACE/sonar-project.properties"
          backup_path="$RUNNER_TEMP/sonar-project.properties.backup"
          config_existed='false'

          if [[ -f "$config_path" ]]; then
            cp "$config_path" "$backup_path"
            config_existed='true'
          fi

          project_name="${SONAR_PROJECT_NAME:-Aerealith}"

          {
            echo "sonar.projectKey=$SONAR_PROJECT_KEY"
            echo "sonar.projectName=$project_name"
            echo 'sonar.sourceEncoding=UTF-8'

            if [[ "$SONAR_PLATFORM" == 'cloud' ]]; then
              echo "sonar.organization=$SONAR_ORGANIZATION"
            fi

            # Analyze production application and library code only.
            echo 'sonar.sources=apps,libs'

            # Do not scan tests, specs, E2E tests, fixtures, generated output,
            # caches, dependency folders, or declaration files as production code.
            echo 'sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/.nx/**,**/.vite/**,**/out-tsc/**,**/storybook-static/**,**/*.d.ts,**/*.test.*,**/*.spec.*,**/*.e2e.*,**/*.integration.*,**/*.stories.*,**/test/**,**/tests/**,**/spec/**,**/specs/**,**/e2e/**,**/e2e-tests/**,**/integration/**,**/integration-tests/**,**/__tests__/**,**/__mocks__/**,**/__fixtures__/**'

            # Keep test and generated code out of production coverage metrics.
            echo 'sonar.coverage.exclusions=**/*.test.*,**/*.spec.*,**/*.e2e.*,**/*.integration.*,**/*.stories.*,**/test/**,**/tests/**,**/spec/**,**/specs/**,**/e2e/**,**/e2e-tests/**,**/integration/**,**/integration-tests/**,**/__tests__/**,**/__mocks__/**,**/__fixtures__/**,**/*.d.ts'

            if [[ -n "${LCOV_REPORTS:-}" ]]; then
              echo "sonar.javascript.lcov.reportPaths=$LCOV_REPORTS"
            fi

            # Block the workflow when Sonar calculates a failed quality gate.
            echo 'sonar.qualitygate.wait=true'
            echo "sonar.qualitygate.timeout=$SONAR_QUALITY_GATE_TIMEOUT"
          } > "$config_path"

          {
            echo "config_path=$config_path"
            echo "backup_path=$backup_path"
            echo "config_existed=$config_existed"
          } >> "$GITHUB_OUTPUT"

          {
            echo '## Sonar Scanner Configuration'
            echo
            echo '| Setting | Value |'
            echo '| --- | --- |'
            echo "| Platform | $SONAR_PLATFORM |"
            echo "| Project key configured | true |"
            echo "| Source roots | apps, libs |"
            echo '| Test and E2E source excluded | true |'
            echo "| LCOV reports configured | $([[ -n "${LCOV_REPORTS:-}" ]] && echo true || echo false) |"
            echo '| Quality gate wait enabled | true |'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run SonarQube analysis
        id: sonar_scan
        uses: SonarSource/sonarqube-scan-action@v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
          SONAR_ROOT_CERT: ${{ secrets.SONAR_ROOT_CERT }}

      - name: Restore repository Sonar configuration
        if: always()
        env:
          CONFIG_PATH: ${{ steps.sonar_config.outputs.config_path }}
          BACKUP_PATH: ${{ steps.sonar_config.outputs.backup_path }}
          CONFIG_EXISTED: ${{ steps.sonar_config.outputs.config_existed }}
        run: |
          set -euo pipefail

          if [[ "$CONFIG_EXISTED" == 'true' ]]; then
            cp "$BACKUP_PATH" "$CONFIG_PATH"
          else
            rm -f "$CONFIG_PATH"
          fi

      - name: Upload Sonar coverage reports
        if: always() && steps.coverage.outputs.lcov_count != '0'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: sonar-coverage-${{ github.run_id }}
          path: |
            coverage/**/lcov.info
            coverage/**/coverage-summary.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Publish analysis summary
        if: always()
        env:
          COVERAGE_STATUS: ${{ steps.coverage.outputs.coverage_status }}
          TEST_PROJECT_COUNT: ${{ steps.coverage.outputs.test_project_count }}
          LCOV_COUNT: ${{ steps.coverage.outputs.lcov_count }}
          SCAN_RESULT: ${{ steps.sonar_scan.outcome }}
        run: |
          set -euo pipefail

          {
            echo '## SonarQube Analysis Result'
            echo
            echo '| Check | Result |'
            echo '| --- | --- |'
            echo "| Vitest coverage status | ${COVERAGE_STATUS:-unknown} |"
            echo "| Nx test projects run | ${TEST_PROJECT_COUNT:-0} |"
            echo "| LCOV reports supplied | ${LCOV_COUNT:-0} |"
            echo "| Sonar scanner result | ${SCAN_RESULT:-unknown} |"
            echo
            echo 'Detailed quality-gate status, issue triage, duplication metrics,'
            echo 'security findings, and coverage results are available in SonarQube.'
          } >> "$GITHUB_STEP_SUMMARY"

  summary:
    name: Publish Sonar result
    needs:
      - preflight
      - analyze
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Write workflow summary
        env:
          SCAN_ENABLED: ${{ needs.preflight.outputs.scan_enabled }}
          PLATFORM: ${{ needs.preflight.outputs.platform }}
          PREFLIGHT_STATUS: ${{ needs.preflight.outputs.skip_reason }}
          COVERAGE_STATUS: ${{ needs.analyze.outputs.coverage_status }}
          TEST_PROJECT_COUNT: ${{ needs.analyze.outputs.test_project_count }}
          LCOV_COUNT: ${{ needs.analyze.outputs.lcov_count }}
          ANALYSIS_RESULT: ${{ needs.analyze.result }}
        run: |
          set -euo pipefail

          {
            echo '## SonarQube Workflow Result'
            echo
            echo '| Check | Result |'
            echo '| --- | --- |'
            echo "| Scan enabled | ${SCAN_ENABLED:-false} |"
            echo "| Platform | ${PLATFORM:-unknown} |"
            echo "| Coverage status | ${COVERAGE_STATUS:-not-run} |"
            echo "| Test projects | ${TEST_PROJECT_COUNT:-0} |"
            echo "| LCOV reports | ${LCOV_COUNT:-0} |"
            echo "| Analysis job result | ${ANALYSIS_RESULT:-skipped} |"
            echo "| Preflight status | ${PREFLIGHT_STATUS:-unknown} |"
            echo

            if [[ "${SCAN_ENABLED:-false}" != 'true' ]]; then
              echo '> Passed: SonarQube scanning was safely skipped because configuration is incomplete or secrets were unavailable.'
            elif [[ "${ANALYSIS_RESULT:-unknown}" == 'success' ]]; then
              echo '> Passed: SonarQube analysis and the configured quality gate completed successfully.'
            else
              echo '> Failed: inspect the SonarQube analysis job and SonarQube project dashboard for the exact quality-gate failure or scanner error.'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
