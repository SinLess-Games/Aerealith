# .github/workflows/ci.yml

name: CI

on:
  push:
    branches:
      - master

  pull_request:
    branches:
      - master

permissions:
  actions: read
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  # GitHub Actions runners are moving JavaScript actions to Node 24.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

  # Nx daemon is useful locally but should remain disabled in CI.
  NX_DAEMON: "false"

jobs:
  validate:
    name: Validate workspace
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.23.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

          # Do not enable setup-node package caching yet.
          #
          # The current workflow fails during `pnpm store path --silent` because
          # the workspace configuration is not accepted by pnpm's cache lookup.
          #
          # Re-enable pnpm caching after pnpm-workspace.yaml is validated.
          package-manager-cache: false

      - name: Verify toolchain
        run: |
          node --version
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve Nx comparison range
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PULL_REQUEST_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PULL_REQUEST_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BASE_SHA: ${{ github.event.before }}
          PUSH_HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            base_sha="$PULL_REQUEST_BASE_SHA"
            head_sha="$PULL_REQUEST_HEAD_SHA"
          else
            base_sha="$PUSH_BASE_SHA"
            head_sha="$PUSH_HEAD_SHA"
          fi

          if [[ -z "$base_sha" || "$base_sha" =~ ^0+$ ]]; then
            base_sha="$(git rev-parse "${head_sha}^" 2>/dev/null || printf '%s' "$head_sha")"
          fi

          git cat-file -e "${base_sha}^{commit}"
          git cat-file -e "${head_sha}^{commit}"

          {
            echo "NX_BASE=$base_sha"
            echo "NX_HEAD=$head_sha"
          } >> "$GITHUB_ENV"

          {
            echo "## Nx comparison range"
            echo
            echo "- Base: \`$base_sha\`"
            echo "- Head: \`$head_sha\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Validate affected projects
        run: |
          pnpm exec nx affected \
            --targets=lint,typecheck,test,build \
            --base="$NX_BASE" \
            --head="$NX_HEAD"

      - name: Run Nx Cloud self-healing analysis
        if: always()
        run: pnpm exec nx fix-ci
