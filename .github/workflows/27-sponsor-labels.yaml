# .github/workflows/27-sponsor-labels.yaml
#
# Applies the existing "sponsor" label when the issue or PR author sponsors
# the owner of this repository through GitHub Sponsors.
#
# Security design:
# - pull_request_target is intentional so external-fork pull requests can
#   receive the sponsor label with the repository's write-scoped GITHUB_TOKEN.
# - Never checks out, downloads, caches, or executes repository or pull-request
#   code.
# - Does not expose repository secrets or credentials beyond the ephemeral
#   GitHub token scoped only to issue-label management.
# - Uses an immutable action commit.
# - Grants only the minimum permission needed to add the existing sponsor label.

name: 27 · Sponsor Labels

on:
  issues:
    types:
      - opened

  # Required to label pull requests opened from external forks.
  # This workflow must never check out or execute pull request-controlled code.
  pull_request_target:
    types:
      - opened

permissions: {}

concurrency:
  group: sponsor-labels-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  label-sponsor:
    name: Label Sponsor
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      issues: write

    steps:
      - name: Sponsor Labels
        uses: JasonEtco/is-sponsor-label-action@565f3cb67b3518a8aae36c3f0bce9e8513430e84 # v2.0.0
        with:
          label: sponsor
        env:
          GITHUB_TOKEN: ${{ github.token }}
