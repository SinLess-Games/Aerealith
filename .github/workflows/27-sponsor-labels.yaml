# .github/workflows/27-sponsor-labels.yaml
#
# Applies the existing "sponsor" label when the issue or pull request author
# sponsors the owner of this repository through GitHub Sponsors.
#
# Security design:
# - pull_request_target is intentional so external-fork pull requests can
#   receive the sponsor label with the repository's write-scoped GITHUB_TOKEN.
# - Never checks out, downloads, caches, or executes repository or pull-request
#   code.
# - Uses GitHub's API directly because the third-party sponsor-label action
#   supports pull_request.opened, but not pull_request_target.opened.
# - Uses only the ephemeral token scoped to issue-label management.
# - The workflow is idempotent and never removes or replaces labels.

name: 27 · Sponsor Labels

on: # zizmor: ignore[dangerous-triggers] Required to label sponsor pull requests from external forks; this workflow never checks out, downloads, caches, or executes pull-request-controlled code.
  issues:
    types:
      - opened

  # Required to label pull requests opened from external forks.
  # This workflow must never check out or execute pull request-controlled code.
  pull_request_target:
    types:
      - opened

permissions: {}

concurrency:
  group: sponsor-labels-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  label-sponsor:
    name: Label Sponsor
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      issues: write

    env:
      GH_TOKEN: ${{ github.token }}
      REPOSITORY: ${{ github.repository }}
      REPOSITORY_OWNER: ${{ github.repository_owner }}
      ITEM_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
      ITEM_AUTHOR_NODE_ID: ${{ github.event.issue.user.node_id || github.event.pull_request.user.node_id }}
      LABEL: sponsor

    steps:
      - name: Label repository sponsors
        run: |
          set -euo pipefail

          if [[ -z "${ITEM_NUMBER:-}" || -z "${ITEM_AUTHOR_NODE_ID:-}" ]]; then
            echo "::error::Unable to determine the opened issue or pull request author."
            exit 1
          fi

          command -v gh >/dev/null
          command -v jq >/dev/null

          # Fail early with a useful message when the configured label does not
          # exist. This workflow intentionally never creates repository labels.
          if ! gh api "/repos/${REPOSITORY}/labels/${LABEL}" >/dev/null; then
            echo "::notice::The repository label '${LABEL}' does not exist, so sponsor labeling was skipped."
            exit 0
          fi

          existing_labels="$(gh api "/repos/${REPOSITORY}/issues/${ITEM_NUMBER}/labels")"

          # $label is a jq variable supplied by --arg, not a shell variable.
          # shellcheck disable=SC2016
          if jq -e --arg label "$LABEL" \
            'any(.[]; .name == $label)' \
            <<< "$existing_labels" >/dev/null; then
            echo "::notice::The '${LABEL}' label is already present."
            exit 0
          fi

          query='
            query SponsorLabel($owner: String!, $cursor: String) {
              repositoryOwner(login: $owner) {
                ... on User {
                  sponsorships: sponsorshipsAsMaintainer(
                    first: 100
                    after: $cursor
                  ) {
                    nodes {
                      sponsor {
                        id
                      }
                    }
                    pageInfo {
                      hasNextPage
                      endCursor
                    }
                  }
                }
                ... on Organization {
                  sponsorships: sponsorshipsAsMaintainer(
                    first: 100
                    after: $cursor
                  ) {
                    nodes {
                      sponsor {
                        id
                      }
                    }
                    pageInfo {
                      hasNextPage
                      endCursor
                    }
                  }
                }
              }
            }
          '

          cursor=''
          is_sponsor='false'

          while true; do
            arguments=(
              api graphql
              -f "query=${query}"
              -F "owner=${REPOSITORY_OWNER}"
            )

            if [[ -n "$cursor" ]]; then
              arguments+=(-F "cursor=${cursor}")
            fi

            response="$(gh "${arguments[@]}")"

            if ! jq -e \
              '.data.repositoryOwner != null and .data.repositoryOwner.sponsorships != null' \
              <<< "$response" >/dev/null; then
              echo "::notice::Unable to read GitHub Sponsors data for '${REPOSITORY_OWNER}', so sponsor labeling was skipped."
              exit 0
            fi

            if jq -e --arg author_id "$ITEM_AUTHOR_NODE_ID" \
              '.data.repositoryOwner.sponsorships.nodes[]? | select(.sponsor.id == $author_id)' \
              <<< "$response" >/dev/null; then
              is_sponsor='true'
              break
            fi

            has_next_page="$(jq -r \
              '.data.repositoryOwner.sponsorships.pageInfo.hasNextPage' \
              <<< "$response")"

            if [[ "$has_next_page" != 'true' ]]; then
              break
            fi

            cursor="$(jq -r \
              '.data.repositoryOwner.sponsorships.pageInfo.endCursor' \
              <<< "$response")"

            if [[ -z "$cursor" || "$cursor" == 'null' ]]; then
              echo "::notice::GitHub returned an invalid sponsorship pagination cursor, so sponsor labeling was skipped."
              exit 0
            fi
          done

          if [[ "$is_sponsor" != 'true' ]]; then
            echo "::notice::The opened item author is not a sponsor."
            exit 0
          fi

          gh api \
            --method POST \
            "/repos/${REPOSITORY}/issues/${ITEM_NUMBER}/labels" \
            -f "labels[]=${LABEL}" >/dev/null

          echo "::notice::Applied the '${LABEL}' label to a GitHub Sponsor."
