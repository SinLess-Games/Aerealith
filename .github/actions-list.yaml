# .github/actions-list.yaml
#
# Approved GitHub Actions for the Aerealith repository.
#
# Prefer pinning these references to full commit SHAs inside production
# workflows once each workflow has been validated. Keep this catalogue
# aligned with .github/workflows/*.yaml.

# -----------------------------------------------------------------------------
# Core GitHub Actions
# -----------------------------------------------------------------------------

- name: Checkout repository
  uses: actions/checkout@v6
  url: https://github.com/marketplace/actions/checkout

- name: Set up Node.js
  uses: actions/setup-node@v6
  url: https://github.com/marketplace/actions/setup-node-js-environment

- name: Set up pnpm
  uses: pnpm/action-setup@v6.0.9
  url: https://github.com/marketplace/actions/setup-pnpm

- name: Cache dependencies and build outputs
  uses: actions/cache@v5.0.5
  url: https://github.com/marketplace/actions/cache

- name: Upload build artifact
  uses: actions/upload-artifact@v7.0.1
  url: https://github.com/marketplace/actions/upload-a-build-artifact

- name: Download build artifact
  uses: actions/download-artifact@v8
  url: https://github.com/marketplace/actions/download-a-build-artifact

- name: Labeler
  uses: actions/labeler@v6.1.0
  url: https://github.com/marketplace/actions/labeler

- name: Dependency Review
  uses: actions/dependency-review-action@v4
  url: https://github.com/marketplace/actions/dependency-review

# -----------------------------------------------------------------------------
# CI, Testing, Coverage, and Quality
# -----------------------------------------------------------------------------

- name: MegaLinter
  uses: oxsecurity/megalinter@v9.5.0
  url: https://github.com/marketplace/actions/megalinter

- name: Vitest Coverage Report
  uses: davelosert/vitest-coverage-report-action@v2.12.1
  url: https://github.com/marketplace/actions/vitest-coverage-report

- name: Upload coverage reports to Codecov
  uses: codecov/codecov-action@v7.0.0
  url: https://github.com/marketplace/actions/codecov

- name: Upload test results to Codecov
  uses: codecov/test-results-action@v1
  url: https://github.com/marketplace/actions/codecov

- name: GraphQL Inspector
  uses: graphql-hive/graphql-inspector@release-1781692943029
  url: https://github.com/marketplace/actions/graphql-inspector

- name: Meticulous Upload Assets
  uses: alwaysmeticulous/report-diffs-action/upload-assets@v1
  url: https://github.com/marketplace/actions/run-meticulous-tests

