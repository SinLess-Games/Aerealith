# .github/actions-list.yaml
#
# Approved GitHub Actions for the Aerealith repository.
#
# Prefer pinning these references to full commit SHAs inside production
# workflows once each workflow has been validated. Keep this catalogue
# aligned with .github/workflows/*.yaml.

# -----------------------------------------------------------------------------
# Core GitHub Actions
# -----------------------------------------------------------------------------

- name: Checkout repository
  uses: actions/checkout@v6
  url: https://github.com/marketplace/actions/checkout

- name: Set up Node.js
  uses: actions/setup-node@v6
  url: https://github.com/marketplace/actions/setup-node-js-environment

- name: Set up pnpm
  uses: pnpm/action-setup@v6.0.9
  url: https://github.com/marketplace/actions/setup-pnpm

- name: Cache dependencies and build outputs
  uses: actions/cache@v5.0.5
  url: https://github.com/marketplace/actions/cache

- name: Upload build artifact
  uses: actions/upload-artifact@v7.0.1
  url: https://github.com/marketplace/actions/upload-a-build-artifact

- name: GitHub Script
  uses: actions/github-script@v8
  url: https://github.com/marketplace/actions/github-script

- name: Labeler
  uses: actions/labeler@v6.1.0
  url: https://github.com/marketplace/actions/labeler

- name: Dependency Review
  uses: actions/dependency-review-action@v4
  url: https://github.com/marketplace/actions/dependency-review

# -----------------------------------------------------------------------------
# CI, Testing, Coverage, and Repository Quality
# -----------------------------------------------------------------------------

- name: MegaLinter
  uses: oxsecurity/megalinter@v9.5.0
  url: https://github.com/marketplace/actions/megalinter

- name: Vitest Coverage Report
  uses: davelosert/vitest-coverage-report-action@v2.12.1
  url: https://github.com/marketplace/actions/vitest-coverage-report

- name: Upload coverage reports to Codecov
  uses: codecov/codecov-action@v7.0.0
  url: https://github.com/marketplace/actions/codecov

- name: Upload test results to Codecov
  uses: codecov/test-results-action@v1
  url: https://github.com/marketplace/actions/codecov

- name: GraphQL Inspector
  uses: graphql-hive/graphql-inspector@release-1781692943029
  url: https://github.com/marketplace/actions/graphql-inspector

- name: Meticulous Upload Assets
  uses: alwaysmeticulous/report-diffs-action/upload-assets@v1
  url: https://github.com/marketplace/actions/run-meticulous-tests

# -----------------------------------------------------------------------------
# Repository Labels, Pull Requests, and Dependency Automation
# -----------------------------------------------------------------------------

- name: Synchronize Labels
  uses: EndBug/label-sync@v2.3.3
  url: https://github.com/marketplace/actions/label-sync

- name: Read Dependabot Pull Request Metadata
  uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98
  url: https://github.com/marketplace/actions/fetch-metadata-from-dependabot-prs

- name: Codeball AI Code Review
  uses: sturdy-dev/codeball-action@102067b9f537482cee112577655c85fda56d8926
  url: https://github.com/marketplace/actions/codeball-ai-code-review

- name: Sponsor Labels
  uses: JasonEtco/is-sponsor-label-action@565f3cb67b3518a8aae36c3f0bce9e8513430e84
  url: https://github.com/marketplace/actions/sponsor-labels

# -----------------------------------------------------------------------------
# Security and Supply Chain
# -----------------------------------------------------------------------------

- name: GitHub CodeQL Initialize
  uses: github/codeql-action/init@v4
  url: https://github.com/marketplace/actions/github-codeql-action

- name: GitHub CodeQL Analyze
  uses: github/codeql-action/analyze@v4
  url: https://github.com/marketplace/actions/github-codeql-action

- name: GitHub CodeQL Upload SARIF
  uses: github/codeql-action/upload-sarif@v4
  url: https://github.com/marketplace/actions/github-codeql-action

- name: Gitleaks
  uses: gitleaks/gitleaks-action@v3.0.0
  url: https://github.com/marketplace/actions/gitleaks

- name: Trivy Security Scan
  uses: aquasecurity/trivy-action@v0.36.0
  url: https://github.com/marketplace/actions/aqua-security-trivy

- name: Set Up Snyk CLI
  uses: snyk/actions/setup@v1.0.0
  url: https://github.com/marketplace/actions/snyk

- name: Official SonarQube Scan
  uses: SonarSource/sonarqube-scan-action@v8.2.0
  url: https://github.com/marketplace/actions/official-sonarqube-scan

# -----------------------------------------------------------------------------
# Containers and GitHub Container Registry
# -----------------------------------------------------------------------------

- name: Set up Docker Buildx
  uses: docker/setup-buildx-action@v4
  url: https://github.com/marketplace/actions/set-up-docker-buildx

- name: Log in to GitHub Container Registry
  uses: docker/login-action@v4
  url: https://github.com/marketplace/actions/docker-login

- name: Generate Docker image metadata
  uses: docker/metadata-action@v6
  url: https://github.com/marketplace/actions/docker-metadata-action

- name: Build and publish Docker image
  uses: docker/build-push-action@v7
  url: https://github.com/marketplace/actions/build-and-push-docker-images

# -----------------------------------------------------------------------------
# Repository Insights
# -----------------------------------------------------------------------------

- name: Hercules Insights
  uses: src-d/hercules@v10.7.2
  url: https://github.com/marketplace/actions/hercules-insights
