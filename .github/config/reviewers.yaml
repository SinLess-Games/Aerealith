# .github/config/reviewers.yaml
#
# Source of truth for Aerealith pull request reviewer assignment.
#
# This configuration intentionally does NOT use area-based, path-based,
# service-based, or library-based reviewer routing.
#
# Every eligible pull request requests the same global reviewer:
# - Sinless777
#
# The Aerealith Project Orchestrator must never request a review from the
# pull request author because GitHub does not allow authors to approve their
# own pull requests.

version: 1

metadata:
  owner: SinLess-Games
  repository: Aerealith
  managedBy: aerealith-project-orchestrator
  description: Global pull request reviewer policy for Aerealith.

policy:
  enabled: true

  strategy: global

  requestReviewersAutomatically: true

  requestReviewOn:
    - pull_request.opened
    - pull_request.reopened
    - pull_request.ready_for_review
    - pull_request.synchronize

  reviewDraftPullRequests: false

  preventSelfReview: true

  skipReviewerIfPullRequestAuthorMatches: true

  maximumRequestedReviewers: 1

  reRequestReviewAfterNewCommits: true

  requestReviewForBotPullRequests: true

  requestReviewForAgentPullRequests: true

  requestReviewForDependencyPullRequests: true

  requestReviewForSecurityPullRequests: true

  requestReviewForReleasePullRequests: true

  requestReviewForInfrastructurePullRequests: true

  requestReviewForBreakingChanges: true

  allowAutomationToRemoveReviewRequests: false

  requireHumanReviewBeforeMerge: true

reviewers:
  - username: Sinless777
    displayName: Sinless777
    role: repository-owner
    active: true

    canReview:
      - feature
      - fix
      - refactor
      - test
      - docs
      - build
      - ci
      - chore
      - perf
      - style
      - revert
      - security
      - deps
      - release
      - wip
      - hotfix

    canReviewRiskLevels:
      - low
      - medium
      - high
      - security-sensitive

    canReviewAutomationSources:
      - human
      - github-copilot
      - openai-codex
      - mend-renovate
      - mend-remediate
      - dependabot

    availability:
      enabled: true
      status: available

      # Future values:
      # - available
      # - limited
      # - unavailable
      # - vacation

      unavailableUntil: null

      notes: null

rules:
  default:
    description: Request the global reviewer for every eligible non-draft pull request.

    reviewers:
      - Sinless777

    conditions:
      draft: false
      authorMustNotBe:
        - Sinless777

  pullRequestAuthorIsReviewer:
    description: Do not request review when Sinless777 created the pull request.

    conditions:
      authorIs:
        - Sinless777

    actions:
      - skip-reviewer-request
      - set-project-worker: Human Assigned
      - add-comment: >-
          👤 Reviewer assignment skipped because the pull request author is
          the configured global reviewer.

  dependencyPullRequest:
    description: Request the global reviewer for dependency updates.

    conditions:
      labelsAny:
        - "type: dependency"
        - "automation: mend-renovate"
        - "automation: mend-remediate"
        - "automation: dependabot"

    reviewers:
      - Sinless777

    actions:
      - request-review
      - set-project-status: In Review

  securityPullRequest:
    description: Request the global reviewer for security-sensitive work.

    conditions:
      labelsAny:
        - "type: security"
        - "risk: security-sensitive"
        - "risk: high"

    reviewers:
      - Sinless777

    actions:
      - request-review
      - add-label: "automation: needs-review"
      - add-label: "automation: no-auto-merge"
      - set-project-status: In Review
      - set-project-worker: Human Review

  releasePullRequest:
    description: Request the global reviewer for release pull requests.

    conditions:
      labelsAny:
        - "type: release"

    reviewers:
      - Sinless777

    actions:
      - request-review
      - set-project-status: In Review
      - set-project-worker: Human Review

  agentPullRequest:
    description: Request the global reviewer for GitHub Copilot or OpenAI Codex work.

    conditions:
      labelsAny:
        - "agent: copilot"
        - "agent: codex"

    reviewers:
      - Sinless777

    actions:
      - request-review
      - add-label: "automation: needs-review"
      - set-project-status: In Review
      - set-project-worker: Human Review

  breakingChangePullRequest:
    description: Request the global reviewer and disable auto-merge for breaking changes.

    conditions:
      labelsAny:
        - "planning: breaking-change"

    reviewers:
      - Sinless777

    actions:
      - request-review
      - add-label: "automation: needs-review"
      - add-label: "automation: no-auto-merge"
      - set-project-status: In Review
      - set-project-worker: Human Review

  failedValidation:
    description: Keep review assigned but block automatic merge after failed validation.

    conditions:
      validation:
        allRequiredChecksPassed: false

    actions:
      - add-label: "automation: no-auto-merge"
      - add-label: "automation: needs-review"
      - set-project-status: Blocked

reviewRequestBehavior:
  onOpened:
    enabled: true

  onReadyForReview:
    enabled: true

  onSynchronize:
    enabled: true
    reRequestOnlyWhenPreviousReviewStateIs:
      - commented
      - changes_requested
      - dismissed

  onMerged:
    enabled: true
    actions:
      - remove-reviewer-request
      - set-project-status: Done

  onClosedWithoutMerge:
    enabled: true
    actions:
      - remove-reviewer-request
      - set-project-status: Cancelled

manualOverrides:
  enabled: true

  labels:
    skipReview: "automation: no-review-request"
    requireReview: "automation: needs-review"
    blockAutoMerge: "automation: no-auto-merge"

  behavior:
    manualReviewerRequestsWin: true
    manualReviewerRemovalsWin: true
    manualAutoMergeBlocksWin: true

notifications:
  enabled: true

  commentWhenReviewRequested: false

  commentWhenSkippedForSelfReview: true

  commentWhenNoActiveReviewerExists: true

  noActiveReviewerComment: >-
    ⚠️ No active global reviewer is currently available. This pull request
    remains open but requires manual reviewer assignment before merge.

reconciliation:
  enabled: true
  schedule: "0 15 * * *"

  actions:
    - request-review-for-open-eligible-pull-requests
    - remove-invalid-self-review-requests
    - re-request-review-after-new-commits
    - identify-pull-requests-without-reviewers
    - identify-pull-requests-with-blocking-checks
