# .github/config/workers.yaml
#
# Source of truth for Aerealith implementation workers.
#
# This file controls:
# - Which humans and AI agents may receive work.
# - Which work types each worker may handle.
# - Which work is always human-only.
# - Fallback behavior when an AI worker is disabled or unavailable.
#
# This does NOT assign reviewers.
# Reviewer assignment is controlled by:
# .github/config/reviewers.yaml

version: 1

metadata:
  owner: SinLess-Games
  repository: Aerealith
  managedBy: aerealith-project-orchestrator
  description: Aerealith human, coding-agent, and dependency automation worker policy.

policy:
  enabled: true

  # Human decisions always override automated routing.
  manualAssignmentWins: true

  # AI workers may prepare pull requests but never merge them.
  requireHumanReviewForAgentPullRequests: true

  # The orchestrator must not assign work to disabled or unavailable workers.
  assignOnlyEnabledWorkers: true
  assignOnlyAvailableWorkers: true

  # If no eligible AI worker is available, route work to Sinless777.
  fallbackWorker: sinless777

  # Agents may never receive these labels.
  humanOnlyLabels:
    - "type: security"
    - "priority: p0"
    - "priority: p1"
    - "risk: high"
    - "risk: security-sensitive"
    - "planning: breaking-change"
    - "status: blocked"
    - "status: needs-info"
    - "status: needs-human-triage"
    - "agent: human-only"

  # Every agent-created PR must receive these labels.
  agentPullRequestLabels:
    - "automation: needs-review"
    - "automation: no-auto-merge"

  # The orchestrator must not assign an agent to an issue that lacks enough
  # implementation detail to be safely actionable.
  requiredIssueFieldsForAgentAssignment:
    - title
    - description
    - acceptance-criteria
    - scope
    - validation-plan

workers:
  # ---------------------------------------------------------------------------
  # Human Owner
  # ---------------------------------------------------------------------------

  - id: sinless777
    name: Sinless777
    type: human
    enabled: true
    available: true

    github:
      username: Sinless777

    projectWorkerValue: Human Assigned

    capabilities:
      - architecture
      - implementation
      - review
      - release-management
      - security-review
      - infrastructure
      - database
      - authentication
      - deployment
      - incident-response
      - dependency-review
      - agent-supervision

    allowedTypes:
      - feature
      - bug
      - security
      - documentation
      - dependency
      - refactor
      - infrastructure
      - test
      - performance
      - maintenance
      - release

    allowedRiskLevels:
      - low
      - medium
      - high
      - security-sensitive

    assignment:
      automaticallyAssignable: true
      assignForHumanOnlyWork: true
      assignForHighRiskWork: true
      assignForSecurityWork: true
      assignForReleaseWork: true
      assignForBlockedWork: true
      assignForDependencyReview: true

    limits:
      maxConcurrentIssues: null
      maxConcurrentPullRequests: null

  # ---------------------------------------------------------------------------
  # GitHub Copilot Cloud Agent
  # ---------------------------------------------------------------------------
  #
  # Set enabled: true only after Copilot cloud agent is enabled for this
  # repository and you confirm it can be assigned through GitHub Issues.
  #
  # The orchestration workflow should use GitHub's agent assignment API or
  # supported GitHub issue-assignment flow rather than treating Copilot like
  # a normal GitHub username.
  # ---------------------------------------------------------------------------

  - id: github-copilot
    name: GitHub Copilot
    type: coding-agent
    provider: github-copilot
    enabled: false
    available: false

    projectWorkerValue: GitHub Copilot

    assignment:
      strategy: github-agent-assignment
      automaticallyAssignable: true
      requiresHumanApprovalBeforeAssignment: false
      requiresHumanReviewBeforeMerge: true
      createPullRequest: true
      requestReviewOnCompletion: true

    capabilities:
      - documentation
      - test-writing
      - test-fixtures
      - low-risk-refactors
      - low-risk-frontend-work
      - component-scaffolding
      - api-documentation
      - developer-portal-content
      - repetitive-scaffolding

    allowedTypes:
      - documentation
      - test
      - refactor
      - feature
      - maintenance

    allowedRiskLevels:
      - low

    allowedAreas:
      - frontend
      - docs
      - devportal
      - ui
      - utils
      - tooling
      - api

    blockedAreas:
      - auth
      - user
      - discord
      - db
      - infra
      - cloudflare
      - docker
      - ci
      - nx-cloud

    blockedWork:
      - authentication-logic
      - authorization-logic
      - session-management
      - credential-handling
      - token-handling
      - database-migrations
      - schema-design
      - production-infrastructure
      - deployment-permissions
      - security-remediation
      - release-management
      - breaking-api-contracts
      - secret-management

    requiredLabels:
      - "agent: ready"

    blockedLabels:
      - "type: security"
      - "type: dependency"
      - "type: release"
      - "priority: p0"
      - "priority: p1"
      - "risk: high"
      - "risk: security-sensitive"
      - "planning: breaking-change"
      - "status: blocked"
      - "status: needs-info"
      - "status: needs-human-triage"
      - "agent: human-only"

    limits:
      maxConcurrentIssues: 2
      maxConcurrentPullRequests: 2

  # ---------------------------------------------------------------------------
  # OpenAI Codex Coding Agent
  # ---------------------------------------------------------------------------
  #
  # Set enabled: true only after OpenAI Codex is enabled as a GitHub coding
  # agent for this repository or organization.
  # ---------------------------------------------------------------------------

  - id: openai-codex
    name: OpenAI Codex
    type: coding-agent
    provider: openai-codex
    enabled: false
    available: false

    projectWorkerValue: OpenAI Codex

    assignment:
      strategy: github-agent-assignment
      automaticallyAssignable: true
      requiresHumanApprovalBeforeAssignment: false
      requiresHumanReviewBeforeMerge: true
      createPullRequest: true
      requestReviewOnCompletion: true

    capabilities:
      - test-writing
      - test-fixtures
      - low-risk-refactors
      - utility-functions
      - documentation
      - lint-fixes
      - formatting-fixes
      - repetitive-scaffolding
      - codebase-analysis

    allowedTypes:
      - documentation
      - test
      - refactor
      - maintenance

    allowedRiskLevels:
      - low

    allowedAreas:
      - core
      - api
      - ui
      - utils
      - config
      - flags
      - frontend
      - docs
      - devportal
      - tooling

    blockedAreas:
      - auth
      - user
      - discord
      - db
      - infra
      - cloudflare
      - docker
      - ci
      - nx-cloud

    blockedWork:
      - authentication-logic
      - authorization-logic
      - session-management
      - credential-handling
      - token-handling
      - database-migrations
      - schema-design
      - production-infrastructure
      - deployment-permissions
      - security-remediation
      - release-management
      - breaking-api-contracts
      - secret-management

    requiredLabels:
      - "agent: ready"

    blockedLabels:
      - "type: security"
      - "type: dependency"
      - "type: release"
      - "priority: p0"
      - "priority: p1"
      - "risk: high"
      - "risk: security-sensitive"
      - "planning: breaking-change"
      - "status: blocked"
      - "status: needs-info"
      - "status: needs-human-triage"
      - "agent: human-only"

    limits:
      maxConcurrentIssues: 2
      maxConcurrentPullRequests: 2

  # ---------------------------------------------------------------------------
  # Dependency Automation
  # ---------------------------------------------------------------------------
  #
  # This is not a coding agent that receives normal Issues.
  # It represents trusted dependency PR sources managed by:
  # - Mend Renovate
  # - Mend remediation
  # - Dependabot
  #
  # Dependency eligibility and auto-merge are defined only in:
  # .github/config/dependency-policy.yaml
  # ---------------------------------------------------------------------------

  - id: dependency-automation
    name: Dependency Automation
    type: automation
    enabled: true
    available: true

    projectWorkerValue: Dependency Automation

    providers:
      - mend-renovate
      - mend-remediate
      - dependabot

    assignment:
      strategy: provider-pull-request
      automaticallyAssignable: false
      receivesIssues: false
      receivesPullRequests: true
      requiresHumanReviewBeforeMerge: true
      createPullRequest: false

    capabilities:
      - dependency-updates
      - lockfile-updates
      - vulnerability-remediation
      - dependency-review
      - auto-merge-eligibility-evaluation

    allowedTypes:
      - dependency

    allowedRiskLevels:
      - low
      - medium

    blockedLabels:
      - "type: security"
      - "priority: p0"
      - "priority: p1"
      - "risk: high"
      - "risk: security-sensitive"
      - "planning: breaking-change"
      - "automation: no-auto-merge"

    limits:
      maxConcurrentPullRequests: 10

assignmentRules:
  # ---------------------------------------------------------------------------
  # Human-only Work
  # ---------------------------------------------------------------------------

  - id: human-only-work
    priority: 1000

    match:
      anyLabels:
        - "type: security"
        - "priority: p0"
        - "priority: p1"
        - "risk: high"
        - "risk: security-sensitive"
        - "planning: breaking-change"
        - "status: blocked"
        - "status: needs-info"
        - "status: needs-human-triage"
        - "agent: human-only"

    action:
      assignWorker: sinless777

      addLabels:
        - "agent: human-only"
        - "automation: needs-review"
        - "automation: no-auto-merge"

      setProjectFields:
        Worker: Human Review
        Automation State: Needs Review

      stopProcessing: true

  # ---------------------------------------------------------------------------
  # Dependency Pull Requests
  # ---------------------------------------------------------------------------

  - id: dependency-pull-request
    priority: 900

    match:
      anyLabels:
        - "type: dependency"
        - "automation: mend-renovate"
        - "automation: mend-remediate"
        - "automation: dependabot"

    action:
      assignWorker: dependency-automation

      setProjectFields:
        Worker: Dependency Automation
        Automation State: Suggested

      evaluateDependencyPolicy: true
      requestHumanReview: true
      stopProcessing: true

  # ---------------------------------------------------------------------------
  # GitHub Copilot Eligible Work
  # ---------------------------------------------------------------------------

  - id: github-copilot-documentation
    priority: 800

    match:
      allLabels:
        - "type: documentation"
        - "agent: ready"

      noneLabels:
        - "risk: high"
        - "risk: security-sensitive"
        - "planning: breaking-change"
        - "agent: human-only"

    action:
      assignWorker: github-copilot
      fallbackWorker: sinless777

      setProjectFields:
        Worker: GitHub Copilot
        Automation State: Suggested

      stopProcessing: true

  - id: github-copilot-frontend
    priority: 790

    match:
      allLabels:
        - "risk: low"
        - "agent: ready"

      anyLabels:
        - "area: frontend"
        - "area: ui"
        - "area: devportal"

      noneLabels:
        - "type: security"
        - "type: dependency"
        - "type: release"
        - "planning: breaking-change"
        - "agent: human-only"

    action:
      assignWorker: github-copilot
      fallbackWorker: sinless777

      setProjectFields:
        Worker: GitHub Copilot
        Automation State: Suggested

      stopProcessing: true

  # ---------------------------------------------------------------------------
  # OpenAI Codex Eligible Work
  # ---------------------------------------------------------------------------

  - id: openai-codex-tests
    priority: 700

    match:
      allLabels:
        - "type: test"
        - "risk: low"
        - "agent: ready"

      noneLabels:
        - "area: auth"
        - "area: user"
        - "area: discord"
        - "area: db"
        - "area: infra"
        - "area: cloudflare"
        - "area: docker"
        - "area: ci"
        - "risk: high"
        - "risk: security-sensitive"
        - "planning: breaking-change"
        - "agent: human-only"

    action:
      assignWorker: openai-codex
      fallbackWorker: sinless777

      setProjectFields:
        Worker: OpenAI Codex
        Automation State: Suggested

      stopProcessing: true

  - id: openai-codex-refactors
    priority: 690

    match:
      allLabels:
        - "type: refactor"
        - "risk: low"
        - "agent: ready"

      noneLabels:
        - "area: auth"
        - "area: user"
        - "area: discord"
        - "area: db"
        - "area: infra"
        - "area: cloudflare"
        - "area: docker"
        - "area: ci"
        - "risk: high"
        - "risk: security-sensitive"
        - "planning: breaking-change"
        - "agent: human-only"

    action:
      assignWorker: openai-codex
      fallbackWorker: sinless777

      setProjectFields:
        Worker: OpenAI Codex
        Automation State: Suggested

      stopProcessing: true

  # ---------------------------------------------------------------------------
  # Default Human Assignment
  # ---------------------------------------------------------------------------

  - id: default-human-assignment
    priority: 1

    match:
      always: true

    action:
      assignWorker: sinless777

      setProjectFields:
        Worker: Human Assigned
        Automation State: Manual

      stopProcessing: true

fallbacks:
  workerDisabled:
    assignWorker: sinless777

    addLabels:
      - "agent: human-only"

    setProjectFields:
      Worker: Human Assigned
      Automation State: Needs Review

    addComment: >-
      🤖 The selected coding agent is disabled or unavailable. This work has
      been routed to Sinless777 for manual assignment or review.

  workerAtCapacity:
    assignWorker: sinless777

    setProjectFields:
      Worker: Human Assigned
      Automation State: Needs Review

    addComment: >-
      🤖 The selected coding agent is at its configured task limit. This work
      has been routed to Sinless777 for manual assignment or queue review.

  issueMissingRequiredDetails:
    assignWorker: sinless777

    addLabels:
      - "status: needs-info"
      - "agent: human-only"

    setProjectFields:
      Status: Needs Info
      Worker: Human Review
      Automation State: Needs Review

    addComment: >-
      🤖 This issue does not contain enough implementation detail for safe
      coding-agent assignment. Add scope, acceptance criteria, and a validation
      plan before assigning an AI worker.

reconciliation:
  enabled: true
  schedule: "0 15 * * *"

  actions:
    - validate-worker-availability
    - identify-worker-capacity
    - identify-agent-eligible-issues
    - identify-agent-assigned-issues-without-pull-requests
    - identify-agent-pull-requests-awaiting-human-review
    - move-disabled-agent-work-to-human-review
    - synchronize-project-worker-field
    - summarize-open-agent-work
