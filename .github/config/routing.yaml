# .github/config/routing.yaml
#
# Central decision map for the Aerealith Project Orchestrator.
#
# This file decides:
# - Which labels, priorities, milestones, Project fields, and workers apply.
# - When work must be handled by a human.
# - When an AI worker may be assigned.
# - How Issues and Pull Requests are connected.
# - When dependency work is handed off to dependency-policy.yaml.
#
# This file does NOT define labels, milestones, Project fields, reviewers,
# workers, or dependency rules. Those are defined in their own config files.

version: 1

metadata:
  owner: SinLess-Games
  repository: Aerealith
  managedBy: aerealith-project-orchestrator
  description: Central issue, pull request, Project, worker, and automation routing rules.

sources:
  labels: .github/config/labels.yaml
  milestones: .github/config/milestones.yaml
  project: .github/config/project.yaml
  reviewers: .github/config/reviewers.yaml
  workers: .github/config/workers.yaml
  dependencyPolicy: .github/config/dependency-policy.yaml

policy:
  mode: enforce

  # Rules are evaluated in priority order.
  # The first matching rule with stopProcessing: true ends evaluation.
  evaluationOrder: highest-priority-first
  firstMatchingRuleWins: false

  manualOverrides:
    enabled: true

    # Human-set labels always override automation.
    manualLabelsWin: true
    manualMilestonesWin: true
    manualAssigneesWin: true
    manualProjectFieldsWin: true
    manualReviewerRequestsWin: true
    manualAutoMergeBlocksWin: true

    protectedLabels:
      - "status: blocked"
      - "status: needs-info"
      - "status: needs-human-triage"
      - "priority: p0"
      - "priority: p1"
      - "risk: high"
      - "risk: security-sensitive"
      - "agent: human-only"
      - "automation: no-auto-merge"
      - "automation: needs-review"
      - "planning: breaking-change"

  aiClassification:
    enabled: true

    # AI may classify and suggest actions, but must not bypass policy.
    allowSuggestions: true
    allowAutomaticApplication: true

    minimumConfidence:
      labelAssignment: 0.85
      priorityAssignment: 0.9
      milestoneAssignment: 0.9
      workerAssignment: 0.95
      issueToPullRequestLinking: 0.95

    # Low-confidence classifications are surfaced but not automatically applied.
    lowConfidenceAction:
      addLabels:
        - "status: needs-human-triage"

      setProjectFields:
        Automation State: Needs Review
        Worker: Human Review

  safety:
    neverAutoAssignWorkerFor:
      - "type: security"
      - "priority: p0"
      - "priority: p1"
      - "risk: high"
      - "risk: security-sensitive"
      - "planning: breaking-change"
      - "status: blocked"
      - "status: needs-info"
      - "status: needs-human-triage"

    neverAutoMergeFor:
      - "type: security"
      - "priority: p0"
      - "priority: p1"
      - "risk: high"
      - "risk: security-sensitive"
      - "planning: breaking-change"
      - "automation: no-auto-merge"

    neverAutoCloseIssueFromInference: true

    requireExplicitIssueClosingKeyword: true

    allowedIssueClosingKeywords:
      - closes
      - closed
      - fixes
      - fixed
      - resolves
      - resolved

events:
  issues:
    - opened
    - edited
    - reopened
    - labeled
    - unlabeled
    - assigned
    - unassigned
    - milestoned
    - demilestoned
    - closed
    - reopened

  pullRequests:
    - opened
    - edited
    - reopened
    - synchronize
    - ready_for_review
    - converted_to_draft
    - review_requested
    - review_request_removed
    - closed
    - labeled
    - unlabeled

  schedule:
    enabled: true
    cron: "0 14 * * *"

  workflowDispatch:
    enabled: true

defaults:
  issue:
    addLabels:
      - "status: triage"

    setProjectFields:
      Status: Triage
      Priority: P3
      Worker: Unassigned
      Risk: Medium
      Automation State: Suggested
      Release: Backlog

    addToProject: true
    assignMilestone: false
    assignWorker: false
    requestReview: false

  pullRequest:
    addToProject: true

    setProjectFields:
      Status: In Review
      Automation State: Applied

    requestReview: true
    useGlobalReviewerPolicy: true
    synchronizeLinkedIssue: true
    evaluateDependencyPolicy: true

  dependencyPullRequest:
    addToProject: true

    setProjectFields:
      Type: Dependency
      Worker: Dependency Automation
      Automation State: Suggested

    requestReview: true
    useGlobalReviewerPolicy: true
    evaluateDependencyPolicy: true

priorityDefaults:
  byType:
    "type: security": "priority: p1"
    "type: release": "priority: p1"
    "type: bug": "priority: p2"
    "type: feature": "priority: p3"
    "type: infrastructure": "priority: p3"
    "type: dependency": "priority: p3"
    "type: refactor": "priority: p3"
    "type: performance": "priority: p3"
    "type: test": "priority: p3"
    "type: documentation": "priority: p3"
    "type: maintenance": "priority: p3"

  projectFieldValues:
    "priority: p0": P0
    "priority: p1": P1
    "priority: p2": P2
    "priority: p3": P3
    "priority: p4": P4

riskDefaults:
  byType:
    "type: security": "risk: security-sensitive"
    "type: release": "risk: high"
    "type: infrastructure": "risk: medium"
    "type: dependency": "risk: medium"
    "type: bug": "risk: medium"
    "type: feature": "risk: medium"
    "type: refactor": "risk: low"
    "type: test": "risk: low"
    "type: documentation": "risk: low"
    "type: maintenance": "risk: low"

  projectFieldValues:
    "risk: low": Low
    "risk: medium": Medium
    "risk: high": High
    "risk: security-sensitive": Security Sensitive

issueToPullRequestLinking:
  enabled: true

  explicitReferences:
    enabled: true
    authoritative: true

    closingPatterns:
      - '(?i)\bcloses\s+#(?<issueNumber>\d+)\b'
      - '(?i)\bclosed\s+#(?<issueNumber>\d+)\b'
      - '(?i)\bfixes\s+#(?<issueNumber>\d+)\b'
      - '(?i)\bfixed\s+#(?<issueNumber>\d+)\b'
      - '(?i)\bresolves\s+#(?<issueNumber>\d+)\b'
      - '(?i)\bresolved\s+#(?<issueNumber>\d+)\b'

    ticketPatterns:
      - '(?i)\bAER-(?<ticketNumber>\d+)\b'

  branchInference:
    enabled: true
    authoritative: false

    patterns:
      - '^(feature|feat|fix|bugfix|refactor|docs|security|deps|dependency)/(?<issueNumber>\d+)-'
      - '^(feature|feat|fix|bugfix|refactor|docs|security|deps|dependency)/aer-(?<ticketNumber>\d+)-'
      - '^(?<issueNumber>\d+)-'

  titleInference:
    enabled: true
    authoritative: false

    patterns:
      - '\(#(?<issueNumber>\d+)\)'
      - '\bAER-(?<ticketNumber>\d+)\b'

  semanticInference:
    enabled: true
    authoritative: false
    minimumConfidence: 0.95
    maximumSuggestedIssues: 3

    action:
      addComment: true
      comment: >-
        🤖 Possible related issue detected. Add an explicit `Closes #123`,
        `Fixes #123`, or `Resolves #123` reference to this pull request if
        the issue should be closed when this pull request merges.

  linkedIssueActions:
    onPullRequestOpened:
      - copy-type-from-issue
      - copy-area-from-issue
      - copy-priority-from-issue
      - copy-risk-from-issue
      - copy-milestone-from-issue
      - set-linked-issue-project-status-in-review
      - set-pull-request-project-status-in-review

    onPullRequestMerged:
      - set-linked-issue-project-status-done
      - set-pull-request-project-status-done
      - close-explicitly-linked-issues-only

    onPullRequestClosedWithoutMerge:
      - set-pull-request-project-status-cancelled
      - restore-linked-issue-project-status-ready-if-not-closed

rules:
  # ---------------------------------------------------------------------------
  # Absolute Safety and Human-Triage Rules
  # ---------------------------------------------------------------------------

  - id: critical-priority
    priority: 1000
    description: P0 work always requires immediate human ownership and no automation.

    match:
      anyLabels:
        - "priority: p0"

    actions:
      addLabels:
        - "agent: human-only"
        - "automation: needs-review"
        - "automation: no-auto-merge"

      setProjectFields:
        Priority: P0
        Risk: High
        Worker: Human Review
        Automation State: Needs Review

      assignIssue:
        - Sinless777

      requestReview: true
      useGlobalReviewerPolicy: true
      autoMerge: disabled
      stopProcessing: true

  - id: urgent-priority
    priority: 990
    description: P1 work requires human review and is never assigned to an AI worker.

    match:
      anyLabels:
        - "priority: p1"

    actions:
      addLabels:
        - "agent: human-only"
        - "automation: needs-review"
        - "automation: no-auto-merge"

      setProjectFields:
        Priority: P1
        Worker: Human Review
        Automation State: Needs Review

      assignIssue:
        - Sinless777

      requestReview: true
      useGlobalReviewerPolicy: true
      autoMerge: disabled
      stopProcessing: false

  - id: security-sensitive
    priority: 980
    description: Security-sensitive work is human-only and cannot auto-merge.

    match:
      anyLabels:
        - "type: security"
        - "risk: security-sensitive"

    actions:
      addLabels:
        - "agent: human-only"
        - "automation: needs-review"
        - "automation: no-auto-merge"
        - "status: needs-human-triage"

      setProjectFields:
        Type: Security
        Risk: Security Sensitive
        Worker: Human Review
        Status: Triage
        Automation State: Needs Review

      assignIssue:
        - Sinless777

      requestReview: true
      useGlobalReviewerPolicy: true
      autoMerge: disabled
      stopProcessing: true

  - id: breaking-change
    priority: 970
    description: Breaking changes require human review, explicit documentation, and no auto-merge.

    match:
      anyLabels:
        - "planning: breaking-change"

    actions:
      addLabels:
        - "agent: human-only"
        - "automation: needs-review"
        - "automation: no-auto-merge"

      setProjectFields:
        Risk: High
        Worker: Human Review
        Automation State: Needs Review

      assignIssue:
        - Sinless777

      requestReview: true
      useGlobalReviewerPolicy: true
      autoMerge: disabled
      stopProcessing: false

  - id: blocked-work
    priority: 960
    description: Blocked work remains visible but should not be routed to workers.

    match:
      anyLabels:
        - "status: blocked"
        - "status: needs-info"
        - "status: needs-human-triage"

    actions:
      removeLabels:
        - "agent: ready"
        - "agent: copilot"
        - "agent: codex"
        - "automation: auto-merge"

      addLabels:
        - "agent: human-only"

      setProjectFields:
        Worker: Human Review
        Automation State: Needs Review

      setProjectStatusFromLabel: true
      autoMerge: disabled
      stopProcessing: true

  # ---------------------------------------------------------------------------
  # Release Routing
  # ---------------------------------------------------------------------------

  - id: release-work
    priority: 900
    description: Release work is always human-owned and targets a release milestone.

    match:
      anyLabels:
        - "type: release"

    actions:
      addLabels:
        - "agent: human-only"
        - "automation: needs-review"
        - "automation: no-auto-merge"

      setProjectFields:
        Type: Release
        Priority: P1
        Risk: High
        Worker: Human Review
        Automation State: Needs Review

      assignIssue:
        - Sinless777

      requestReview: true
      useGlobalReviewerPolicy: true
      assignMilestoneFrom:
        - v1-0-0-initial-release
        - v0-2-0-public-alpha
        - v0-1-0-private-alpha

      autoMerge: disabled
      stopProcessing: false

  # ---------------------------------------------------------------------------
  # Dependency Routing
  # ---------------------------------------------------------------------------

  - id: dependency-update
    priority: 850
    description: Dependency work is delegated to dependency-policy.yaml.

    match:
      anyLabels:
        - "type: dependency"
        - "automation: mend-renovate"
        - "automation: mend-remediate"
        - "automation: dependabot"

    actions:
      addLabels:
        - "type: dependency"

      setProjectFields:
        Type: Dependency
        Worker: Dependency Automation
        Automation State: Suggested

      evaluateDependencyPolicy: true
      assignMilestone: mvp-operations-and-observability
      requestReview: true
      useGlobalReviewerPolicy: true
      stopProcessing: true

  # ---------------------------------------------------------------------------
  # Infrastructure and Operations Routing
  # ---------------------------------------------------------------------------

  - id: infrastructure-work
    priority: 800
    description: Infrastructure work routes to the operations milestone.

    match:
      anyLabels:
        - "type: infrastructure"
        - "area: infra"
        - "area: cloudflare"
        - "area: docker"
        - "area: ci"
        - "area: nx-cloud"

    actions:
      addLabels:
        - "type: infrastructure"

      assignMilestone: mvp-operations-and-observability

      setProjectFields:
        Type: Infrastructure
        Area: Infrastructure
        Worker: Human Review
        Automation State: Suggested

      assignIssue:
        - Sinless777

      requestReview: true
      useGlobalReviewerPolicy: true
      stopProcessing: false

  - id: high-risk-infrastructure
    priority: 790
    description: High-risk infrastructure work cannot be assigned to an AI worker or auto-merged.

    match:
      allLabels:
        - "type: infrastructure"

      anyLabels:
        - "risk: high"
        - "risk: security-sensitive"

    actions:
      addLabels:
        - "agent: human-only"
        - "automation: needs-review"
        - "automation: no-auto-merge"

      setProjectFields:
        Risk: High
        Worker: Human Review
        Automation State: Needs Review

      assignIssue:
        - Sinless777

      autoMerge: disabled
      stopProcessing: false

  # ---------------------------------------------------------------------------
  # Service and Platform Routing
  # ---------------------------------------------------------------------------

  - id: identity-and-user-work
    priority: 700
    description: Authentication and user work routes to the identity and user milestone.

    match:
      anyLabels:
        - "area: auth"
        - "area: user"

    actions:
      assignMilestone: mvp-identity-and-user-platform

      setProjectFields:
        Worker: Human Review
        Risk: High
        Automation State: Suggested

      assignIssue:
        - Sinless777

      requestReview: true
      useGlobalReviewerPolicy: true
      stopProcessing: false

  - id: discord-work
    priority: 690
    description: Discord bot and dashboard work routes to the Discord milestone.

    match:
      anyLabels:
        - "area: discord"

    actions:
      assignMilestone: mvp-discord-platform

      setProjectFields:
        Area: Discord
        Worker: Human Review
        Risk: High
        Automation State: Suggested

      assignIssue:
        - Sinless777

      requestReview: true
      useGlobalReviewerPolicy: true
      stopProcessing: false

  - id: api-platform-work
    priority: 680
    description: API, configuration, and feature-flag work routes to platform services.

    match:
      anyLabels:
        - "area: api"
        - "area: config"
        - "area: flags"

    actions:
      assignMilestone: mvp-api-and-platform-services

      setProjectFields:
        Worker: Human Review
        Automation State: Suggested

      requestReview: true
      useGlobalReviewerPolicy: true
      stopProcessing: false

  # ---------------------------------------------------------------------------
  # Frontend and Developer Experience Routing
  # ---------------------------------------------------------------------------

  - id: frontend-and-developer-experience
    priority: 600
    description: Frontend, UI, documentation, and developer portal work routes to frontend DX.

    match:
      anyLabels:
        - "area: frontend"
        - "area: ui"
        - "area: docs"
        - "area: devportal"

    actions:
      assignMilestone: mvp-frontend-and-developer-experience

      setProjectFields:
        Worker: Unassigned
        Automation State: Suggested

      stopProcessing: false

  - id: documentation-agent-eligible
    priority: 590
    description: Low-risk documentation work can be assigned to an approved AI worker.

    match:
      allLabels:
        - "type: documentation"

      noneLabels:
        - "risk: high"
        - "risk: security-sensitive"
        - "planning: breaking-change"
        - "agent: human-only"

    actions:
      addLabels:
        - "agent: ready"

      setProjectFields:
        Type: Documentation
        Risk: Low
        Worker: GitHub Copilot
        Automation State: Suggested

      evaluateWorkerPolicy: true
      stopProcessing: false

  - id: low-risk-ui-agent-eligible
    priority: 580
    description: Low-risk frontend or UI work may be routed to an approved AI worker.

    match:
      allLabels:
        - "risk: low"

      anyLabels:
        - "area: frontend"
        - "area: ui"

      noneLabels:
        - "type: security"
        - "planning: breaking-change"
        - "agent: human-only"

    actions:
      addLabels:
        - "agent: ready"

      setProjectFields:
        Worker: GitHub Copilot
        Automation State: Suggested

      evaluateWorkerPolicy: true
      stopProcessing: false

  # ---------------------------------------------------------------------------
  # Core and Database Routing
  # ---------------------------------------------------------------------------

  - id: foundation-work
    priority: 500
    description: Shared libraries and repository tooling route to MVP Foundation.

    match:
      anyLabels:
        - "area: core"
        - "area: db"
        - "area: utils"
        - "area: repo"
        - "area: tooling"

    actions:
      assignMilestone: mvp-foundation

      setProjectFields:
        Worker: Human Review
        Automation State: Suggested

      requestReview: true
      useGlobalReviewerPolicy: true
      stopProcessing: false

  - id: low-risk-test-agent-eligible
    priority: 490
    description: Low-risk tests and test-fixture work can be assigned to an approved AI worker.

    match:
      allLabels:
        - "type: test"

      noneLabels:
        - "risk: high"
        - "risk: security-sensitive"
        - "planning: breaking-change"
        - "agent: human-only"

    actions:
      addLabels:
        - "agent: ready"

      setProjectFields:
        Type: Test
        Risk: Low
        Worker: OpenAI Codex
        Automation State: Suggested

      evaluateWorkerPolicy: true
      stopProcessing: false

  - id: low-risk-refactor-agent-eligible
    priority: 480
    description: Low-risk refactors may be assigned to an approved AI worker.

    match:
      allLabels:
        - "type: refactor"
        - "risk: low"

      noneLabels:
        - "area: auth"
        - "area: user"
        - "area: discord"
        - "risk: high"
        - "risk: security-sensitive"
        - "planning: breaking-change"
        - "agent: human-only"

    actions:
      addLabels:
        - "agent: ready"

      setProjectFields:
        Type: Refactor
        Worker: OpenAI Codex
        Automation State: Suggested

      evaluateWorkerPolicy: true
      stopProcessing: false

  # ---------------------------------------------------------------------------
  # Type Defaults
  # ---------------------------------------------------------------------------

  - id: feature-default
    priority: 300
    description: Apply normal defaults to feature work.

    match:
      allLabels:
        - "type: feature"

    actions:
      applyDefaultPriorityFromType: true
      applyDefaultRiskFromType: true
      setProjectFields:
        Type: Feature
        Automation State: Suggested
      stopProcessing: false

  - id: bug-default
    priority: 290
    description: Apply normal defaults to bug work.

    match:
      allLabels:
        - "type: bug"

    actions:
      applyDefaultPriorityFromType: true
      applyDefaultRiskFromType: true
      setProjectFields:
        Type: Bug
        Automation State: Suggested
      stopProcessing: false

  - id: performance-default
    priority: 280
    description: Apply normal defaults to performance work.

    match:
      allLabels:
        - "type: performance"

    actions:
      applyDefaultPriorityFromType: true
      applyDefaultRiskFromType: true
      setProjectFields:
        Type: Performance
        Automation State: Suggested
      stopProcessing: false

  - id: maintenance-default
    priority: 270
    description: Apply normal defaults to maintenance work.

    match:
      allLabels:
        - "type: maintenance"

    actions:
      applyDefaultPriorityFromType: true
      applyDefaultRiskFromType: true
      setProjectFields:
        Type: Maintenance
        Automation State: Suggested
      stopProcessing: false

  # ---------------------------------------------------------------------------
  # Final Fallback
  # ---------------------------------------------------------------------------

  - id: fallback-triage
    priority: 1
    description: Keep unclassified work visible and route it to human triage.

    match:
      always: true

    actions:
      addLabels:
        - "status: triage"

      setProjectFields:
        Status: Triage
        Worker: Unassigned
        Automation State: Suggested
        Release: Backlog

      addToProject: true
      stopProcessing: true

pullRequestRules:
  - id: draft-pull-request
    priority: 100

    match:
      draft: true

    actions:
      setProjectFields:
        Status: Triage
        Automation State: Suggested

      requestReview: false
      autoMerge: disabled
      stopProcessing: true

  - id: pull-request-ready
    priority: 90

    match:
      draft: false

    actions:
      setProjectFields:
        Status: In Review
        Automation State: Applied

      requestReview: true
      useGlobalReviewerPolicy: true
      synchronizeLinkedIssue: true
      stopProcessing: false

  - id: pull-request-author-is-sinless777
    priority: 80

    match:
      author:
        equals: Sinless777

    actions:
      requestReview: false
      addComment: >-
        👤 Global reviewer assignment skipped because Sinless777 is the pull
        request author.

      stopProcessing: false

  - id: pull-request-from-agent
    priority: 70

    match:
      anyLabels:
        - "agent: copilot"
        - "agent: codex"

    actions:
      addLabels:
        - "automation: needs-review"

      setProjectFields:
        Worker: Human Review
        Status: In Review
        Automation State: Needs Review

      requestReview: true
      useGlobalReviewerPolicy: true
      autoMerge: disabled
      stopProcessing: false

  - id: pull-request-high-risk
    priority: 60

    match:
      anyLabels:
        - "risk: high"
        - "risk: security-sensitive"
        - "type: security"
        - "planning: breaking-change"

    actions:
      addLabels:
        - "automation: needs-review"
        - "automation: no-auto-merge"

      setProjectFields:
        Worker: Human Review
        Status: In Review
        Automation State: Needs Review

      requestReview: true
      useGlobalReviewerPolicy: true
      autoMerge: disabled
      stopProcessing: false

  - id: pull-request-merged
    priority: 50

    match:
      state: closed
      merged: true

    actions:
      setProjectFields:
        Status: Done
        Automation State: Applied

      synchronizeLinkedIssue: true
      closeExplicitlyLinkedIssuesOnly: true
      stopProcessing: true

  - id: pull-request-closed-without-merge
    priority: 40

    match:
      state: closed
      merged: false

    actions:
      setProjectFields:
        Status: Cancelled
        Automation State: Manual

      restoreLinkedIssueStatusIfNeeded: true
      stopProcessing: true

reconciliation:
  enabled: true
  schedule: "0 14 * * *"

  actions:
    - add-new-issues-to-project
    - add-new-pull-requests-to-project
    - apply-missing-default-labels
    - apply-missing-priority-labels
    - apply-missing-risk-labels
    - synchronize-project-fields-from-labels
    - synchronize-project-fields-from-milestones
    - synchronize-linked-issue-and-pull-request-status
    - request-review-for-eligible-pull-requests
    - remove-invalid-self-review-requests
    - evaluate-open-dependency-pull-requests
    - identify-unassigned-work
    - identify-stale-triage-work
    - identify-blocked-work
    - identify-high-risk-work-without-human-assignee
    - identify-agent-eligible-work
    - summarize-open-p0-and-p1-work
