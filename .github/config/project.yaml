# .github/config/project.yaml
#
# Source of truth for the Aerealith GitHub Project.
#
# The Aerealith Project Orchestrator uses this file to:
# - Create or locate the configured GitHub Project.
# - Create missing Project fields and field options.
# - Add Issues and Pull Requests to the Project.
# - Set Project field values from labels, milestones, PR state, and AI triage.
# - Maintain Kanban, table, backlog, release, dependency, and agent views.
# - Archive completed items according to the configured retention policy.
#
# NOTE:
# GitHub Project IDs are generated by GitHub. Leave `projectId` null until the
# orchestrator creates or discovers the Project, then write the resolved ID back
# to this file or store it in repository variables.

version: 1

metadata:
  owner: SinLess-Games
  repository: Aerealith
  managedBy: aerealith-project-orchestrator
  description: Aerealith engineering, product, release, and automation Project configuration.

project:
  ownerType: organization
  ownerLogin: SinLess-Games

  title: Aerealith Delivery
  shortDescription: Track Aerealith product, platform, operational, and release work.

  # GitHub ProjectV2 node ID.
  #
  # Example:
  # PVT_kwDOExampleProjectId
  #
  # Leave null on first run. The orchestrator should discover an existing
  # matching Project by title or create one, then persist the resolved ID.
  projectId: null

  visibility: private

  closeCompletedItems: false
  archiveCompletedItems: false

  automation:
    enabled: true

    addIssueOnOpen: true
    addPullRequestOnOpen: true
    updateIssueOnLabelChange: true
    updatePullRequestOnReviewStateChange: true
    updatePullRequestOnMerge: true
    updateProjectOnMilestoneChange: true

    removeClosedIssuesAfterDays: null
    archiveClosedIssuesAfterDays: null
    archiveMergedPullRequestsAfterDays: null

  repositoryLinking:
    enabled: true

    includeIssues: true
    includePullRequests: true
    includeDraftIssues: false

    sourceRepositories:
      - SinLess-Games/Aerealith

# -----------------------------------------------------------------------------
# Project Fields
# -----------------------------------------------------------------------------
#
# Supported GitHub Project custom-field types:
# - singleSelect
# - text
# - number
# - date
# - iteration
#
# Built-in GitHub fields such as Title, Assignees, Labels, Repository,
# Milestone, and Linked Pull Requests are not created here.
# -----------------------------------------------------------------------------

fields:
  - id: status
    name: Status
    type: singleSelect
    description: Current delivery state for the Project item.
    required: true

    options:
      - name: Triage
        color: GRAY
        description: New work awaiting classification, scope review, or prioritization.

      - name: Needs Info
        color: YELLOW
        description: More information is required before work can be planned.

      - name: Ready
        color: BLUE
        description: Fully scoped work that is ready to begin.

      - name: In Progress
        color: PURPLE
        description: Work is actively being implemented.

      - name: In Review
        color: ORANGE
        description: A linked pull request is open and awaiting review or validation.

      - name: Blocked
        color: RED
        description: Work cannot proceed because of a dependency, decision, or external blocker.

      - name: Done
        color: GREEN
        description: Work is complete, merged, released, or otherwise resolved.

      - name: Cancelled
        color: PINK
        description: Work was intentionally stopped or superseded.

  - id: priority
    name: Priority
    type: singleSelect
    description: Relative urgency and delivery importance.
    required: true

    options:
      - name: P0
        color: RED
        description: Critical outage, severe security incident, data-loss risk, or immediate production issue.

      - name: P1
        color: ORANGE
        description: Urgent work affecting critical flows, serious defects, or high-severity security concerns.

      - name: P2
        color: YELLOW
        description: Important planned work with meaningful platform or user impact.

      - name: P3
        color: BLUE
        description: Normal planned backlog work, maintenance, and improvements.

      - name: P4
        color: GRAY
        description: Nice-to-have work, exploratory ideas, or low-impact improvements.

  - id: type
    name: Type
    type: singleSelect
    description: Primary classification of the work item.
    required: true

    options:
      - name: Feature
        color: PURPLE
        description: New user-facing functionality or platform capability.

      - name: Bug
        color: RED
        description: Broken, incorrect, or unexpected behavior.

      - name: Security
        color: RED
        description: Security hardening, remediation, or security-sensitive work.

      - name: Documentation
        color: BLUE
        description: Documentation, guides, references, comments, or developer portal content.

      - name: Dependency
        color: BLUE
        description: Dependency, lockfile, package-manager, or supply-chain update.

      - name: Refactor
        color: PURPLE
        description: Internal restructuring without intended user-facing behavior changes.

      - name: Infrastructure
        color: ORANGE
        description: CI/CD, deployment, Cloudflare, Docker, observability, or platform work.

      - name: Test
        color: PURPLE
        description: Test coverage, fixtures, mocks, validation, or testing tooling work.

      - name: Performance
        color: YELLOW
        description: Performance, caching, query efficiency, or runtime optimization work.

      - name: Maintenance
        color: GRAY
        description: Routine maintenance, cleanup, configuration, or repository hygiene.

      - name: Release
        color: GREEN
        description: Release preparation, versioning, deployment, changelog, or release validation work.

  - id: area
    name: Area
    type: singleSelect
    description: Primary Aerealith application, library, service, or operational area.
    required: false

    options:
      - name: Frontend
        color: PINK
        description: Website, web application, routes, pages, and frontend assets.

      - name: Docs
        color: BLUE
        description: Documentation, guides, references, and written content.

      - name: Dev Portal
        color: BLUE
        description: Developer portal, API reference, and integration experience.

      - name: Core
        color: PURPLE
        description: Shared contracts, entities, schemas, errors, types, and utilities.

      - name: Database
        color: TEAL
        description: Drizzle ORM, schema, queries, repositories, persistence, and migrations.

      - name: API
        color: BLUE
        description: REST, tRPC, GraphQL, WebSocket, routes, and transport contracts.

      - name: UI
        color: PINK
        description: Shared components, visual behavior, accessibility, and design system work.

      - name: Utils
        color: GREEN
        description: Reusable utilities, helper functions, and support code.

      - name: Config
        color: GRAY
        description: Environment configuration, runtime settings, and shared config validation.

      - name: Flags
        color: YELLOW
        description: Feature flags, targeting, OpenFeature, and flag evaluation.

      - name: Auth
        color: RED
        description: Authentication, authorization, tokens, sessions, verification, and account security.

      - name: User
        color: YELLOW
        description: Profiles, preferences, consent, settings, accounts, and user lifecycle behavior.

      - name: Discord
        color: PURPLE
        description: Discord bot commands, tickets, moderation, server modules, and integrations.

      - name: Infrastructure
        color: ORANGE
        description: Hosting, networking, operations, runtime environments, and platform services.

      - name: Cloudflare
        color: ORANGE
        description: Workers, Pages, DNS, bindings, tunnels, and Cloudflare deployment configuration.

      - name: Nx Cloud
        color: GRAY
        description: Nx Cloud, remote caching, distributed execution, and workspace automation.

      - name: Docker
        color: BLUE
        description: Dockerfiles, images, containers, Compose, and container runtime behavior.

      - name: CI
        color: BLUE
        description: GitHub Actions, validation workflows, release workflows, and repository automation.

      - name: Repository
        color: PURPLE
        description: Workspace structure, Git conventions, repository-wide configuration, and project hygiene.

      - name: Dependencies
        color: BLUE
        description: Package manifests, lockfiles, pnpm, Renovate, Mend, Dependabot, and supply-chain work.

      - name: Tooling
        color: GRAY
        description: Editors, scripts, linting, formatting, testing tools, and local developer workflow.

  - id: worker
    name: Worker
    type: singleSelect
    description: Current responsible implementation path.
    required: true

    options:
      - name: Human Review
        color: RED
        description: Human ownership or review is required before implementation or merge.

      - name: Human Assigned
        color: ORANGE
        description: Assigned to a human contributor or maintainer.

      - name: GitHub Copilot
        color: PURPLE
        description: Eligible for or assigned to GitHub Copilot coding-agent work.

      - name: OpenAI Codex
        color: BLUE
        description: Eligible for or assigned to OpenAI Codex coding-agent work.

      - name: Dependency Automation
        color: GREEN
        description: Managed by Mend Renovate, Mend remediation, Dependabot, or dependency automation.

      - name: Unassigned
        color: GRAY
        description: No implementation owner has been selected yet.

  - id: risk
    name: Risk
    type: singleSelect
    description: Delivery, operational, security, and rollback risk.
    required: true

    options:
      - name: Low
        color: GREEN
        description: Limited blast radius with straightforward validation and rollback.

      - name: Medium
        color: YELLOW
        description: Normal review and validation are required.

      - name: High
        color: ORANGE
        description: Affects important architecture, production behavior, dependencies, or critical flows.

      - name: Security Sensitive
        color: RED
        description: Requires careful human security review and disables automatic merge.

  - id: effort
    name: Effort
    type: singleSelect
    description: Rough implementation-size estimate.
    required: false

    options:
      - name: XS
        color: GREEN
        description: Small, focused change that should take little implementation time.

      - name: S
        color: BLUE
        description: Small task with limited scope and low coordination needs.

      - name: M
        color: YELLOW
        description: Moderate task affecting one or more related components.

      - name: L
        color: ORANGE
        description: Large task requiring broad implementation, review, or coordination.

      - name: XL
        color: RED
        description: Large initiative that should likely be split into multiple issues.

  - id: targetDate
    name: Target Date
    type: date
    description: Intended completion or delivery date.
    required: false

  - id: release
    name: Release
    type: singleSelect
    description: Planned release train or delivery target.
    required: false

    options:
      - name: MVP Foundation
        color: PURPLE
        description: Foundational platform and shared workspace delivery.

      - name: v0.1.0 Private Alpha
        color: BLUE
        description: Controlled private-alpha release target.

      - name: v0.2.0 Public Alpha
        color: ORANGE
        description: Broader public-alpha release target.

      - name: v1.0.0 Initial Release
        color: GREEN
        description: First stable Aerealith release target.

      - name: Backlog
        color: GRAY
        description: Not assigned to a release target yet.

  - id: implementationNotes
    name: Implementation Notes
    type: text
    description: Short orchestration notes, routing context, or implementation constraints.
    required: false

  - id: automationState
    name: Automation State
    type: singleSelect
    description: State assigned by the Aerealith Project Orchestrator.
    required: true

    options:
      - name: Manual
        color: GRAY
        description: Managed manually by a maintainer.

      - name: Suggested
        color: BLUE
        description: AI classification or routing suggestion is awaiting human confirmation.

      - name: Applied
        color: GREEN
        description: Automation successfully applied approved routing or Project updates.

      - name: Needs Review
        color: YELLOW
        description: Automation encountered ambiguity, elevated risk, or missing information.

      - name: Blocked
        color: RED
        description: Automation is blocked by policy, failed checks, or missing configuration.

# -----------------------------------------------------------------------------
# Label-to-Field Mapping
# -----------------------------------------------------------------------------
#
# The orchestrator reads labels from .github/config/labels.yaml and maps them
# into Project fields. Manual Project field values always win over this mapping.
# -----------------------------------------------------------------------------

labelMappings:
  type:
    "type: feature": Feature
    "type: bug": Bug
    "type: security": Security
    "type: documentation": Documentation
    "type: dependency": Dependency
    "type: refactor": Refactor
    "type: infrastructure": Infrastructure
    "type: test": Test
    "type: performance": Performance
    "type: maintenance": Maintenance
    "type: release": Release

  area:
    "area: frontend": Frontend
    "area: docs": Docs
    "area: devportal": Dev Portal
    "area: core": Core
    "area: db": Database
    "area: api": API
    "area: ui": UI
    "area: utils": Utils
    "area: config": Config
    "area: flags": Flags
    "area: auth": Auth
    "area: user": User
    "area: discord": Discord
    "area: infra": Infrastructure
    "area: cloudflare": Cloudflare
    "area: nx-cloud": Nx Cloud
    "area: docker": Docker
    "area: ci": CI
    "area: repo": Repository
    "area: deps": Dependencies
    "area: tooling": Tooling

  priority:
    "priority: p0": P0
    "priority: p1": P1
    "priority: p2": P2
    "priority: p3": P3
    "priority: p4": P4

  risk:
    "risk: low": Low
    "risk: medium": Medium
    "risk: high": High
    "risk: security-sensitive": Security Sensitive

  worker:
    "agent: human-only": Human Review
    "agent: copilot": GitHub Copilot
    "agent: codex": OpenAI Codex
    "automation: mend-renovate": Dependency Automation
    "automation: mend-remediate": Dependency Automation
    "automation: dependabot": Dependency Automation

  status:
    "status: triage": Triage
    "status: needs-info": Needs Info
    "status: ready": Ready
    "status: in-progress": In Progress
    "status: in-review": In Review
    "status: blocked": Blocked
    "status: done": Done

# -----------------------------------------------------------------------------
# Milestone-to-Release Mapping
# -----------------------------------------------------------------------------

milestoneMappings:
  "MVP Foundation": MVP Foundation
  "MVP Identity and User Platform": MVP Foundation
  "MVP API and Platform Services": MVP Foundation
  "MVP Frontend and Developer Experience": MVP Foundation
  "MVP Discord Management Platform": MVP Foundation
  "MVP Operations and Observability": MVP Foundation
  "v0.1.0 Private Alpha": v0.1.0 Private Alpha
  "v0.2.0 Public Alpha": v0.2.0 Public Alpha
  "v1.0.0 Initial Release": v1.0.0 Initial Release

# -----------------------------------------------------------------------------
# Project Views
# -----------------------------------------------------------------------------
#
# GitHub Projects supports board, table, and roadmap layouts.
#
# The orchestrator should create or reconcile these named views. Filters use
# GitHub Project filter syntax and must be kept in sync with the configured
# single-select values above.
# -----------------------------------------------------------------------------

views:
  - id: intake
    name: Intake
    layout: board
    description: New work waiting for classification and planning.

    groupBy:
      field: Status

    filter: 'Status:"Triage"'

    visibleFields:
      - Title
      - Type
      - Area
      - Priority
      - Risk
      - Worker
      - Labels
      - Assignees
      - Milestone

    sort:
      - field: Priority
        direction: ascending

  - id: delivery-kanban
    name: Delivery Kanban
    layout: board
    description: Active Aerealith work across the normal delivery lifecycle.

    groupBy:
      field: Status

    filter: '-Status:"Done" -Status:"Cancelled"'

    visibleFields:
      - Title
      - Priority
      - Type
      - Area
      - Risk
      - Worker
      - Assignees
      - Milestone
      - Target Date

    sort:
      - field: Priority
        direction: ascending

      - field: Target Date
        direction: ascending

  - id: prioritized-backlog
    name: Prioritized Backlog
    layout: table
    description: Planned and unstarted work ordered by importance.

    filter: 'Status:"Triage", "Needs Info", "Ready"'

    visibleFields:
      - Title
      - Priority
      - Effort
      - Type
      - Area
      - Risk
      - Release
      - Milestone
      - Target Date
      - Assignees
      - Labels

    sort:
      - field: Priority
        direction: ascending

      - field: Release
        direction: ascending

      - field: Target Date
        direction: ascending

  - id: current-mvp
    name: Current MVP
    layout: table
    description: Work associated with the current MVP foundation delivery.

    filter: 'Release:"MVP Foundation" -Status:"Done" -Status:"Cancelled"'

    visibleFields:
      - Title
      - Status
      - Priority
      - Area
      - Worker
      - Risk
      - Effort
      - Milestone
      - Assignees
      - Linked pull requests

    sort:
      - field: Status
        direction: ascending

      - field: Priority
        direction: ascending

  - id: release-roadmap
    name: Release Roadmap
    layout: roadmap
    description: Delivery plan grouped by release targets and target dates.

    groupBy:
      field: Release

    dateField: Target Date

    filter: '-Status:"Done" -Status:"Cancelled"'

    visibleFields:
      - Title
      - Release
      - Status
      - Priority
      - Area
      - Target Date
      - Milestone

  - id: agent-queue
    name: Agent Queue
    layout: table
    description: Safe, well-scoped work eligible for approved coding-agent assignment.

    filter: 'Worker:"GitHub Copilot", "OpenAI Codex" -Risk:"High" -Risk:"Security Sensitive" -Status:"Done"'

    visibleFields:
      - Title
      - Status
      - Priority
      - Type
      - Area
      - Worker
      - Risk
      - Effort
      - Implementation Notes
      - Assignees
      - Labels

    sort:
      - field: Priority
        direction: ascending

      - field: Effort
        direction: ascending

  - id: dependencies
    name: Dependency Updates
    layout: table
    description: Dependency automation, remediation, review, and auto-merge status.

    filter: 'Type:"Dependency" -Status:"Done" -Status:"Cancelled"'

    visibleFields:
      - Title
      - Status
      - Priority
      - Risk
      - Worker
      - Automation State
      - Area
      - Assignees
      - Linked pull requests
      - Labels

    sort:
      - field: Risk
        direction: descending

      - field: Priority
        direction: ascending

  - id: security-and-urgent
    name: Security and Urgent Work
    layout: board
    description: Security-sensitive, P0, P1, and high-risk delivery work.

    groupBy:
      field: Status

    filter: 'Priority:"P0", "P1" Risk:"High", "Security Sensitive"'

    visibleFields:
      - Title
      - Priority
      - Risk
      - Type
      - Area
      - Worker
      - Assignees
      - Milestone
      - Linked pull requests

    sort:
      - field: Priority
        direction: ascending

  - id: blocked-work
    name: Blocked Work
    layout: board
    description: Work blocked by dependencies, decisions, external systems, or missing information.

    groupBy:
      field: Area

    filter: 'Status:"Blocked", "Needs Info"'

    visibleFields:
      - Title
      - Status
      - Priority
      - Risk
      - Worker
      - Implementation Notes
      - Assignees
      - Milestone
      - Labels

    sort:
      - field: Priority
        direction: ascending

  - id: review-queue
    name: Review Queue
    layout: table
    description: Pull requests and issues currently waiting for validation or review.

    filter: 'Status:"In Review"'

    visibleFields:
      - Title
      - Priority
      - Type
      - Area
      - Risk
      - Worker
      - Assignees
      - Linked pull requests
      - Milestone
      - Labels

    sort:
      - field: Priority
        direction: ascending

  - id: completed
    name: Completed
    layout: table
    description: Finished work retained for release notes, history, and retrospective review.

    filter: 'Status:"Done", "Cancelled"'

    visibleFields:
      - Title
      - Status
      - Type
      - Area
      - Priority
      - Release
      - Milestone
      - Linked pull requests
      - Closed
      - Labels

    sort:
      - field: Closed
        direction: descending

# -----------------------------------------------------------------------------
# Automated Project Behavior
# -----------------------------------------------------------------------------

automationRules:
  - id: issue-opened
    trigger: issue.opened

    actions:
      - add-to-project
      - set-default-fields
      - set-status: Triage
      - set-worker: Unassigned
      - set-automation-state: Suggested

  - id: issue-labeled-ready
    trigger: issue.labeled

    when:
      labelsAll:
        - "status: ready"

    actions:
      - set-status: Ready
      - set-automation-state: Applied

  - id: issue-blocked
    trigger: issue.labeled

    when:
      labelsAny:
        - "status: blocked"
        - "status: needs-info"
        - "status: needs-human-triage"

    actions:
      - set-status-from-label
      - set-automation-state: Needs Review

  - id: pull-request-opened
    trigger: pull_request.opened

    actions:
      - add-to-project
      - link-related-issue
      - copy-type-area-priority-risk-from-linked-issue
      - set-status: In Review
      - set-automation-state: Applied

  - id: pull-request-ready-for-review
    trigger: pull_request.ready_for_review

    actions:
      - request-reviewers
      - set-status: In Review
      - set-automation-state: Applied

  - id: pull-request-merged
    trigger: pull_request.closed

    when:
      merged: true

    actions:
      - set-status: Done
      - close-linked-issues
      - set-automation-state: Applied

  - id: dependency-update-opened
    trigger: pull_request.opened

    when:
      labelsAny:
        - "automation: mend-renovate"
        - "automation: mend-remediate"
        - "automation: dependabot"

    actions:
      - add-to-project
      - set-type: Dependency
      - set-worker: Dependency Automation
      - set-automation-state: Suggested
      - run-dependency-policy

  - id: dependency-auto-merge-approved
    trigger: check_suite.completed

    when:
      labelsAll:
        - "type: dependency"
        - "automation: auto-merge"

    actions:
      - evaluate-dependency-policy
      - enable-auto-merge-if-eligible

# -----------------------------------------------------------------------------
# Reconciliation
# -----------------------------------------------------------------------------

reconciliation:
  enabled: true
  schedule: "0 14 * * *"

  actions:
    - create-missing-project
    - create-missing-fields
    - create-missing-field-options
    - create-missing-views
    - synchronize-open-issues
    - synchronize-open-pull-requests
    - synchronize-linked-issue-statuses
    - identify-unassigned-items
    - identify-stale-triage-items
    - identify-blocked-items
    - identify-overdue-target-dates
    - identify-open-p0-and-p1-items
    - archive-items-when-policy-allows
