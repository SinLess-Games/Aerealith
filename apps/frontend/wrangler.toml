"$schema" = "../../node_modules/wrangler/config-schema.json"

name = "aerealith"
main = "src/worker.ts"
compatibility_date = "2026-07-08"
compatibility_flags = ["nodejs_compat"]
preview_urls = true

[assets]
directory = "../../dist/apps/frontend"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/__aerealith/*", "/api/*"]

[[kv_namespaces]]
binding = "AEREALITH_KV"
id = "9873b606bf1346aca48de61c9bb96968"

# Postgres access from the Worker runtime. `node-postgres` cannot open raw TCP
# from a Worker directly, so it connects through Hyperdrive (edge connection
# pooling). Provision with `wrangler hyperdrive create aerealith --connection-string=...`
# and replace the id below; set `localConnectionString` for `wrangler dev`.
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "REPLACE_WITH_HYPERDRIVE_ID"
localConnectionString = "postgresql://aerealith:aerealith@localhost:5432/aerealith"

[[r2_buckets]]
binding = "AEREALITH_AI"
bucket_name = "aerealith-ai"

[[flagship]]
binding = "FLAGSHIP_FLAGS"
app_id = "2a1ca9ba-b446-4cb8-b8eb-ab0f3985679f"
remote = true

[[analytics_engine_datasets]]
binding = "AEREALITH_ANALYTICS"
dataset = "Aerealith"

[observability]
enabled = true

[observability.logs]
enabled = true
head_sampling_rate = 1.0
invocation_logs = true
persist = true

[observability.traces]
enabled = true
head_sampling_rate = 1.0
persist = true

[[queues.producers]]
binding = "EVENTBUS"
queue = "events"
