"$schema" = "../../node_modules/wrangler/config-schema.json"

name = "aerealith"
main = "src/worker.ts"
compatibility_date = "2026-07-08"
compatibility_flags = ["nodejs_compat"]
preview_urls = true
upload_source_maps = true

# ---------------------------------------------------------------
# Assets
# ---------------------------------------------------------------

[assets]
directory = "../../dist/apps/frontend"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/__aerealith/*"]

# ---------------------------------------------------------------
# Secrets
# ---------------------------------------------------------------

[secrets]
required = ["POSTGRES_URL", "PRODUCTION_POSTGRES_URL", "RESEND_API_KEY"]

# ---------------------------------------------------------------
# Observability
# ---------------------------------------------------------------

[observability]
enabled = true
head_sampling_rate = 1.0

[observability.logs]
enabled = true

invocation_logs = true
persist = true

[observability.traces]
enabled = true
persist = true

# ---------------------------------------------------------------
# Bindings
# ---------------------------------------------------------------

[[queues.producers]]
binding = "EVENTBUS"
queue = "events"

[[kv_namespaces]]
binding = "AEREALITH_KV"
id = "9873b606bf1346aca48de61c9bb96968"

[[r2_buckets]]
binding = "AEREALITH_AI"
bucket_name = "aerealith-ai"

[[flagship]]
binding = "FLAGSHIP_FLAGS"
app_id = "2a1ca9ba-b446-4cb8-b8eb-ab0f3985679f"
remote = true

[[analytics_engine_datasets]]
binding = "AEREALITH_ANALYTICS"
dataset = "Aerealith"

# ---------------------------------------------------------------
# Cache
# ---------------------------------------------------------------
[cache]
enabled = false

[env.production.cache]
enabled = true
