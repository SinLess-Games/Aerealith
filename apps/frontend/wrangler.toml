"$schema" = "../../node_modules/wrangler/config-schema.json"

name = "aerealith"
main = "src/worker.ts"
compatibility_date = "2026-07-08"
compatibility_flags = ["nodejs_compat"]
preview_urls = true
upload_source_maps = true
routes = [
  { pattern = "aerealith.com", custom_domain = true },
]

# ---------------------------------------------------------------
# Assets
# ---------------------------------------------------------------

[assets]
directory = "../../dist/apps/frontend"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/__aerealith/*", "/api/*"]

# ---------------------------------------------------------------
# Observability
# ---------------------------------------------------------------

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1

# ---------------------------------------------------------------
# Bindings
# ---------------------------------------------------------------

[[queues.producers]]
binding = "EVENTBUS"
queue = "events"

[[kv_namespaces]]
binding = "AEREALITH_KV"
id = "9873b606bf1346aca48de61c9bb96968"

# Add a Hyperdrive binding only after provisioning a real configuration with
# `wrangler hyperdrive create`. Placeholder IDs make every deployment fail.

[[r2_buckets]]
binding = "AEREALITH_AI"
bucket_name = "aerealith-ai"

[[flagship]]
binding = "FLAGSHIP_FLAGS"
app_id = "2a1ca9ba-b446-4cb8-b8eb-ab0f3985679f"
remote = true

[[analytics_engine_datasets]]
binding = "AEREALITH_ANALYTICS"
dataset = "Aerealith"

# ---------------------------------------------------------------
# Cache
# ---------------------------------------------------------------
[cache]
enabled = true
