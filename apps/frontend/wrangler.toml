# apps/frontend/wrangler.toml
#
# Cloudflare Worker configuration for the Aerealith frontend.
#
# This is the single Worker service used for:
# - Production: https://aerealith.com
# - Staging: staging-aerealith.sinless-deploy.workers.dev
# - Pull request previews: pr-<number>-aerealith.sinless-deploy.workers.dev
#
# Staging and pull-request previews are Worker versions and aliases.
# They are not separate Wrangler environments or separate Worker services.
#
# Do not place secrets in this file.
# Use Cloudflare Worker secrets for runtime credentials.

"$schema" = "../../node_modules/wrangler/config-schema.json"

# This must match the existing Worker shown in the Cloudflare dashboard.
name = "aerealith"

# Update intentionally when adopting newer Cloudflare runtime behavior.
compatibility_date = "2026-07-03"

# The production workers.dev URL remains disabled.
#
# Production traffic uses the existing custom domain:
# https://aerealith.com
workers_dev = false

# Explicitly enable versioned and aliased preview URLs even though workers_dev
# is disabled. This is required for staging and pull-request preview aliases.
preview_urls = true

# Keep dashboard-managed runtime variables on deployment.
#
# Wrangler config remains the source of truth for Worker code and supported
# configuration, while secrets remain managed separately through Cloudflare.
keep_vars = true

# Upload source maps with deployable Worker versions for readable Cloudflare
# stack traces and debugging.
upload_source_maps = true

# The Cloudflare Vite plugin reads this Worker entry point and generates the
# deployable Worker configuration during the frontend build.
main = "./src/worker.ts"

# React Router SPA fallback.
#
# Do not set an assets directory here. The Cloudflare Vite plugin supplies the
# generated build output and generated deployment configuration.
[assets]
not_found_handling = "single-page-application"
html_handling = "auto-trailing-slash"

# Persist Worker observability data at full sampling while the project is in
# early development. Reduce this later if traffic volume makes full sampling
# too noisy or expensive.
#
# Cloudflare persists Worker logs when observability is enabled. A sampling
# value of 1 records every request.
[observability]
enabled = true
head_sampling_rate = 1
