# apps/frontend/wrangler.toml
#
# Cloudflare Worker configuration for the Aerealith frontend.
#
# This Worker hosts the public website, web application, documentation,
# and developer portal as one Vite-powered frontend deployment.
#
# Do not place secrets in this file.
# Use Cloudflare Worker secrets for runtime credentials.

"$schema" = "../../node_modules/wrangler/config-schema.json"

name = "aerealith-frontend"

# Update intentionally when adopting newer Cloudflare compatibility behavior.
compatibility_date = "2026-07-03"

# Required for GitHub Actions PR previews and workers.dev deployments.
workers_dev = true
preview_urls = true

# Keep source maps available for Cloudflare stack traces and debugging.
upload_source_maps = true

# Preserve runtime variables configured through Cloudflare when deploying.
# Secrets are still managed separately through `wrangler secret put`.
keep_vars = true

# The Cloudflare Vite plugin reads this entry point and automatically creates
# the generated deployment configuration during the frontend build.
main = "./src/worker.ts"

# React Router SPA fallback.
#
# Do not set `directory` here. The Cloudflare Vite plugin automatically points
# Worker Assets at the generated frontend build output.
[assets]
not_found_handling = "single-page-application"
html_handling = "auto-trailing-slash"

# Development/default environment.
[vars]
AEREALITH_ENV = "development"

# Keep detailed telemetry for ephemeral pull-request previews.
[env.preview]
name = "aerealith-frontend-preview"

[env.preview.vars]
AEREALITH_ENV = "preview"

[env.preview.observability]
enabled = true

[env.preview.observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true

[env.preview.observability.traces]
enabled = true
head_sampling_rate = 1

# Staging should remain highly observable, but does not need full trace volume.
[env.staging]
name = "aerealith-frontend-staging"

[env.staging.vars]
AEREALITH_ENV = "staging"

[env.staging.observability]
enabled = true

[env.staging.observability.logs]
enabled = true
head_sampling_rate = 0.5
invocation_logs = true

[env.staging.observability.traces]
enabled = true
head_sampling_rate = 0.25

# Production uses sampling so logs and traces remain useful without recording
# every request indefinitely.
[env.production]
name = "aerealith-frontend"

[env.production.vars]
AEREALITH_ENV = "production"

[env.production.observability]
enabled = true

[env.production.observability.logs]
enabled = true
head_sampling_rate = 0.1
invocation_logs = true

[env.production.observability.traces]
enabled = true
head_sampling_rate = 0.05
