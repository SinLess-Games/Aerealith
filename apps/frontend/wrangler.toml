# apps/frontend/wrangler.toml
#
# Cloudflare Worker configuration for the Aerealith frontend.
#
# This is the single Worker service used for:
# - Production: https://aerealith.com
# - Staging: staging-aerealith.sinless-deploy.workers.dev
# - Pull request previews: pr-<number>-aerealith.sinless-deploy.workers.dev
#
# Staging and pull-request previews are Worker versions and aliases.
# They are not separate Worker services.
#
# Do not place secrets in this file.
# Use Cloudflare Worker secrets for runtime credentials.

"$schema" = "../../node_modules/wrangler/config-schema.json"

name = "aerealith"

compatibility_date = "2026-07-03"

# Production uses the custom domain configured in Cloudflare:
# https://aerealith.com
workers_dev = false

# Enables version and alias URLs such as:
# pr-123-aerealith.sinless-deploy.workers.dev
preview_urls = true

# Preserve dashboard-managed runtime variables during deploys.
keep_vars = true

# Upload source maps for readable Cloudflare stack traces.
upload_source_maps = true

# Wrangler bundles this Worker during deployment.
#
# Vite does not build this file. Wrangler does.
main = "./src/worker.ts"

[assets]
# This path is relative to apps/frontend/wrangler.toml.
#
# The Nx Vite build creates this directory:
# dist/apps/frontend
directory = "../../dist/apps/frontend"

# Makes React Router browser routes serve index.html.
not_found_handling = "single-page-application"

# Keeps Cloudflare's normalized trailing-slash behavior.
html_handling = "auto-trailing-slash"

# Exposes the Static Assets binding to src/worker.ts.
binding = "ASSETS"

# Run the Worker only for infrastructure/runtime endpoints.
#
# All normal website and SPA requests stay asset-first.
run_worker_first = ["/__aerealith/*"]

[observability]
enabled = true
head_sampling_rate = 1
